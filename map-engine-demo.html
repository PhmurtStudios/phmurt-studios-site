<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Engine — Territory Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Spectral:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08080a;
    --bg-card: #141420;
    --bg-hover: #201e2a;
    --text: #f2e8d6;
    --text-dim: #cfc0a8;
    --text-muted: #9a8870;
    --crimson: #d4433a;
    --crimson-dim: #a82a20;
    --gold: #c9a85c;
    --border: rgba(255,255,255,0.11);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Spectral', Georgia, serif;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 56px 1fr;
    height: 100vh;
  }

  /* --- Top Bar --- */
  .top-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    background: #06060a;
    border-bottom: 1px solid var(--border);
  }

  .top-bar h1 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text);
  }

  .top-bar .seed-controls {
    display: flex; align-items: center; gap: 10px; margin-left: auto;
  }

  .top-bar label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .top-bar input[type="number"] {
    width: 80px; padding: 6px 10px;
    background: var(--bg-card); color: var(--text);
    border: 1px solid var(--border); border-radius: 3px;
    font-family: 'Spectral', serif; font-size: 14px;
  }

  .btn {
    padding: 7px 18px;
    background: var(--crimson);
    color: var(--text);
    border: none; border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--crimson-dim); }
  .btn.gold { background: var(--gold); color: #08080a; }
  .btn.gold:hover { background: #b8973d; }
  .btn.subtle {
    background: var(--bg-hover); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn.subtle:hover { background: var(--bg-card); }

  /* --- Canvas Area --- */
  .canvas-wrap {
    position: relative;
    overflow: hidden;
    background: #08080a;
  }

  #mapCanvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  /* --- Side Panel --- */
  .side-panel {
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
  }

  .panel-section {
    margin-bottom: 24px;
  }

  .panel-section h2 {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
  }
  .info-row .label { color: var(--text-muted); }
  .info-row .value { color: var(--text); font-weight: 500; }

  .faction-list {
    display: flex; flex-direction: column; gap: 8px;
  }

  .faction-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .faction-item:hover { background: var(--bg-hover); }
  .faction-item.selected { border-color: var(--gold); }

  .faction-swatch {
    width: 16px; height: 16px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }

  .faction-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .faction-regions {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Event Actions */
  .action-group {
    display: flex; flex-direction: column; gap: 6px;
  }

  .action-group .btn { width: 100%; text-align: center; }

  /* Selected info */
  .selected-info {
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .selected-info .title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .selected-info .detail {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* Event log */
  .event-log {
    max-height: 200px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
  }
  .event-log .event {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 8px;
    background: var(--bg);
    border-radius: 2px;
    border-left: 2px solid var(--crimson);
  }
  .event-log .event.alliance { border-left-color: var(--gold); }
  .event-log .event.secede { border-left-color: #5ee09a; }
</style>
</head>
<body>

<div id="app">
  <div class="top-bar">
    <h1>Territory Engine</h1>
    <div class="seed-controls">
      <label>Seed</label>
      <input type="number" id="seedInput" value="42" min="1" max="99999">
      <button class="btn" id="generateBtn">Generate</button>
      <button class="btn subtle" id="randomBtn">Random</button>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="mapCanvas"></canvas>
  </div>

  <div class="side-panel" id="sidePanel">
    <!-- Populated by JS -->
  </div>
</div>

<script src="campaign-map-engine.js"></script>
<script>
(function() {
  'use strict';

  const canvas = document.getElementById('mapCanvas');
  const seedInput = document.getElementById('seedInput');
  const generateBtn = document.getElementById('generateBtn');
  const randomBtn = document.getElementById('randomBtn');
  const sidePanel = document.getElementById('sidePanel');

  // Create engine
  const engine = new MapEngine(canvas, {
    regionCount: 12,
    factionCount: 5,
    growthJitter: 0.4,
  });

  // Event log
  const events = [];

  function logEvent(type, msg) {
    events.unshift({ type, msg, time: new Date().toLocaleTimeString() });
    if (events.length > 50) events.pop();
    updatePanel();
  }

  // Generate initial map
  function doGenerate(seed) {
    engine.generate(seed);
    // Re-attach callbacks (renderer is recreated each generate)
    engine.onRegionClick((region, faction) => {
      selectedRegionInfo = { region, faction };
      updatePanel();
    });
    engine.onRegionHover(() => {});
    selectedRegionInfo = null;
    selectedFactionId = null;
    events.length = 0;
    logEvent('generate', `Map generated with seed ${seed}`);
    updatePanel();
  }

  generateBtn.addEventListener('click', () => {
    doGenerate(parseInt(seedInput.value) || 1);
  });

  randomBtn.addEventListener('click', () => {
    const seed = (Math.random() * 99999) | 0;
    seedInput.value = seed;
    doGenerate(seed);
  });

  // State
  let selectedFactionId = null;
  let selectedRegionInfo = null;

  // Interaction callbacks
  engine.onRegionClick((region, faction) => {
    selectedRegionInfo = { region, faction };
    updatePanel();
  });

  engine.onRegionHover((region, faction) => {
    // Could update a tooltip
  });

  // Engine events
  engine.on('conquer', (e) => {
    logEvent('conquer', `${e.faction.name} conquered ${e.region.name}`);
  });
  engine.on('alliance', (e) => {
    logEvent('alliance', `${e.absorber.name} formed alliance`);
  });
  engine.on('secede', (e) => {
    logEvent('secede', `${e.region.name} seceded → ${e.newFaction.name}`);
  });

  // --- Side Panel Rendering ---

  function updatePanel() {
    const factions = engine.getFactions();
    const regions = engine.getRegions();

    let html = '';

    // Selected region info
    if (selectedRegionInfo) {
      const { region, faction } = selectedRegionInfo;
      html += `
        <div class="panel-section">
          <h2>Selected</h2>
          <div class="selected-info">
            <div class="title">${region.name}</div>
            <div class="detail">
              Faction: ${faction ? faction.name : 'None'}<br>
              Cities: ${region.cities.length}<br>
              Cells: ${region.cells.size.toLocaleString()}
            </div>
          </div>
        </div>
      `;

      // Actions for selected region
      html += `
        <div class="panel-section">
          <h2>Actions</h2>
          <div class="action-group">
      `;

      // Conquer options: list other factions
      for (const f of factions) {
        if (f.regions.size === 0) continue;
        if (faction && f.id === faction.id) continue;
        html += `<button class="btn subtle" onclick="doConquer(${f.id}, ${region.id})">
          ${f.name} conquers this
        </button>`;
      }

      html += `<button class="btn gold" onclick="doSecede(${region.id})">
        Declare independence
      </button>`;

      html += `</div></div>`;
    }

    // Factions
    html += `<div class="panel-section"><h2>Factions</h2><div class="faction-list">`;
    for (const f of factions) {
      if (f.regions.size === 0) continue;
      const selected = selectedFactionId === f.id ? ' selected' : '';
      html += `
        <div class="faction-item${selected}" onclick="selectFaction(${f.id})">
          <div class="faction-swatch" style="background:${f.fill}"></div>
          <div class="faction-name">${f.name}</div>
          <div class="faction-regions">${f.regions.size}r</div>
        </div>
      `;
    }
    html += `</div></div>`;

    // Alliance action (if two factions selected)
    if (selectedFactionId !== null) {
      const otherFactions = factions.filter(f => f.id !== selectedFactionId && f.regions.size > 0);
      if (otherFactions.length > 0) {
        html += `<div class="panel-section"><h2>Alliance</h2><div class="action-group">`;
        for (const f of otherFactions) {
          html += `<button class="btn subtle" onclick="doAlliance(${selectedFactionId}, ${f.id})">
            Absorb ${f.name}
          </button>`;
        }
        html += `</div></div>`;
      }
    }

    // Stats
    html += `
      <div class="panel-section">
        <h2>Map Stats</h2>
        <div class="info-row"><span class="label">Seed</span><span class="value">${engine.getSeed()}</span></div>
        <div class="info-row"><span class="label">Regions</span><span class="value">${regions.length}</span></div>
        <div class="info-row"><span class="label">Active factions</span><span class="value">${factions.filter(f=>f.regions.size>0).length}</span></div>
        <div class="info-row"><span class="label">Total cities</span><span class="value">${regions.reduce((s,r)=>s+r.cities.length,0)}</span></div>
      </div>
    `;

    // Event log
    html += `<div class="panel-section"><h2>Event Log</h2><div class="event-log">`;
    for (const ev of events) {
      html += `<div class="event ${ev.type}">${ev.time} — ${ev.msg}</div>`;
    }
    if (events.length === 0) {
      html += `<div class="event">No events yet</div>`;
    }
    html += `</div></div>`;

    sidePanel.innerHTML = html;
  }

  // Global action handlers (called from onclick in rendered HTML)
  window.doConquer = function(factionId, regionId) {
    engine.conquer(factionId, regionId);
  };

  window.doSecede = function(regionId) {
    engine.secede(regionId);
  };

  window.doAlliance = function(absorberId, absorbedId) {
    engine.alliance(absorberId, absorbedId);
    selectedFactionId = null;
    updatePanel();
  };

  window.selectFaction = function(factionId) {
    selectedFactionId = selectedFactionId === factionId ? null : factionId;
    updatePanel();
  };

  // Handle resize
  window.addEventListener('resize', () => engine.renderer.resize());

  // Go
  doGenerate(42);

})();
</script>
</body>
</html>
