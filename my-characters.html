<body data-nav-active="Characters" data-footer-copy="Roll Well. Play Weird." data-breadcrumb="Home|index.html;My Characters">
  <a href="#main-content" class="ps-skip-nav">Skip to content</a>
  <div id="ps-site-shell"></div>
  <div id="ps-page-breadcrumb"></div>

  <div class="ps-page-hero">
    <div class="ps-page-eyebrow">Your Roster</div>
    <div class="ps-page-title">My Characters</div>
    <div class="ps-page-subtitle">All your saved adventurers in one place</div>
  </div>

  <div class="ps-divider"><div class="ps-div-line"></div><div class="ps-div-ornament"><div class="ps-div-dot"></div><div class="ps-div-gem"></div><div class="ps-div-dot"></div></div><div class="ps-div-line r"></div></div>

  <div class="ps-content reveal" id="my-characters-content" style="max-width:1100px;margin:40px auto;padding:0 56px;">

    <!-- Signed-out state -->
    <div id="mc-signed-out" style="text-align:center;padding:60px 0;">
      <p style="font-family:Spectral;font-size:18px;color:var(--text-dim);margin-bottom:32px;">Sign in to view and manage your saved characters.</p>
      <button class="ps-btn ps-btn-primary" id="mc-auth-btn">Sign In</button>
    </div>

    <!-- Signed-in state -->
    <div id="mc-signed-in" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px;">
        <h2 style="font-family:Cinzel;color:var(--text);font-size:20px;margin:0;">Your Characters</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="campaigns.html?tab=dashboard" class="ps-btn ps-btn-primary" style="font-size:14px;background:transparent;border:1px solid var(--border);color:var(--text-muted);">Open Campaign Manager</a>
          <button class="ps-btn ps-btn-primary" id="mc-new-char" style="font-size:14px;">+ New Character</button>
        </div>
      </div>
      <div id="mc-character-list"></div>
    </div>

  </div>

  <div class="ps-divider"><div class="ps-div-line"></div><div class="ps-div-ornament"><div class="ps-div-dot"></div><div class="ps-div-gem"></div><div class="ps-div-dot"></div></div><div class="ps-div-line r"></div></div>

  <div class="fantasy-section-end">◆   ◆   ◆</div>

  <div id="ps-site-footer"></div>

  <script>
    /* ── Character list with cloud sync ─────────────────────────────── */
    var _mcChars = [];  // in-memory character list
    function _escHtml(v) {
      return String(v == null ? '' : v)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderCharacterList() {
      var session   = window.PhmurtDB ? window.PhmurtDB.getSession() : null;
      var signedOut = document.getElementById('mc-signed-out');
      var signedIn  = document.getElementById('mc-signed-in');
      var list      = document.getElementById('mc-character-list');

      if (!session) {
        signedOut.style.display = 'block';
        signedIn.style.display  = 'none';
        return;
      }

      signedOut.style.display = 'none';
      signedIn.style.display  = 'block';

      if (!_mcChars.length) {
        var emptyDiv = document.createElement('div');
        emptyDiv.style.cssText = 'text-align:center;padding:48px 0;font-family:Spectral;font-style:italic;color:var(--text-dim);';
        emptyDiv.textContent = 'No characters yet. ';
        var link = document.createElement('a');
        link.href = 'character-builder.html';
        link.style.color = 'var(--crimson)';
        link.textContent = 'Create your first one →';
        emptyDiv.appendChild(link);
        list.innerHTML = '';
        list.appendChild(emptyDiv);
        return;
      }

      list.innerHTML = '';
      _mcChars.forEach(function (c) {
        var id      = encodeURIComponent(c.id !== undefined ? c.id : '');
        var name    = _escHtml(c.name  || 'Unnamed Character');
        var race    = _escHtml(c.race  || '');
        var cls     = _escHtml(c.class || c.class_ || '');
        var level   = c.level ? '· Level ' + c.level : '';
        // INTEGRATION (V-011): Use edition field if builder_type not present (for backward compatibility)
        var builder = c.builder_type || c.edition || '5e';
        var is35 = builder === '35e' || builder === '3.5';
        var editHref = (is35 ? 'character-builder.html' : 'character-builder.html') + (is35 ? '#35e' : '') + '?load=' + id;

        var card = document.createElement('div');
        card.className = 'ps-sheet-card';
        card.style.cssText = 'margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;';

        var infoDiv = document.createElement('div');
        var titleDiv = document.createElement('div');
        titleDiv.className = 'ps-sheet-title';
        titleDiv.style.marginBottom = '4px';
        titleDiv.textContent = name;
        infoDiv.appendChild(titleDiv);

        var sysDiv = document.createElement('div');
        sysDiv.className = 'ps-sheet-system';
        sysDiv.textContent = race + (race && cls ? ' ' : '') + cls + ' ' + level;
        infoDiv.appendChild(sysDiv);
        card.appendChild(infoDiv);

        var actionsDiv = document.createElement('div');
        actionsDiv.style.cssText = 'display:flex;gap:8px;';

        var editLink = document.createElement('a');
        editLink.href = editHref;
        editLink.className = 'ps-btn ps-btn-primary';
        editLink.style.fontSize = '13px';
        editLink.textContent = 'Edit';
        actionsDiv.appendChild(editLink);

        var delBtn = document.createElement('button');
        delBtn.className = 'mc-delete-char';
        delBtn.setAttribute('data-char-id', id);
        delBtn.style.cssText = 'font-size:13px;padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:4px;cursor:pointer;';
        delBtn.textContent = 'Delete';
        actionsDiv.appendChild(delBtn);

        card.appendChild(actionsDiv);
        list.appendChild(card);
      });
    }

    function loadAndRender() {
      var session = window.PhmurtDB ? window.PhmurtDB.getSession() : null;
      if (!session) { renderCharacterList(); return; }

      // Show loading state
      var list = document.getElementById('mc-character-list');
      if (list) list.innerHTML = '<div style="text-align:center;padding:32px 0;font-family:Spectral;color:var(--text-muted);">Loading…</div>';
      document.getElementById('mc-signed-out').style.display = 'none';
      document.getElementById('mc-signed-in').style.display  = 'block';

      PhmurtDB.getCharacters().then(function (chars) {
        _mcChars = chars || [];
        renderCharacterList();
      }).catch(function () {
        _mcChars = [];
        renderCharacterList();
      });
    }

    window.deleteCharacter = function (id) {
      if (!window.PhmurtDB || !PhmurtDB.getSession()) return;
      if (!confirm('Delete this character? This cannot be undone.')) return;

      PhmurtDB.deleteCharacter(decodeURIComponent(id)).then(function (ok) {
        if (ok) {
          _mcChars = _mcChars.filter(function (c) { return String(c.id) !== decodeURIComponent(id); });
          renderCharacterList();
          if (window.psToast) window.psToast('Character deleted.');
        } else {
          if (window.psToast) window.psToast('Delete failed – please try again.');
        }
      });
    };

    document.addEventListener('DOMContentLoaded', function () {
      loadAndRender();
      window.addEventListener('phmurt-auth-change', loadAndRender);

      // Auth button handler
      var authBtn = document.getElementById('mc-auth-btn');
      if (authBtn) {
        authBtn.addEventListener('click', function () {
          if (window.PhmurtDB) {
            window.PhmurtDB.openAuth();
          }
        });
      }

      // New character button handler
      var newCharBtn = document.getElementById('mc-new-char');
      if (newCharBtn) {
        newCharBtn.addEventListener('click', function (e) {
          e.preventDefault();
          try { localStorage.removeItem('phmurt_current_char_id'); } catch(e) {}
          try { localStorage.removeItem('phmurt_builder_5e'); } catch(e) {}
          try { localStorage.removeItem('phmurt_builder_35e'); } catch(e) {}
          window.location.href = 'character-builder.html';
        });
      }

      // Observe list changes and reattach handlers
      var observer = new MutationObserver(function() {
        attachDeleteHandlers();
      });
      observer.observe(document.getElementById('mc-character-list') || document.body, { childList: true, subtree: true });

      function attachDeleteHandlers() {
        document.querySelectorAll('.mc-delete-char').forEach(function(btn) {
          if (!btn._handlersAttached) {
            btn.addEventListener('click', function(e) {
              e.preventDefault();
              var id = btn.getAttribute('data-char-id');
              if (id) deleteCharacter(decodeURIComponent(id));
            });
            btn._handlersAttached = true;
          }
        });
      }
      attachDeleteHandlers();
    });
  </script>
  <script src="phmurt-shell.js?v=187"></script>
</body>
</html>
