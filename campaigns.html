          {form.sheetName && <span style={{ fontSize:11, color:T.textDim, fontStyle:"italic" }}>{form.sheetName}</span>}
        </div>
      </div>
      <div style={{ display:"flex", gap:8, paddingTop:8, borderTop:`1px solid ${T.border}` }}>
        <CrimsonBtn onClick={submit}><Check size={12}/> {existing ? "Save Changes" : "Join Campaign"}</CrimsonBtn>
        {onCancel && <CrimsonBtn onClick={onCancel} secondary>Cancel</CrimsonBtn>}
      </div>
    </div>
  );
}

// ─── PLAYER CHARACTER CARD (compact display after joining) ──────────────────

function PlayerCard({ member, onEdit, onUploadSheet, isDm }) {
  const [expanded, setExpanded] = useState(false);
  const fileRef = useRef(null);
  const builderHref = cmCharacterBuilderHref(member.sourceCharacterId, member.sourceBuilderType);
  const isLinked = !!member.sourceCharacterId;
  const syncAge = member._lastSyncAt ? Date.now() - member._lastSyncAt : null;
  const syncLabel = syncAge !== null ? (syncAge < 60000 ? "Just synced" : syncAge < 3600000 ? Math.round(syncAge/60000) + "m ago" : syncAge < 86400000 ? Math.round(syncAge/3600000) + "h ago" : "Synced") : null;

  const handleSheet = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    onUploadSheet(member.id, file);
  };

  return (
    <div style={{
      background:T.bgCard, border:`1px solid ${isLinked ? "rgba(16,185,129,0.25)" : T.border}`, borderRadius:"4px",
      boxShadow: isLinked ? "0 2px 8px rgba(16,185,129,0.06)" : "0 2px 8px rgba(0,0,0,0.08)", transition:"all 0.2s", overflow:"hidden",
    }}>
      <input type="file" ref={fileRef} style={{display:"none"}} accept=".pdf,.png,.jpg,.jpeg,.json" onChange={handleSheet} />
      {/* Compact header — always visible */}
      <div onClick={()=>setExpanded(!expanded)} style={{ padding:"16px 20px", cursor:"pointer", display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ width:36, height:36, borderRadius:"50%", background: isLinked ? "rgba(16,185,129,0.08)" : T.crimsonSoft, border:`1px solid ${isLinked ? "rgba(16,185,129,0.3)" : T.crimsonBorder}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, position:"relative" }}>
          <span style={{ fontFamily:T.ui, fontSize:12, color: isLinked ? "#10b981" : T.crimson, fontWeight:500 }}>{member.name.charAt(0)}</span>
          {isLinked && <span title="Linked to Character Builder" style={{ position:"absolute", bottom:-2, right:-2, width:10, height:10, borderRadius:"50%", background:"#10b981", border:"2px solid " + T.bgCard, boxShadow:"0 0 4px rgba(16,185,129,0.4)" }}/>}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:15, color:T.text, fontWeight:300 }}>{member.name}</span>
            <Tag variant="muted">Lv{member.lv} {member.cls}</Tag>
            {isLinked && <span style={{ fontSize:9, color:"#10b981", fontFamily:T.ui, letterSpacing:"1px", textTransform:"uppercase", opacity:0.8 }}>{syncLabel || "Linked"}</span>}
          </div>
          <div style={{ fontSize:11, color:T.textFaint, fontWeight:300, marginTop:2 }}>
            {member.player}{member.race ? ` — ${member.race}` : ""}
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10, flexShrink:0 }}>
          {member.status!=="healthy" && <Tag variant={member.status==="wounded"||member.status==="dead"?"danger":"warning"}>{member.status}</Tag>}
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:11, color:member.hp<member.maxHp*0.3?T.crimson:member.hp<member.maxHp*0.6?"#e8940a":T.textDim, fontWeight:500 }}>{member.hp}/{member.maxHp}</div>
            <div style={{ width:60 }}><HpBar val={member.hp} max={member.maxHp} color={getHpColor(member.hp, member.maxHp)}/></div>
          </div>
          <span style={{ fontFamily:T.ui, fontSize:8, color:T.textFaint, letterSpacing:"1px" }}>AC {member.ac}</span>
          {expanded ? <ChevronUp size={14} color={T.textFaint}/> : <ChevronDown size={14} color={T.textFaint}/>}
        </div>
      </div>

      {/* Expanded detail */}
      {expanded && (
        <div style={{ padding:"0 20px 20px", borderTop:`1px solid ${T.borderMid}` }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:12, paddingTop:16, marginBottom:12 }}>
            {[{l:"HP",v:`${member.hp}/${member.maxHp}`},{l:"AC",v:member.ac},{l:"Level",v:member.lv},{l:"Class",v:member.cls}].map(s=>(
              <div key={s.l} style={{ textAlign:"center", background:T.bg, padding:"10px 8px", borderRadius:"2px", border:`1px solid ${T.border}` }}>
                <span style={{ fontFamily:T.ui, fontSize:7, letterSpacing:"1.5px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:4 }}>{s.l}</span>
                <span style={{ fontSize:14, color:T.crimson, fontWeight:300 }}>{s.v}</span>
              </div>
            ))}
          </div>
          {member.bio && <p style={{ fontSize:13, color:T.textDim, fontStyle:"italic", fontWeight:300, lineHeight:1.7, margin:"0 0 12px" }}>{member.bio}</p>}
          {/* Sync status bar for linked characters */}
          {isLinked && (
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12, padding:"8px 12px", background:"rgba(16,185,129,0.05)", borderRadius:"3px", border:"1px solid rgba(16,185,129,0.15)" }}>
              <span style={{ width:6, height:6, borderRadius:"50%", background:"#10b981", flexShrink:0 }}/>
              <span style={{ fontSize:11, color:"#10b981", fontFamily:T.ui, letterSpacing:"0.5px", flex:1 }}>
                Linked to Character Builder {syncLabel ? `\u00b7 ${syncLabel}` : ""}
              </span>
              {builderHref && (
                <a href={builderHref} target="_blank" rel="noreferrer" style={{ fontSize:10, color:"#10b981", textDecoration:"underline", opacity:0.8 }}>Edit in Builder</a>
              )}
            </div>
          )}
          {member.sheetName && (
            <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:12 }}>
              <FileText size={11} color={T.textFaint}/>
              <a href={member.sheetUrl} target="_blank" rel="noreferrer" style={{ fontSize:11, color:T.crimson, textDecoration:"none" }}>{member.sheetName}</a>
            </div>
          )}
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            <CrimsonBtn onClick={()=>onEdit(member)} secondary small><Edit3 size={10}/> Edit Character</CrimsonBtn>
            <CrimsonBtn onClick={()=>fileRef.current?.click()} secondary small><Upload size={10}/> {member.sheetName?"Replace":"Upload"} Sheet</CrimsonBtn>
            {builderHref && (
              <CrimsonBtn onClick={() => window.open(builderHref, "_blank", "noopener,noreferrer")} secondary small><FileText size={10}/> Open Builder</CrimsonBtn>
            )}
            {isLinked && (
              <CrimsonBtn onClick={() => {
                if (!member.sourceCharacterId || typeof PhmurtDB === "undefined") return;
                PhmurtDB.loadCharacter(member.sourceCharacterId).then(snap => {
                  if (!snap) return;
                  const fields = typeof PhmurtCharSync !== "undefined" ? PhmurtCharSync.extractPartyFields(snap, { id: member.sourceCharacterId }) : null;
                  if (fields) onEdit({ ...member, ...fields, _syncDigest: fields._digest || "", _lastSyncAt: Date.now() });
                });
              }} secondary small><RefreshCw size={10}/> Re-sync</CrimsonBtn>
            )}
            {isDm && (
              <CrimsonBtn onClick={()=>onEdit({...member, _remove:true})} secondary small><Trash2 size={10}/> Remove</CrimsonBtn>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// CAMPAIGN SELECTOR

function CampaignSelector({ campaigns, activeCampaignId, onSelect, onCreate, onDelete }) {
  const [showList, setShowList] = useState(false);

  return (
    <div style={{ position:"relative" }}>
      <button onClick={()=>setShowList(!showList)} style={{
        display:"flex", alignItems:"center", gap:8, background:"transparent", border:`1px solid ${T.border}`,
        padding:"6px 14px", borderRadius:"2px", cursor:"pointer", transition:"all 0.2s",
      }}>
        <span style={{ fontSize:12, color:T.textDim, fontWeight:300 }}>{campaigns.find(c=>c.id===activeCampaignId)?.data.name || "Select Campaign"}</span>
        <ChevronDown size={12} color={T.textFaint}/>
      </button>
      {showList && (
        <div style={{
          position:"absolute", top:"100%", right:0, marginTop:4, width:280,
          background:T.bgCard, border:`1px solid ${T.crimsonBorder}`, borderRadius:"4px",
          boxShadow:"0 8px 24px rgba(0,0,6,0.45)", zIndex:300, overflow:"hidden",
        }}>
          <div style={{ padding:"12px 16px", borderBottom:`1px solid ${T.border}` }}>
            <span style={{ fontFamily:T.ui, fontSize:9, letterSpacing:"2px", color:T.crimson, textTransform:"uppercase" }}>Your Campaigns</span>
          </div>
          <div style={{ maxHeight:240, overflowY:"auto" }}>
            {campaigns.map(c => (
              <div key={c.id} onClick={()=>{onSelect(c.id);setShowList(false);}} style={{
                padding:"10px 16px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center",
                background: c.id===activeCampaignId ? T.crimsonSoft : "transparent",
                borderBottom:`1px solid ${T.borderMid}`, transition:"background 0.15s",
              }}>
                <div>
                  <div style={{ fontSize:13, color:T.text, fontWeight:300 }}>{c.data.name}</div>
                  <div style={{ fontSize:10, color:T.textFaint, fontStyle:"italic" }}>
                    {c.data.party.length} players · {c.data.sessionsPlayed} sessions
                    {c.isExample && " · Example"}
                  </div>
                </div>
                {!c.isExample && c.id !== activeCampaignId && (
                  <button onClick={e=>{e.stopPropagation();onDelete(c.id);}} style={{ background:"none", border:"none", cursor:"pointer", color:T.textFaint, padding:4 }}><Trash2 size={11}/></button>
                )}
              </div>
            ))}
          </div>
          <div onClick={()=>{onCreate();setShowList(false);}} style={{
            padding:"12px 16px", cursor:"pointer", borderTop:`1px solid ${T.border}`,
            display:"flex", alignItems:"center", gap:8, transition:"background 0.15s",
          }}>
            <Plus size={14} color={T.crimson}/>
            <span style={{ fontFamily:T.ui, fontSize:9, letterSpacing:"2px", color:T.crimson, textTransform:"uppercase" }}>New Campaign</span>
          </div>
        </div>
      )}
    </div>
  );
}

// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════

function DashboardView({ data, setData, onNav, activeCampaignId, viewRole }) {
  const isDm = viewRole !== "player";
  const countdown = useCountdown(data.nextSession);
  const active = data.quests.filter(q=>q.status==="active");
  const urgVar = { critical:"critical", high:"danger", medium:"warning", low:"muted" };
  const [joiningParty, setJoiningParty] = useState(false);
  const [editingMember, setEditingMember] = useState(null);
  const [libraryOpen, setLibraryOpen] = useState(false);
  const [libraryChars, setLibraryChars] = useState([]);
  const [libraryLoading, setLibraryLoading] = useState(false);
  const [libraryError, setLibraryError] = useState("");
  const [addingQuest, setAddingQuest] = useState(false);
  const [schedOpen, setSchedOpen] = useState(false);
  const [newQuest, setNewQuest] = useState({ title:"", type:"side", status:"active", urgency:"medium", faction:"", region:"" });
  const [encBuilderOpen, setEncBuilderOpen] = useState(false);
  const [encForm, setEncForm] = useState({ name:"", location:"", notes:"", monsterNames:"", includePartyAll:true, selectedMonsters:[], monsterSearch:"" });

  useEffect(() => {
    if (!libraryOpen) return;
    let cancelled = false;
    const refreshLibrary = () => {
      if (!window.PhmurtDB || typeof window.PhmurtDB.getCharacters !== "function") {
        setLibraryChars([]);
        setLibraryError("Character library is unavailable on this page.");
        setLibraryLoading(false);
        return;
      }
      if (!window.PhmurtDB.getSession || !window.PhmurtDB.getSession()) {
        setLibraryChars([]);
        setLibraryError("Sign in to import from My Characters.");
        setLibraryLoading(false);
        return;
      }

      setLibraryLoading(true);
      setLibraryError("");
      window.PhmurtDB.getCharacters()
        .then(chars => {
          if (cancelled) return;
          setLibraryChars(chars || []);
        })
        .catch(() => {
          if (cancelled) return;
          setLibraryChars([]);
          setLibraryError("Could not load saved characters right now.");
        })
        .then(() => {
          if (!cancelled) setLibraryLoading(false);
        });
    };

    refreshLibrary();
    window.addEventListener("phmurt-auth-change", refreshLibrary);
    return () => {
      cancelled = true;
      window.removeEventListener("phmurt-auth-change", refreshLibrary);
    };
  }, [libraryOpen]);

  // Import listener from generators and other tools
  useEffect(() => {
    const checkImports = () => {
      const key = `phmurt_gen_export_${activeCampaignId}`;
      const raw = localStorage.getItem(key);
      if (!raw) return;
      try {
        const imports = JSON.parse(raw);
        localStorage.removeItem(key);
        if (Array.isArray(imports)) {
          imports.forEach(item => {
            if (item.type === 'npc') {
              setData(d => ({
                ...d,
                npcs: [...(d.npcs || []), {
                  id: uid(),
                  name: item.data.name || "Unnamed NPC",
                  race: item.data.race || "",
                  occupation: item.data.occupation || "",
                  alignment: item.data.alignment || "",
                  personality: item.data.personality || "",
                  backstory: item.data.backstory || "",
                  appearance: item.data.appearance || "",
                  voice: item.data.voice || "",
                  quirk: item.data.quirk || "",
                  _source: 'generator'
                }],
                activity: [{time:"Just now", text:`Imported NPC: ${item.data.name || 'Unnamed'} from Generator`}, ...(d.activity||[])].slice(0,20)
              }));
            }
          });
        }
      } catch(e) {
        console.warn('[Import] Parse error:', e);
      }
    };
    checkImports();
    window.addEventListener('storage', checkImports);
    window.addEventListener('focus', checkImports);
    return () => {
      window.removeEventListener('storage', checkImports);
      window.removeEventListener('focus', checkImports);
    };
  }, [activeCampaignId]);

  const handlePlayerSubmit = (formData) => {
    if (editingMember) {
      if (formData._remove) {
        setData(d=>({...d, party: d.party.filter(p=>p.id!==editingMember.id),
          activity:[{time:"Just now", text:`Removed ${editingMember.name} from party`},...d.activity].slice(0,20)}));
      } else {
        setData(d=>({...d, party: d.party.map(p=>p.id===editingMember.id?{...p,...formData, actorId:p.actorId||("pc-"+p.id)}:p),
          activity:[{time:"Just now", text:`${formData.name} updated their character`},...d.activity].slice(0,20)}));
      }
      setEditingMember(null);
    } else {
      setData(d => {
        const id = uid();
        return { ...d, party: [...d.party, { ...formData, id, actorId: "pc-" + id }],
          activity: [{ time: "Just now", text: `${formData.name} (${formData.player}) joined the party` }, ...d.activity].slice(0, 20) };
      });
      setJoiningParty(false);
    }
  };
  const handleEdit = (member) => setEditingMember(member);
  const handleSheetUpload = (id) => {
    const url = prompt("Paste the Google Sheets / D&D Beyond URL:");
    if(url) setData(d=>({...d, party:d.party.map(p=>p.id===id?{...p,sheetUrl:url,sheetName:url.includes("dndbeyond")?"D&D Beyond":"Google Sheet"}:p)}));
  };
  const importSavedCharacter = (characterMeta) => {
    if (!characterMeta || !characterMeta.id || !window.PhmurtDB || typeof window.PhmurtDB.loadCharacter !== "function") return;
    setLibraryLoading(true);
    setLibraryError("");
    window.PhmurtDB.loadCharacter(characterMeta.id)
      .then(snapshot => {
        if (!snapshot) {
          setLibraryError("Could not open that saved character.");
          return;
        }
        const importedMember = cmSnapshotToPartyMember(characterMeta, snapshot);
        setData(d => ({
          ...d,
          party: [...(d.party || []), importedMember],
          activity: [
            { time: "Just now", text: `Imported ${importedMember.name} from My Characters` },
            ...(d.activity || []),
          ].slice(0, 20),
        }));
        setLibraryOpen(false);
      })
      .catch(() => {
        setLibraryError("Import failed. Please try again.");
      })
      .then(() => setLibraryLoading(false));
  };
  const addQuest = () => {
    if(!newQuest.title) return;
    setData(d=>({...d, quests:[...d.quests,{...newQuest,id:uid()}],
      activity:[{time:"Just now",text:`New quest: ${newQuest.title}`},...d.activity].slice(0,20)}));
    setNewQuest({ title:"", type:"side", status:"active", urgency:"medium", faction:"", region:"" });
    setAddingQuest(false);
  };
  const saveEncounterBlueprint = () => {
    if (!encForm.name.trim()) return;
    const participants = [];
    if (encForm.includePartyAll) participants.push({ type:"partyAll" });
    encForm.selectedMonsters.forEach(m => {
      participants.push({ type:"monster", monsterName: m.name, count: m.count || 1 });
    });
    if (participants.length === 0) return;
    setData(d => ({
      ...d,
      encounters: [...(d.encounters || []), { id: "enc-" + Date.now(), name: encForm.name.trim(), location: encForm.location.trim(), notes: encForm.notes.trim(), participants }],
      activity: [{ time: "Just now", text: `Encounter saved: ${encForm.name.trim()}` }, ...d.activity].slice(0, 20),
    }));
    setEncForm({ name:"", location:"", notes:"", monsterNames:"", includePartyAll:true, selectedMonsters:[], monsterSearch:"" });
    setEncBuilderOpen(false);
  };
  const nextN = data.sessionsPlayed + 1;
  const steps = [
    { done:data.party.length>0, text:"Add party members" },
    { done:data.sessionsPlayed>0, text:"Log your first session" },
    { done:data.regions.length>0, text:"Establish world regions" },
    { done:data.factions.length>0, text:"Create factions" },
    { done:data.npcs.length>0, text:"Add NPCs to the world" },
    { done:data.nextSession, text:"Schedule your next session" },
  ];

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 340px", gap:24, padding:"32px 56px" }}>
      <div style={{ display:"flex", flexDirection:"column", gap:24 }}>
        {/* Stats Row */}
        <div style={{ display:"flex", gap:20 }}>
          {[
            { label:"Sessions", val:data.sessionsPlayed, icon:BookOpen },
            { label:"Quests", val:data.quests.length, icon:Scroll },
            { label:"Party", val:data.party.length, icon:Users },
            { label:"Regions", val:data.regions.length, icon:MapPin },
          ].map((s,i) => (
            <div key={i} style={{ flex:1, padding:"20px 24px", background:T.bgCard, border:`1px solid ${T.border}`, borderRadius:"4px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <s.icon size={14} color={T.crimson}/>
                <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1.5px", color:T.textMuted, textTransform:"uppercase" }}>{s.label}</span>
              </div>
              <span style={{ fontSize:28, color:T.text, fontWeight:300 }}>{s.val}</span>
            </div>
          ))}
        </div>

        {/* Next Session + inline scheduler */}
        <Section>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <span style={{ fontFamily:T.ui, fontSize:9, letterSpacing:"2px", color:T.textMuted, textTransform:"uppercase" }}>Next Session</span>
              <div style={{ fontSize:32, color:T.text, fontWeight:300, margin:"8px 0 4px" }}>
                {data.nextSession ? new Date(data.nextSession).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}) : "Not Scheduled"}
              </div>
              {countdown && countdown !== "Now" && (
                <div style={{ fontFamily:T.ui, fontSize:11, letterSpacing:"1px", color:T.crimson }}>{countdown} remaining</div>
              )}
            </div>
            {isDm && <div style={{ textAlign:"right" }}>
              {!schedOpen ? (
                <LinkBtn onClick={()=>setSchedOpen(true)}><Settings size={10}/> Configure</LinkBtn>
              ) : (
                <LinkBtn onClick={()=>setSchedOpen(false)}><X size={10}/> Close</LinkBtn>
              )}
            </div>}
          </div>
          {schedOpen && (
            <div style={{ marginTop:20, paddingTop:20, borderTop:`1px solid ${T.border}` }}>
              <SessionSchedulerInline data={data} setData={setData} />
            </div>
          )}
        </Section>

        {/* Party */}
        <div>
          <SectionTitle icon={Users} count={data.party.length} action={isDm ? (
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", justifyContent:"flex-end" }}>
              <LinkBtn onClick={()=>setLibraryOpen(true)}><BookOpen size={10}/> Import from Character Builder</LinkBtn>
            </div>
          ) : null}>The Party</SectionTitle>

          {data.party.length === 0 && (
            <Section style={{ textAlign:"center", padding:40 }}>
              <Users size={32} color={T.textFaint} style={{ marginBottom:16 }}/>
              <p style={{ fontSize:14, color:T.textMuted, fontWeight:300, margin:"0 0 16px" }}>{isDm ? "No adventurers yet. Import characters from the Character Builder." : "No adventurers in this campaign yet."}</p>
              {isDm && <CrimsonBtn onClick={()=>setLibraryOpen(true)}><BookOpen size={12}/> Import from Character Builder</CrimsonBtn>}
            </Section>
          )}

          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {data.party.map(p => (
              <PlayerCard key={p.id} member={p} onEdit={isDm ? handleEdit : undefined} onUploadSheet={isDm ? handleSheetUpload : undefined} isDm={isDm} />
            ))}
          </div>
        </div>

        {/* Encounters — deploy from Play → Scenes */}
        <div>
          <SectionTitle icon={Swords} count={(data.encounters || []).length} action={isDm ? (
            <LinkBtn onClick={() => { setEncForm({ name:"", location:"", notes:"", monsterNames:"", includePartyAll:true, selectedMonsters:[], monsterSearch:"" }); setEncBuilderOpen(true); }}><Plus size={10}/> New Encounter</LinkBtn>
          ) : null}>Encounters</SectionTitle>
          <p style={{ fontSize:12, color:T.textMuted, margin:"0 0 12px", fontWeight:300, lineHeight:1.45 }}>Blueprints link the party and SRD monsters to the battlemap. Monster names must match the compendium exactly (e.g. Dire Wolf).</p>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {(data.encounters || []).map(enc => (
              <div key={enc.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, padding:"12px 16px", background:T.bgCard, border:`1px solid ${T.border}`, borderRadius:"4px" }}>
                <div style={{ minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:300, color:T.text }}>{enc.name}</div>
                  <div style={{ fontSize:11, color:T.textFaint, marginTop:4 }}>{enc.location || "—"}{(enc.notes ? " · " + enc.notes.slice(0, 72) + (enc.notes.length > 72 ? "…" : "") : "")}</div>
                </div>
                <LinkBtn onClick={() => onNav("play")}>Open Play <ArrowRight size={10}/></LinkBtn>
              </div>
            ))}
            {(data.encounters || []).length === 0 && (
              <p style={{ fontSize:12, color:T.textFaint, fontStyle:"italic", padding:4 }}>No saved encounters. Create one to spawn tokens in one click during a session.</p>
            )}
          </div>
        </div>

        {/* Quick Tools — Links to generators and other tools (DM only) */}
        {isDm && <div>
          <SectionTitle icon={Wand2}>Quick Tools</SectionTitle>
          <p style={{ fontSize:12, color:T.textMuted, margin:"0 0 12px", fontWeight:300, lineHeight:1.45 }}>Open related tools and import content into your campaign.</p>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(140px, 1fr))", gap:8 }}>
            <LinkBtn onClick={() => window.open(`generators.html?export=campaign&campaignId=${activeCampaignId}`, "_blank", "noopener,noreferrer")} style={{ padding:"12px 16px", textAlign:"center", display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>

/* Expose shared core for lazy-loaded tab modules.
   Each tab module destructures what it needs from window.__CM. */
window.__CM = {
  // Design tokens & constants
  T, cssVar, getHpColor, DND_CONDITIONS, CONDITION_HELP,
  // Atlas data (used by World + Play)
  ATLAS_LAND_PATH, ATLAS_ISLANDS, ATLAS_WATER_BODIES, ATLAS_RIVERS,
  ATLAS_SEA_LABELS, ATLAS_RANGE_LABELS, ATLAS_MOUNTAIN_RANGES,
  ATLAS_PROVINCES, ATLAS_FACTION_SEATS, ATLAS_FREE_SEATS, ATLAS_REGION_LAYOUTS,
  // Core utilities
  normalizeWorldMapState, getFantasyIcon,
  eid, uid, cmClone, cmSafeInt, cmAbilityMod, cmHumanizeKey,
  cmBuilderType, cmCharacterBuilderHref,
  cmLoadCampaignCache, cmSaveCampaignCache, cmReadRoute, cmSyncRoute,
  cmSnapshotToPartyMember,
  // UI primitives
  Tag, HpBar, PowerBar, LinkBtn, CrimsonBtn,
  Section, Input, Select, Textarea, Modal, ToggleSwitch,
  ConfirmFlyout,
  // Sub-components
  DiceRoller, InitiativeTracker, SessionSchedulerInline,
  PlayerCharacterForm, PlayerCard, CampaignSelector,
  // Map icon components (only those defined in core)
  MapIconMountain, MapIconMountainSmall, MapIconCity, MapIconDungeon,
  MapIconForest, MapIconTree, MapIconRuins,
  MapIconCastle, MapIconTown, MapIconHamlet, MapIconKingdom, MapIconRoute,
  // Lucide aliases
  DashboardNavIcon, PlayNavIcon, FilterIcon,
};

/* Tab module loading state */
const _tabModuleState = { dashboard: true, timeline: false, world: false, play: false };
const _tabModulePromises = {};

/**
 * Lazy-load a tab module: fetch JSX, transpile with Babel, execute.
 * The module registers its component on window (e.g. window.CampaignTimelineView).
 */
function loadTabModule(name, url) {
  if (_tabModuleState[name]) return Promise.resolve();
  if (_tabModulePromises[name]) return _tabModulePromises[name];

  _tabModulePromises[name] = fetch(url, { cache: "no-cache" })
    .then(function(r) { return r.text(); })
    .then(function(jsx) {
      var js = Babel.transform(jsx, { presets: ["react"] }).code;
      var script = document.createElement("script");
      // Wrap in IIFE to avoid const/let redeclaration conflicts with main scope
      script.textContent = "(function(){" + js + "\n})();";
      document.head.appendChild(script);
      _tabModuleState[name] = true;
      delete _tabModulePromises[name];
    })
    .catch(function(err) {
      console.error("[LazyLoader] Failed to load " + name + ":", err);
      delete _tabModulePromises[name];
    });

  return _tabModulePromises[name];
}

/* Tab loading spinner — shown while a tab module is being fetched & transpiled */
function TabLoadingSpinner({ label }) {
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:16, color:T.textFaint }}>
      <div style={{ width:32, height:32, border:"2px solid " + T.border, borderTop:"2px solid var(--crimson)", borderRadius:"50%", animation:"cm-spin 0.8s linear infinite" }} />
      <div style={{ fontFamily:T.ui, fontSize:11, letterSpacing:"2px", textTransform:"uppercase" }}>
        {"Loading " + (label || "Module") + "..."}
      </div>
    </div>
  );
}

function App() {
  const route = cmReadRoute();
  const [campaigns, setCampaigns] = useState([]);
  const [activeCampaignId, setActiveCampaignId] = useState(route.campaignId || null);
  const [activeTab, setActiveTab] = useState(route.tab || "dashboard");
  const [loading, setLoading] = useState(true);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [viewRole, setViewRole] = useState(route.role || "dm");
  const [combatAssetsReady, setCombatAssetsReady] = useState(typeof window.CombatEngine !== "undefined");
  // ── Multiplayer: invite codes, campaign members, join flow ──
  const [inviteCodes, setInviteCodes] = useState([]);
  const [campaignMembers, setCampaignMembers] = useState([]);
  const [showInvitePanel, setShowInvitePanel] = useState(false);
  const [joinCode, setJoinCode] = useState("");
  const [joinError, setJoinError] = useState("");
  const [joinSuccess, setJoinSuccess] = useState("");
  const [showJoinModal, setShowJoinModal] = useState(false);
  const [campaignRoles, setCampaignRoles] = useState({}); // { campaignId: "dm"|"player" }

  // ── Lazy tab module readiness ──
  const [tabsReady, setTabsReady] = useState({
    dashboard: true,
    timeline: _tabModuleState.timeline,
    world: _tabModuleState.world,
    play: _tabModuleState.play,
  });

  // ── Background-load all tab modules after Dashboard renders ──
  useEffect(() => {
    const loadInOrder = async () => {
      try {
        // Small modules first, then the big one
        await loadTabModule("timeline", "campaign-timeline.js");
        setTabsReady(function(prev) { return Object.assign({}, prev, { timeline: true }); });

        await loadTabModule("world", "campaign-world.js");
        setTabsReady(function(prev) { return Object.assign({}, prev, { world: true }); });

        await loadTabModule("play", "campaign-play.js");
        setTabsReady(function(prev) { return Object.assign({}, prev, { play: true }); });
      } catch (e) {
        console.error("[App] Background tab loading error:", e);
      }
    };
    // Start background loading after a brief delay to let Dashboard paint
    var tid = setTimeout(loadInOrder, 80);
    return function() { clearTimeout(tid); };
  }, []);

  // ── If user switches to an unloaded tab, prioritize loading it ──
  useEffect(() => {
    if (activeTab === "dashboard" || tabsReady[activeTab]) return;
    var urls = { timeline: "campaign-timeline.js", world: "campaign-world.js", play: "campaign-play.js" };
    loadTabModule(activeTab, urls[activeTab]).then(function() {
      setTabsReady(function(prev) { var n = Object.assign({}, prev); n[activeTab] = true; return n; });
    });
  }, [activeTab, tabsReady]);

  // ── Check for deferred combat script availability ──
  useEffect(() => {
    if (combatAssetsReady) return;
    const check = () => {
      if (typeof window.CombatEngine !== "undefined") { setCombatAssetsReady(true); return true; }
      return false;
    };
    if (check()) return;
    const interval = setInterval(() => { if (check()) clearInterval(interval); }, 150);
    return () => clearInterval(interval);
  }, [combatAssetsReady]);

  // ── Load campaigns from cache on mount ──
  useEffect(() => {
    const cached = cmLoadCampaignCache();
    if (cached && cached.campaigns.length > 0) {
      setCampaigns(cached.campaigns);
      if (cached.activeCampaignId && cached.campaigns.find(c => c.id === cached.activeCampaignId)) {
        setActiveCampaignId(cached.activeCampaignId);
      } else {
        setActiveCampaignId(cached.campaigns[0].id);
      }
    } else {
      const example = { id: "example-1", data: NEW_CAMPAIGN(), isExample: true };
      example.data.name = "Dragon's Reach";
      example.data.party = [
        { id:"p1", name:"Thorn Ironshield", class:"Fighter", level:5, hp:45, maxHp:45, ac:18, speed:30, color:"#3b82f6", portrait:null, stats:{str:18,dex:12,con:16,int:10,wis:13,cha:8} },
        { id:"p2", name:"Elara Nightwhisper", class:"Wizard", level:5, hp:28, maxHp:28, ac:12, speed:30, color:"#a855f7", portrait:null, stats:{str:8,dex:14,con:12,int:20,wis:15,cha:10} },
        { id:"p3", name:"Bran Oakfoot", class:"Cleric", level:5, hp:38, maxHp:38, ac:16, speed:30, color:"#f59e0b", portrait:null, stats:{str:14,dex:10,con:14,int:12,wis:18,cha:13} },
      ];
      setCampaigns([example]);
      setActiveCampaignId(example.id);
    }
    setLoading(false);
  }, []);

  // ── Auto-save campaigns ──
  const saveTimerRef = useRef(null);
  useEffect(() => {
    if (loading || campaigns.length === 0) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      cmSaveCampaignCache(campaigns, activeCampaignId);
    }, CAMPAIGN_SAVE_DELAY_MS);
    return () => clearTimeout(saveTimerRef.current);
  }, [campaigns, activeCampaignId, loading]);

  // ── Sync URL ──
  useEffect(() => {
    if (!loading) cmSyncRoute(activeCampaignId, activeTab);
  }, [activeCampaignId, activeTab, loading]);

  // ── Character Sync: listen for builder pushes and patch party members live ──
  useEffect(() => {
    if (loading || typeof PhmurtCharSync === "undefined") return;
    const handler = (e) => {
      const { characterId, fields } = (e && e.detail) || {};
      if (!characterId || !fields) return;
      const cid = String(characterId);
      setCampaigns(prev => prev.map(camp => {
        if (!camp.data || !Array.isArray(camp.data.party)) return camp;
        let changed = false;
        const newParty = camp.data.party.map(member => {
          if (String(member.sourceCharacterId) !== cid) return member;
          if (member._syncDigest && member._syncDigest === fields._digest) return member;
          changed = true;
          return { ...member,
            name: fields.name || member.name,
            cls: fields.cls || member.cls,
            race: fields.race || member.race,
            lv: fields.lv || member.lv,
            maxHp: fields.maxHp || member.maxHp,
            hp: Math.min(member.hp || member.maxHp, fields.maxHp || member.maxHp),
            ac: fields.ac || member.ac,
            str: fields.str || member.str,
            dex: fields.dex || member.dex,
            con: fields.con,
            bio: fields.bio || member.bio,
            player: fields.player || member.player,
            _syncDigest: fields._digest,
            _lastSyncAt: Date.now(),
          };
        });
        if (!changed) return camp;
        return { ...camp, data: { ...camp.data, party: newParty,
          activity: [{ time: "Just now", text: `${fields.name || "Character"} synced from builder` }, ...(camp.data.activity || [])].slice(0, 40),
        }};
      }));
    };
    window.addEventListener(PhmurtCharSync.EVENT_CHAR_UPDATED, handler);

    /* On mount, check the mailbox for any pending updates from builder saves that happened while this page was closed */
    setCampaigns(prev => prev.map(camp => {
      if (!camp.data || !Array.isArray(camp.data.party)) return camp;
      const patched = PhmurtCharSync.applyPendingUpdates(camp.data.party);
      if (patched === camp.data.party) return camp;
      return { ...camp, data: { ...camp.data, party: patched } };
    }));

    return () => window.removeEventListener(PhmurtCharSync.EVENT_CHAR_UPDATED, handler);
  }, [loading]);

  const activeCampaign = campaigns.find(c => c.id === activeCampaignId);
  const data = activeCampaign?.data || NEW_CAMPAIGN();
  const setData = (updater) => {
    setCampaigns(prev => prev.map(c => c.id === activeCampaignId ? { ...c, data: typeof updater === "function" ? updater(c.data) : updater } : c));
  };

  const handleCreateCampaign = () => {
    const name = prompt("Campaign name:");
    if (!name) return;
    const newCamp = { id: "camp-" + Date.now(), data: { ...NEW_CAMPAIGN(), name }, isExample: false };
    setCampaigns(prev => [...prev, newCamp]);
    setActiveCampaignId(newCamp.id);
    setActiveTab("dashboard");
  };

  const handleDeleteCampaign = (id) => {
    if (!confirm("Delete this campaign permanently?")) return;
    setCampaigns(prev => prev.filter(c => c.id !== id));
    if (activeCampaignId === id) {
      const remaining = campaigns.filter(c => c.id !== id);
      setActiveCampaignId(remaining.length > 0 ? remaining[0].id : null);
    }
  };

  const handlePartyUpdate = (partyId, patch) => {
    setData(d => {
      const updated = d.party.map(p => p.id === partyId ? { ...p, ...patch } : p);
      /* ── Bidirectional sync: push HP/condition changes back to builder ── */
      if (typeof PhmurtCharSync !== "undefined") {
        const member = updated.find(p => p.id === partyId);
        if (member && member.sourceCharacterId) {
          PhmurtCharSync.pushCampaignState(member.sourceCharacterId, activeCampaignId, {
            hp: member.hp, maxHp: member.maxHp,
            conditions: member.conditions || [],
            tempHp: member.tempHp || 0,
            status: member.status || "healthy",
          });
        }
      }
      return { ...d, party: updated };
    });
  };

  // ── Multiplayer: load roles from getMyCampaigns and determine viewRole per campaign ──
  useEffect(() => {
    if (loading || typeof PhmurtDB === "undefined" || typeof PhmurtDB.getMyCampaigns !== "function") return;
    PhmurtDB.getMyCampaigns().then(function(cloudCampaigns) {
      if (!cloudCampaigns || cloudCampaigns.length === 0) return;
      var roles = {};
      cloudCampaigns.forEach(function(c) { if (c.id && c._role) roles[c.id] = c._role; });
      setCampaignRoles(roles);
      // Merge cloud campaigns into local cache
      setCampaigns(function(prev) {
        var seen = {};
        prev.forEach(function(c) { seen[c.id] = true; });
        var newOnes = cloudCampaigns.filter(function(c) { return !seen[c.id]; }).map(function(c) {
          return { id: c.id, data: c.data || NEW_CAMPAIGN(), _role: c._role };
        });
        return newOnes.length > 0 ? prev.concat(newOnes) : prev;
      });
    });
  }, [loading]);

  // ── Set viewRole based on campaign membership when switching campaigns ──
  useEffect(() => {
    if (!activeCampaignId || route.role) return; // URL override takes precedence
    var role = campaignRoles[activeCampaignId];
    if (role === "player") setViewRole("player");
    else if (role === "dm") setViewRole("dm");
  }, [activeCampaignId, campaignRoles]);

  // ── Auto-redirect players away from DM-only tabs ──
  useEffect(() => {
    if (viewRole === "player" && !["play","timeline","dashboard"].includes(activeTab)) setActiveTab("play");
  }, [viewRole]);

  // ── Load invite codes + members when opening invite panel ──
  useEffect(() => {
    if (!showInvitePanel || !activeCampaignId) return;
    if (typeof PhmurtDB === "undefined") return;
    PhmurtDB.getInviteCodes(activeCampaignId).then(setInviteCodes);
    PhmurtDB.getCampaignMembers(activeCampaignId).then(setCampaignMembers);
  }, [showInvitePanel, activeCampaignId]);

  const handleCreateInvite = () => {
    if (typeof PhmurtDB === "undefined" || typeof PhmurtDB.createInviteCode !== "function" || !activeCampaignId) return;
    PhmurtDB.createInviteCode(activeCampaignId).then(function(code) {
      if (code) {
        setInviteCodes(function(prev) { return [{ code: code, use_count: 0, created_at: new Date().toISOString() }].concat(prev); });
      }
    });
  };

  const handleDeleteInvite = (inviteId) => {
    if (typeof PhmurtDB === "undefined" || typeof PhmurtDB.deleteInviteCode !== "function") return;
    PhmurtDB.deleteInviteCode(inviteId).then(function(ok) {
      if (ok) setInviteCodes(function(prev) { return prev.filter(function(c) { return c.id !== inviteId; }); });
    });
  };

  const handleJoinByCode = () => {
    if (!joinCode.trim()) return;
    setJoinError(""); setJoinSuccess("");
    if (typeof PhmurtDB === "undefined") { setJoinError("Not signed in."); return; }
    PhmurtDB.joinCampaignByCode(joinCode.trim()).then(function(result) {
      if (result && result.success !== false && result.campaign_id) {
        setJoinSuccess("Joined! Loading campaign...");
        setCampaignRoles(function(prev) { var n = Object.assign({}, prev); n[result.campaign_id] = "player"; return n; });
        // Reload to get the full campaign
        PhmurtDB.getMyCampaigns().then(function(all) {
          var camp = all.find(function(c) { return c.id === result.campaign_id; });
          if (camp) {
            setCampaigns(function(prev) {
              if (prev.find(function(c) { return c.id === camp.id; })) return prev;
              return prev.concat([{ id: camp.id, data: camp.data || NEW_CAMPAIGN(), _role: "player" }]);
            });
            setActiveCampaignId(camp.id);
            setViewRole("player");
            setActiveTab("play");
            setShowJoinModal(false);
            setJoinCode("");
          }
        });
      } else {
        setJoinError((result && result.error) || "Invalid or expired code.");
      }
    });
  };

  const getInviteLink = (code) => {
    var base = window.location.origin + window.location.pathname;
    return base + "?campaign=" + activeCampaignId + "&role=player&invite=" + code;
  };

  // ── Check URL for invite code on mount ──
  useEffect(() => {
    var params = new URLSearchParams(window.location.search);
    var inviteParam = params.get("invite");
    if (inviteParam && typeof PhmurtDB !== "undefined") {
      PhmurtDB.joinCampaignByCode(inviteParam).then(function(result) {
        if (result && result.success !== false && result.campaign_id) {
          setCampaignRoles(function(prev) { var n = Object.assign({}, prev); n[result.campaign_id] = "player"; return n; });
          setActiveCampaignId(result.campaign_id);
          setViewRole("player");
          setActiveTab("play");
          // Clean the URL
          params.delete("invite");
          window.history.replaceState(null, "", window.location.pathname + "?" + params.toString());
        }
      });
    }
  }, []);

  const allNavItems = [
    { id:"dashboard", label:"Dashboard", icon: DashboardNavIcon, roles:["dm","player"] },
    { id:"timeline", label:"Timeline", icon: Clock, roles:["dm","player"] },
    { id:"world", label:"World", icon: Globe, roles:["dm"] },
    { id:"play", label:"Play", icon: PlayNavIcon, roles:["dm","player"] },
  ];
  const navItems = allNavItems.filter(function(item) { return item.roles.includes(viewRole); });

  if (loading) {
    return (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh", background:"var(--bg)", color:T.textFaint, fontFamily:T.ui, fontSize:14, letterSpacing:"2px" }}>
        Loading...
      </div>
    );
  }

  return (
    <div style={{ display:"flex", height:"100vh", background:"var(--bg)", overflow:"hidden" }}>
      {/* Left Navigation Rail */}
      <div style={{
        width: sidebarCollapsed ? 52 : 200,
        minWidth: sidebarCollapsed ? 52 : 200,
        background:"var(--bg-nav)",
        borderRight:"1px solid var(--crimson-border)",
        display:"flex", flexDirection:"column",
        transition:"width 0.25s ease, min-width 0.25s ease",
        overflow:"hidden", flexShrink:0,
      }}>
        {/* Logo / Title */}
        <div style={{ padding: sidebarCollapsed ? "16px 8px" : "16px 18px", borderBottom:"1px solid " + T.border, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          {!sidebarCollapsed && (
            <div>
              <div style={{ fontFamily:T.heading, fontSize:16, color:T.text, letterSpacing:"1.5px" }}>Campaign</div>
              <div style={{ fontFamily:T.ui, fontSize:8, color:T.crimson, letterSpacing:"2px", textTransform:"uppercase", marginTop:2 }}>Manager</div>
            </div>
          )}
          <button onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
            style={{ background:"none", border:"none", cursor:"pointer", color:T.textFaint, padding:4 }}>
            {sidebarCollapsed ? <ChevronRight size={14}/> : <ChevronLeft size={14}/>}
          </button>
        </div>

        {/* Campaign Selector */}
        {!sidebarCollapsed && (
          <div style={{ padding:"12px 14px", borderBottom:"1px solid " + T.border }}>
            <CampaignSelector
              campaigns={campaigns}
              activeCampaignId={activeCampaignId}
              onSelect={setActiveCampaignId}
              onCreate={handleCreateCampaign}
              onDelete={handleDeleteCampaign}
            />
          </div>
        )}

        {/* Nav Items */}
        <div style={{ flex:1, padding:"8px 6px", display:"flex", flexDirection:"column", gap:2 }}>
          {navItems.map(item => {
            const Icon = item.icon;
            const isActive = activeTab === item.id;
            return (
              <button key={item.id} onClick={() => setActiveTab(item.id)}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.background="rgba(255,255,255,0.03)"; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.background="transparent"; }}
                style={{
                  display:"flex", alignItems:"center", gap:10,
                  padding: sidebarCollapsed ? "10px 0" : "10px 12px",
                  justifyContent: sidebarCollapsed ? "center" : "flex-start",
                  background: isActive ? "rgba(212,67,58,0.08)" : "transparent",
                  border:"none", borderLeft: isActive ? "3px solid var(--crimson)" : "3px solid transparent",
                  borderRadius:"0 6px 6px 0", cursor:"pointer", transition:"all 0.15s", width:"100%",
                }}>
                <Icon size={16} color={isActive ? "var(--crimson)" : T.textMuted} strokeWidth={isActive ? 2 : 1.5} />
                {!sidebarCollapsed && (
                  <span style={{ fontFamily:T.ui, fontSize:10, letterSpacing:"1.5px", textTransform:"uppercase", color: isActive ? "var(--crimson)" : T.textMuted, fontWeight: isActive ? 600 : 400 }}>
                    {item.label}
                  </span>
                )}
              </button>
            );
          })}
        </div>

        {/* View Role Toggle */}
        {!sidebarCollapsed && (
          <div style={{ padding:"12px 14px", borderTop:"1px solid " + T.border }}>
            <div style={{ display:"flex", gap:4 }}>
              {["dm","player"].map(r => (
                <button key={r} onClick={() => setViewRole(r)}
                  style={{ flex:1, padding:"6px", background: viewRole === r ? "rgba(212,67,58,0.1)" : "transparent", border:"1px solid " + (viewRole === r ? "rgba(212,67,58,0.3)" : T.border), borderRadius:"4px", cursor:"pointer", color: viewRole === r ? "var(--crimson)" : T.textFaint, fontFamily:T.ui, fontSize:8, letterSpacing:"1px", textTransform:"uppercase" }}>
                  {r === "dm" ? "DM" : "Player"}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ── Multiplayer: Invite Players / Join Campaign ── */}
        {!sidebarCollapsed && (
          <div style={{ padding:"8px 14px 12px", borderTop:"1px solid " + T.border }}>
            {viewRole === "dm" && (
              <button onClick={() => setShowInvitePanel(!showInvitePanel)}
                style={{ width:"100%", padding:"7px 8px", background:"rgba(94,224,154,0.06)", border:"1px solid rgba(94,224,154,0.15)", borderRadius:"4px", cursor:"pointer", color:"#5ee09a", fontFamily:T.ui, fontSize:8, letterSpacing:"1px", textTransform:"uppercase", display:"flex", alignItems:"center", justifyContent:"center", gap:5 }}>
                <Link size={10}/> Invite Players
              </button>
            )}
            <button onClick={() => setShowJoinModal(true)}
              style={{ width:"100%", padding:"7px 8px", marginTop:4, background:"rgba(201,168,76,0.06)", border:"1px solid rgba(201,168,76,0.15)", borderRadius:"4px", cursor:"pointer", color:"#c9a84c", fontFamily:T.ui, fontSize:8, letterSpacing:"1px", textTransform:"uppercase", display:"flex", alignItems:"center", justifyContent:"center", gap:5 }}>
              <Plus size={10}/> Join Campaign
            </button>
          </div>
        )}
      </div>

      {/* Main Content Area — gradient extends full page */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", minWidth:0, overflow:"hidden", position:"relative", background:"radial-gradient(ellipse at 20% 0%, var(--crimson-soft) 0%, transparent 55%), var(--bg)" }}>
        {activeTab === "dashboard" && <DashboardView data={data} setData={setData} onNav={setActiveTab} activeCampaignId={activeCampaignId} viewRole={viewRole} />}
        {activeTab === "timeline" && (
          tabsReady.timeline && window.CampaignTimelineView
            ? React.createElement(window.CampaignTimelineView, { data: data, setData: setData, onNav: setActiveTab, viewRole: viewRole })
            : <TabLoadingSpinner label="Timeline" />
        )}
        {activeTab === "world" && (
          tabsReady.world && window.CampaignWorldView
            ? React.createElement(window.CampaignWorldView, { data: data, setData: setData, onNav: setActiveTab, viewRole: viewRole })
            : <TabLoadingSpinner label="World" />
        )}
        {activeTab === "play" && (
          tabsReady.play && window.CampaignBattlemap && combatAssetsReady ? (
            React.createElement(window.CampaignBattlemapErrorBoundary || "div", null,
              React.createElement(window.CampaignBattlemap, {
                party: data.party || [],
                npcs: data.npcs || [],
                viewRole: viewRole,
                setViewRole: setViewRole,
                activeCampaignId: activeCampaignId,
                onPartyUpdate: handlePartyUpdate,
                setData: setData,
                campaignEncounters: data.encounters || [],
              })
            )
          ) : (
            <TabLoadingSpinner label={!tabsReady.play ? "Play" : "Combat Engine"} />
          )
        )}
      </div>

      {/* ══ Invite Players Modal ══ */}
      {showInvitePanel && (
        <Modal open={true} onClose={() => setShowInvitePanel(false)} title="Invite Players" wide>
          <div style={{ padding:"20px" }}>
            <div style={{ marginBottom:20 }}>
              <p style={{ fontFamily:T.body, fontSize:13, color:T.textMuted, marginBottom:12 }}>
                Generate an invite code or shareable link. Players who join will see only what you choose to reveal.
              </p>
              <CrimsonBtn onClick={handleCreateInvite}><Plus size={12}/> Generate Invite Code</CrimsonBtn>
            </div>

            {inviteCodes.length > 0 && (
              <div style={{ marginBottom:20 }}>
                <div style={{ fontFamily:T.ui, fontSize:9, letterSpacing:"1.5px", textTransform:"uppercase", color:T.textFaint, marginBottom:10 }}>Active Codes</div>
                {inviteCodes.map((inv, i) => (
                  <div key={inv.id || i} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", background:"rgba(255,255,255,0.02)", border:"1px solid " + T.border, borderRadius:8, marginBottom:6 }}>
                    <code style={{ fontFamily:"monospace", fontSize:15, fontWeight:700, color:"#5ee09a", flex:1, letterSpacing:"1px" }}>{inv.code}</code>
                    <button onClick={() => { navigator.clipboard.writeText(inv.code); }} title="Copy code"
                      style={{ background:"rgba(94,224,154,0.08)", border:"1px solid rgba(94,224,154,0.2)", borderRadius:6, padding:"5px 10px", cursor:"pointer", color:"#5ee09a", fontFamily:T.ui, fontSize:8, letterSpacing:"0.5px" }}>Copy Code</button>
                    <button onClick={() => { navigator.clipboard.writeText(getInviteLink(inv.code)); }} title="Copy link"
                      style={{ background:"rgba(201,168,76,0.08)", border:"1px solid rgba(201,168,76,0.2)", borderRadius:6, padding:"5px 10px", cursor:"pointer", color:"#c9a84c", fontFamily:T.ui, fontSize:8, letterSpacing:"0.5px" }}>Copy Link</button>
                    {inv.id && <button onClick={() => handleDeleteInvite(inv.id)} title="Delete"
                      style={{ background:"rgba(239,68,68,0.06)", border:"1px solid rgba(239,68,68,0.15)", borderRadius:6, padding:"5px 8px", cursor:"pointer", color:"#ef4444", fontSize:10 }}><X size={10}/></button>}
                  </div>
                ))}
              </div>
            )}

            {campaignMembers.length > 0 && (
              <div>
                <div style={{ fontFamily:T.ui, fontSize:9, letterSpacing:"1.5px", textTransform:"uppercase", color:T.textFaint, marginBottom:10 }}>Members</div>
                {campaignMembers.map((m, i) => (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 14px", background:"rgba(255,255,255,0.015)", border:"1px solid " + T.border, borderRadius:6, marginBottom:4 }}>
                    <span style={{ fontFamily:T.ui, fontSize:11, color:T.text, flex:1 }}>{m.profiles?.name || m.profiles?.email || m.user_id?.substring(0,8)}</span>
                    <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", textTransform:"uppercase", color: m.role === "dm" ? "#c9a84c" : "#5ee09a", background: m.role === "dm" ? "rgba(201,168,76,0.08)" : "rgba(94,224,154,0.08)", padding:"2px 8px", borderRadius:999 }}>{m.role}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </Modal>
      )}

      {/* ══ Join Campaign Modal ══ */}
      {showJoinModal && (
        <Modal open={true} onClose={() => { setShowJoinModal(false); setJoinError(""); setJoinSuccess(""); setJoinCode(""); }} title="Join a Campaign">
          <div style={{ padding:"20px" }}>
            <p style={{ fontFamily:T.body, fontSize:13, color:T.textMuted, marginBottom:16 }}>
              Enter the invite code your DM shared with you.
            </p>
            <div style={{ display:"flex", gap:8, marginBottom:12 }}>
              <input type="text" value={joinCode} onChange={e => setJoinCode(e.target.value)} placeholder="Enter invite code..."
                onKeyDown={e => { if (e.key === "Enter") handleJoinByCode(); }}
                style={{ flex:1, padding:"10px 14px", fontFamily:"monospace", fontSize:15, background:"rgba(255,255,255,0.02)", border:"1px solid " + T.border, borderRadius:8, color:T.text, letterSpacing:"1px", outline:"none" }} />
              <CrimsonBtn onClick={handleJoinByCode}>Join</CrimsonBtn>
            </div>
            {joinError && <div style={{ padding:"8px 12px", background:"rgba(239,68,68,0.06)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:6, color:"#ef4444", fontFamily:T.body, fontSize:12, marginBottom:8 }}>{joinError}</div>}
            {joinSuccess && <div style={{ padding:"8px 12px", background:"rgba(94,224,154,0.06)", border:"1px solid rgba(94,224,154,0.2)", borderRadius:6, color:"#5ee09a", fontFamily:T.body, fontSize:12, marginBottom:8 }}>{joinSuccess}</div>}
          </div>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════════════════
const root = ReactDOM.createRoot(document.getElementById("campaign-root"));
root.render(React.createElement(App));

  </script>
</body>
</html>
