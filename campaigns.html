/* ═══════════════════════════════════════════════════════════════════════════
   ENHANCED COMBAT LOG SIDEBAR — detailed roll breakdowns, expandable entries
   ═══════════════════════════════════════════════════════════════════════════ */
const EnhancedCombatLogSidebar = ({ open, entries, round, viewRole, onClose, onClear, getTokenById }) => {
  const [expandedIds, setExpandedIds] = React.useState({});
  const scrollRef = React.useRef(null);
  const CFUI = typeof window.CombatFlowUI !== "undefined" ? window.CombatFlowUI : null;

  // Auto-scroll to top when new entries arrive
  React.useEffect(() => {
    if (scrollRef.current && entries.length > 0) {
      scrollRef.current.scrollTop = 0;
    }
  }, [entries.length]);

  const toggleExpand = (id) => setExpandedIds(prev => ({ ...prev, [id]: !prev[id] }));

  const formatEntry = (entry) => {
    if (!CFUI) {
      // Fallback: basic format
      return {
        id: entry.id, time: entry.time, type: entry.type,
        icon: "⚔️", color: "#f4ead6",
        headline: entry.text || entry.action || (entry.attacker ? (entry.attacker + " → " + (entry.target || "?")) : "Event"),
        sublines: entry.damage ? [{ text: entry.damage + " damage", accent: "#dc143c", bold: true }] : [],
        expandable: false,
      };
    }
    return CFUI.formatLogEntry(entry, viewRole, getTokenById);
  };

  return (
    <div className={"cm-log-sidebar" + (open ? "" : " is-hidden")}>
      <div className="cm-log-sidebar-header">
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span className="cm-log-sidebar-title">Combat Log</span>
          <span style={{ font: "400 8px/1 'Spectral', serif", color: T.textFaint }}>
            Round {round} · {entries.length} events
          </span>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <button type="button" className="cm-log-sidebar-close" onClick={onClear}>Clear</button>
          <button type="button" className="cm-log-sidebar-close" onClick={onClose}>
            <X size={10} />
          </button>
        </div>
      </div>

      <div className="cm-log-entries" ref={scrollRef}>
        {entries.length === 0 ? (
          <div style={{ font: "400 11px/1.4 'Spectral', serif", color: T.textMuted, padding: "16px 8px", textAlign: "center" }}>
            No events yet. Actions will appear here as combat unfolds.
          </div>
        ) : entries.map((entry, idx) => {
          const fmt = formatEntry(entry);
          if (!fmt) return null;
          const isExpanded = !!expandedIds[entry.id];
          const hasDetails = fmt.expandable && fmt.sublines && fmt.sublines.length > 0;

          // Insert round dividers
          const prevEntry = entries[idx - 1];
          const showRoundDivider = entry.type === "round" || (idx === 0 && round > 1);

          return (
            <React.Fragment key={entry.id}>
              {entry.type === "round" && (
                <div className="cm-log-round-divider">
                  <span className="cm-log-round-label">{entry.text || "Round " + (entry.round || "?")}</span>
                </div>
              )}
              {entry.type !== "round" && (
                <div className={"cm-log-entry-card" + (isExpanded ? " is-expanded" : "")}
                  onClick={() => hasDetails && toggleExpand(entry.id)}>
                  <div className="cm-log-entry-headline">
                    <span className="cm-log-entry-icon">{fmt.icon}</span>
                    <span className="cm-log-entry-text" style={{ color: fmt.color }}>{fmt.headline}</span>
                    <span className="cm-log-entry-time">{fmt.time}</span>
                  </div>

                  {/* Expandable details */}
                  {isExpanded && hasDetails && (
                    <div className="cm-log-entry-details">
                      {fmt.sublines.map((line, li) => (
                        <div key={"sl-" + li}
                          className={"cm-log-entry-detail-line" + (line.bold ? " is-bold" : "")}
                          style={{ color: line.accent || T.textMuted }}>
                          {line.text}
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Expand indicator */}
                  {hasDetails && !isExpanded && (
                    <div style={{ marginTop: 3, paddingLeft: 20, font: "400 8px/1 'Cinzel', serif", color: T.textFaint, letterSpacing: "0.6px" }}>
                      Click to expand
                    </div>
                  )}
                </div>
              )}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   ENHANCED ACTION PANEL — categorized D&D 5e actions with economy tracking
   ═══════════════════════════════════════════════════════════════════════════ */
const EnhancedActionPanel = ({ visible, token, turnState, viewRole, onSelectAction, onSelectCategory, selectedCategory, onEndTurn, onMove, moveLabel, actionCards }) => {
  const [activeTab, setActiveTab] = useState("common");
  const [spellLevelTab, setSpellLevelTab] = useState("all");
  const [hoveredCard, setHoveredCard] = useState(null);

  if (!visible || !token) return null;

  const CFUI = typeof window.CombatFlowUI !== "undefined" ? window.CombatFlowUI : null;
  const avail = CFUI ? CFUI.getAvailableActions(turnState) : { action: true, bonus: true, reaction: true, move: true, moveFt: 30 };
  const moveDisabled = !avail.move;

  /* Group action cards by panel type */
  const cards = actionCards || [];
  const weaponCards = cards.filter(c => c.panel === "Attack" || c.panel === "Multiattack" || c.panel === "Save / AoE");
  const spellCards = cards.filter(c => c.panel === "Spell");
  const featureCards = cards.filter(c => c.panel === "Class Feature" || c.panel === "Legendary");
  const otherCards = cards.filter(c => c.panel === "Other" || c.panel === "Utility");

  /* ── "Common" tab: BG3-style top 5 most-used actions ── */
  /* Priority: first weapon attack, then core D&D actions (Dash, Dodge, Disengage, Shove/Hide) */
  const COMMON_ACTION_NAMES = ["dash", "dodge", "disengage", "shove", "hide"];
  const commonCards = (() => {
    const result = [];
    /* First: primary weapon attack (first weapon card) */
    if (weaponCards.length > 0) result.push(weaponCards[0]);
    /* Then: core actions by priority */
    COMMON_ACTION_NAMES.forEach(name => {
      if (result.length >= 5) return;
      const found = otherCards.find(c => (c.label || "").toLowerCase().includes(name));
      if (found) result.push(found);
    });
    /* Fill remaining slots with weapon attacks */
    if (result.length < 5) {
      weaponCards.slice(1).forEach(c => { if (result.length < 5 && !result.includes(c)) result.push(c); });
    }
    /* Fill any remaining with other utility actions */
    if (result.length < 5) {
      otherCards.forEach(c => { if (result.length < 5 && !result.includes(c)) result.push(c); });
    }
    return result.slice(0, 5);
  })();

  /* Organize spells by level */
  const spellsByLevel = {};
  spellCards.forEach(c => {
    const lv = c.data?.spell?.level ?? 0;
    if (!spellsByLevel[lv]) spellsByLevel[lv] = [];
    spellsByLevel[lv].push(c);
  });
  const spellLevels = Object.keys(spellsByLevel).map(Number).sort((a, b) => a - b);

  const getFilteredSpells = () => {
    if (spellLevelTab === "all") return spellCards;
    const lv = parseInt(spellLevelTab, 10);
    return spellsByLevel[lv] || [];
  };

  const tabs = [
    { id: "common", label: "Common", count: commonCards.length, accent: "var(--action-color-weapon, #ef4444)" },
    { id: "weapons", label: "Attack", count: weaponCards.length, accent: "var(--action-color-weapon, #ef4444)" },
    { id: "actions", label: "Actions", count: otherCards.length, accent: "var(--action-color-action, #dc143c)" },
    { id: "spells", label: "Spells", count: spellCards.length, accent: "var(--action-color-spell, #a78bfa)" },
    { id: "features", label: "Features", count: featureCards.length, accent: "var(--action-color-feature, #f59e0b)" },
  ];

  const getActiveCards = () => {
    switch (activeTab) {
      case "common": return commonCards;
      case "actions": return otherCards;
      case "weapons": return weaponCards;
      case "spells": return getFilteredSpells();
      case "features": return featureCards;
      default: return [];
    }
  };

  const costColor = (type) => {
    if (type === "action") return "var(--cost-action, #22c55e)";
    if (type === "bonus") return "var(--cost-bonus, #f97316)";
    if (type === "reaction") return "var(--cost-reaction, #a78bfa)";
    if (type === "special") return "var(--cost-special, #6b7280)";
    return "var(--text-faint, #94a3b8)";
  };

  const costLabel = (type) => {
    if (type === "action") return "A";
    if (type === "bonus") return "B";
    if (type === "reaction") return "R";
    return "F";
  };

  const activeAccent = tabs.find(t => t.id === activeTab)?.accent || "var(--crimson)";

  const renderCard = (card, accentOverride) => (
    <button key={card.id} type="button"
      className={"cm-action-card" + (card.disabled ? " is-disabled" : "")}
      style={{ "--action-color": accentOverride || activeAccent }}
      disabled={card.disabled}
      onClick={() => onSelectAction && onSelectAction(card)}
      onMouseEnter={() => setHoveredCard(card)}
      onMouseLeave={() => setHoveredCard(null)}
      title={card.disabled ? card.helper : card.effect}>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ fontSize: 11, fontWeight: 700, width: 18, height: 18, lineHeight: "18px", textAlign: "center", borderRadius: 4, color: costColor(card.actionType), background: "color-mix(in srgb, " + costColor(card.actionType) + " 15%, transparent)" }}>{costLabel(card.actionType)}</span>
        <span className="cm-action-card-label" style={{ flex: 1 }}>{card.label}</span>
        {card.data?.spell?.level > 0 && <span style={{ fontSize: 9, color: "var(--text-faint)", fontFamily: "monospace" }}>L{card.data.spell.level}</span>}
        {card.range && card.range !== "Self" && !card.data?.spell && <span style={{ fontSize: 9, color: "var(--text-faint)" }}>{card.range}</span>}
      </div>
      <span style={{ fontSize: 12, color: "var(--text-muted, #94a3b8)", fontStyle: "italic", marginTop: 3, display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{card.effect}</span>
    </button>
  );

  const emptyMessages = {
    common: "Your most-used actions at a glance. Link a character to see attacks, Dash, Dodge, and more.",
    weapons: "No weapons equipped. Link a character from the builder to see attack options.",
    actions: "Standard D&D 5e actions: Dash, Dodge, Disengage, Hide, Help, Ready, Search, and Use an Object.",
    spells: "No spells known. Link a character from the builder to see their spells.",
    features: "No class features available at this level.",
  };

  return (
    <div className={"cm-action-panel" + (visible ? "" : " is-hidden")}>
      {/* ── Turn Flow Header: Name + Step Tracker + End Turn ── */}
      <div className="cm-action-panel-header">
        <div style={{ display: "flex", alignItems: "center", gap: 12, flex: 1 }}>
          <span className="cm-action-panel-title">{token.name}</span>
          {/* Turn Flow Steps */}
          <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
            {[
              { key: "move", label: "MOVE", sub: (avail.moveFt || 0) + "ft", ready: avail.move, color: "var(--action-color-movement, #29b6f6)", onClick: onMove },
              { key: "action", label: "ACTION", sub: avail.action ? "Ready" : "Spent", ready: avail.action, color: "var(--action-color-action, #dc143c)", onClick: null },
              { key: "bonus", label: "BONUS", sub: avail.bonus ? "Ready" : "Spent", ready: avail.bonus, color: "var(--action-color-bonus, #ffa726)", onClick: null },
              { key: "react", label: "REACT", sub: avail.reaction ? "Ready" : "Spent", ready: avail.reaction, color: "var(--action-color-reaction, #ab47bc)", onClick: null },
            ].map((step, i, arr) => (
              <React.Fragment key={step.key}>
                <button type="button" onClick={step.onClick || undefined} disabled={!step.ready}
                  style={{
                    display:"flex", flexDirection:"column", alignItems:"center", gap:1,
                    padding:"4px 10px", borderRadius:8, cursor: step.onClick && step.ready ? "pointer" : "default",
                    background: step.ready ? "color-mix(in srgb, " + step.color + " 12%, transparent)" : "var(--bg-hover-subtle, rgba(0,0,0,0.05))",
                    border: "1.5px solid " + (step.ready ? step.color : "transparent"),
                    opacity: step.ready ? 1 : 0.4,
                    transition: "all 0.15s ease",
                  }}>
                  <span style={{ fontFamily:T.ui, fontSize:8, fontWeight:700, letterSpacing:"1px", color: step.ready ? step.color : "var(--text-faint)" }}>{step.label}</span>
                  <span style={{ fontFamily:"'Spectral',serif", fontSize:7, color:"var(--text-faint)" }}>{step.sub}</span>
                </button>
                {i < arr.length - 1 && (
                  <span style={{ color:"var(--text-faint)", fontSize:8, margin:"0 1px" }}>{"\u203A"}</span>
                )}
              </React.Fragment>
            ))}
          </div>
        </div>
        <button type="button" className="cm-action-card"
          style={{ "--action-color": "var(--action-color-endturn, #5ee09a)", padding: "6px 16px", minWidth: "auto", borderRadius: 8 }}
          onClick={onEndTurn} title="End Turn (E)">
          <span style={{ fontSize: 11, fontWeight: 700, color: "var(--action-color-endturn, #5ee09a)", letterSpacing: "1px" }}>END TURN</span>
        </button>
      </div>

      {/* Main tab bar */}
      <div className="cm-action-tabs">
        {tabs.map(tab => (
          <button key={tab.id} type="button"
            className={"cm-action-tab" + (activeTab === tab.id ? " is-active" : "")}
            style={activeTab === tab.id ? { "--tab-accent": tab.accent } : {}}
            onClick={() => setActiveTab(tab.id)}>
            <span>{tab.label}</span>
            {tab.count > 0 && <span className="cm-action-tab-count" style={{ background: "color-mix(in srgb, " + tab.accent + " 15%, transparent)", color: tab.accent }}>{tab.count}</span>}
          </button>
        ))}
      </div>

      {/* Spell level subtabs */}
      {activeTab === "spells" && spellLevels.length > 1 && (
        <div className="cm-spell-subtabs">
          <button type="button" className={"cm-spell-subtab" + (spellLevelTab === "all" ? " is-active" : "")} onClick={() => setSpellLevelTab("all")}>All</button>
          {spellLevels.map(lv => (
            <button key={lv} type="button" className={"cm-spell-subtab" + (spellLevelTab === String(lv) ? " is-active" : "")} onClick={() => setSpellLevelTab(String(lv))}>
              {lv === 0 ? "Cantrips" : ("Level " + lv)}
              <span style={{ marginLeft: 4, opacity: 0.6, fontSize: 8 }}>({(spellsByLevel[lv] || []).length})</span>
            </button>
          ))}
        </div>
      )}

      {/* Action cards grid */}
      <div className="cm-action-grid">
        {getActiveCards().map(card => renderCard(card))}
        {getActiveCards().length === 0 && (
          <div style={{ gridColumn: "1 / -1", textAlign: "center", padding: 16, color: "var(--text-faint, #475569)", fontSize: 11, fontStyle: "italic" }}>
            {emptyMessages[activeTab] || "No actions available."}
          </div>
        )}
      </div>

      {/* Hover tooltip */}
      {hoveredCard && (
        <div style={{
          position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
          background: "var(--action-panel-bg, rgba(15,23,42,0.95))", border: "1px solid var(--action-panel-divider, rgba(255,255,255,0.1))", borderRadius: 6,
          padding: "10px 14px", maxWidth: 340, minWidth: 220, zIndex: 50, backdropFilter: "blur(12px)",
          boxShadow: "0 8px 32px rgba(0,0,0,0.4)",
        }}>
          <div style={{ fontSize: 13, color: "var(--text, #e2e8f0)", fontWeight: 500, marginBottom: 4 }}>{hoveredCard.label}</div>
          {hoveredCard.cost && <div style={{ fontSize: 10, color: "var(--text-faint, #94a3b8)", marginBottom: 4 }}>{hoveredCard.cost}</div>}
          <div style={{ fontSize: 11, color: "var(--text-muted, #cbd5e1)", lineHeight: 1.5 }}>{hoveredCard.effect}</div>
          {hoveredCard.helper && hoveredCard.helper !== hoveredCard.effect && (
            <div style={{ fontSize: 10, color: "var(--text-faint, #64748b)", marginTop: 4, fontStyle: "italic" }}>{hoveredCard.helper}</div>
          )}
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   VIEW MODE INDICATOR — shows DM or Player badge, clickable to toggle
   ═══════════════════════════════════════════════════════════════════════════ */
const ViewModeIndicator = ({ viewRole, onToggle }) => {
  if (!viewRole) return null;
  const isDM = viewRole === "dm";
  return (
    <div className={"cm-view-indicator" + (isDM ? " is-dm" : " is-player")}
      onClick={onToggle} title={"Current view: " + (isDM ? "Dungeon Master" : "Player") + ". Click to toggle."}>
      <span className="cm-view-dot" />
      <span>{isDM ? "DM View" : "Player View"}</span>
      {isDM ? <Eye size={11} /> : <EyeOff size={11} />}
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   TARGET RETICLE — animated crosshair around the focused combat target
   ═══════════════════════════════════════════════════════════════════════════ */
const TargetReticle = ({ target, gridSize, zoom, pan }) => {
  if (!target || (target.hp || 0) <= 0) return null;
  const sizeMult = ({ tiny: 0.5, small: 1, medium: 1, large: 2, huge: 3, gargantuan: 4 })[target.size || "medium"] || 1;
  const tokenPx = gridSize * sizeMult;
  const reticleSize = tokenPx * zoom + 16;
  const sx = target.x * zoom + pan.x + (tokenPx * zoom / 2) - reticleSize / 2;
  const sy = target.y * zoom + pan.y + (tokenPx * zoom / 2) - reticleSize / 2;
  return (
    <div className="cm-target-reticle" style={{
      left: sx, top: sy,
      width: reticleSize, height: reticleSize,
      borderRadius: "50%",
    }} />
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   INITIATIVE BAR — BG3-style horizontal turn order across top of battlemap
   ═══════════════════════════════════════════════════════════════════════════ */
const InitiativeBar = ({ combatants, tokens, turn, round, activeCombatantId, selectedTokenId, onSelectToken, onNextTurn, onPrevTurn, turnState, getHpColor, getMergedConditions, getDeathState, onToggleLog, onEndCombat, logOpen, combatRollLog }) => {
  if (!combatants || combatants.length === 0) return null;
  const scrollRef = React.useRef(null);

  // Auto-scroll to active combatant
  React.useEffect(() => {
    if (scrollRef.current) {
      const active = scrollRef.current.querySelector('[data-active="true"]');
      if (active) active.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    }
  }, [turn]);

  return (
    <div className="cm-initiative-bar-wrapper" style={{
      position: "absolute", top: 0, left: 0, right: 0, zIndex: 50,
      backdropFilter: "blur(12px)",
      padding: "8px 12px 16px",
      pointerEvents: "auto",
    }}>
      {/* Round & Turn Label */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6, padding: "0 4px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontFamily: T.ui, fontSize: 9, letterSpacing: "2px", color: "#ffd54f", textTransform: "uppercase", fontWeight: 600 }}>
            Round {round}
          </span>
          <span style={{ fontFamily: T.ui, fontSize: 9, letterSpacing: "1.5px", color: T.textFaint, textTransform: "uppercase" }}>
            Turn {turn + 1} / {combatants.length}
          </span>
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          <button onClick={onPrevTurn} style={{ background: "var(--bg-hover-subtle)", border: "1px solid var(--border-mid)", borderRadius: 6, padding: "3px 10px", cursor: "pointer", color: T.textFaint, fontFamily: T.ui, fontSize: 9, letterSpacing: "1px" }}
            onMouseEnter={e => e.currentTarget.style.background = "var(--bg-hover)"} onMouseLeave={e => e.currentTarget.style.background = "var(--bg-hover-subtle)"}>
            PREV
          </button>
          <button onClick={onNextTurn} style={{ background: T.crimsonSoft, border: "1px solid var(--crimson-border)", borderRadius: 6, padding: "3px 14px", cursor: "pointer", color: T.crimson, fontFamily: T.ui, fontSize: 9, letterSpacing: "1px", fontWeight: 600 }}
            onMouseEnter={e => e.currentTarget.style.opacity = "0.85"} onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
            END TURN
          </button>
          {onToggleLog && (
            <button onClick={onToggleLog} style={{ background: logOpen ? "rgba(255,213,79,0.12)" : "var(--bg-hover-subtle)", border: "1px solid " + (logOpen ? "rgba(255,213,79,0.3)" : "var(--border-mid)"), borderRadius: 6, padding: "3px 10px", cursor: "pointer", color: logOpen ? "#ffd54f" : T.textFaint, fontFamily: T.ui, fontSize: 9, letterSpacing: "1px" }}
              onMouseEnter={e => e.currentTarget.style.opacity = "0.85"} onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
              LOG
            </button>
          )}
          {onEndCombat && (
            <button onClick={onEndCombat} style={{ background: "var(--bg-hover-subtle)", border: "1px solid var(--border-mid)", borderRadius: 6, padding: "3px 10px", cursor: "pointer", color: "#f06858", fontFamily: T.ui, fontSize: 9, letterSpacing: "1px" }}
              onMouseEnter={e => e.currentTarget.style.opacity = "0.85"} onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
              END
            </button>
          )}
        </div>
      </div>

      {/* Combatant Portraits */}
      <div ref={scrollRef} style={{ display: "flex", gap: 4, overflowX: "auto", overflowY: "hidden", scrollbarWidth: "none", padding: "2px 0" }}>
        {combatants.map((c, idx) => {
          const tk = tokens.find(t => t.id === c.mapTokenId);
          if (!tk) return null;
          const isActive = idx === turn;
          const isSelected = tk.id === selectedTokenId;
          const isDead = (tk.hp || 0) <= 0;
          const hpPct = tk.maxHp ? Math.max(0, Math.min(100, Math.round((tk.hp || 0) / tk.maxHp * 100))) : 0;
          const hpCol = tk.maxHp ? getHpColor(tk.hp || 0, tk.maxHp) : "#666";
          const conds = getMergedConditions(tk);
          const deathState = getDeathState(tk);
          const isPC = tk.tokenType === "pc";
          const ts = turnState[tk.id];
          const actionUsed = ts?.actionUsed;
          const bonusUsed = ts?.bonusActionUsed;

          return (
            <div key={c.id} data-active={isActive ? "true" : "false"}
              onClick={() => onSelectToken(tk.id)}
              style={{
                flex: "0 0 auto",
                width: isActive ? 72 : 52,
                cursor: "pointer",
                opacity: isDead && !isActive ? 0.35 : 1,
                transition: "all 0.2s ease",
                position: "relative",
              }}>
              {/* Active indicator glow */}
              {isActive && (
                <div style={{ position: "absolute", inset: -2, borderRadius: 12, border: "2px solid var(--crimson)", boxShadow: "0 0 12px rgba(212,67,58,0.4)", pointerEvents: "none" }} />
              )}
              {isSelected && !isActive && (
                <div style={{ position: "absolute", inset: -1, borderRadius: 11, border: "1px solid rgba(88,170,255,0.5)", pointerEvents: "none" }} />
              )}
              <div style={{
                background: isActive ? T.crimsonSoft : "var(--bg-hover-subtle)",
                border: "1px solid " + (isActive ? "var(--crimson-border)" : "var(--border-mid)"),
                borderRadius: 10, padding: isActive ? "6px 4px 4px" : "4px 3px 3px",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
                transition: "all 0.2s ease",
              }}
                onMouseEnter={e => { if (!isActive) e.currentTarget.style.background = "var(--bg-hover)"; }}
                onMouseLeave={e => { if (!isActive) e.currentTarget.style.background = "var(--bg-hover-subtle)"; }}>
                {/* Token circle */}
                <div style={{
                  width: isActive ? 32 : 24, height: isActive ? 32 : 24,
                  borderRadius: "50%", background: tk.color || "#666",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: isActive ? 11 : 8, fontFamily: T.ui, color: "#fff", fontWeight: 700,
                  border: isDead ? "2px solid #f06858" : (isPC ? "2px solid rgba(46,139,87,0.6)" : "2px solid var(--border)"),
                  position: "relative", overflow: "hidden",
                }}>
                  {isDead ? <X size={isActive ? 14 : 10} color="#f06858" /> : (tk.label || tk.name.substring(0, 2)).toUpperCase()}
                </div>
                {/* Name */}
                <div style={{
                  fontFamily: T.ui, fontSize: isActive ? 8 : 7,
                  color: isActive ? T.text : T.textFaint,
                  textAlign: "center", lineHeight: 1.1,
                  maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                  letterSpacing: "0.5px",
                }}>
                  {tk.name.length > 8 ? tk.name.substring(0, 7) + "…" : tk.name}
                </div>
                {/* HP micro-bar */}
                {!isDead && tk.maxHp > 0 && (
                  <div style={{ width: "90%", height: 2, background: "var(--border-mid)", borderRadius: 1, overflow: "hidden" }}>
                    <div style={{ width: hpPct + "%", height: "100%", background: hpCol, borderRadius: 1 }} />
                  </div>
                )}
                {/* Initiative roll badge */}
                <div title={"Initiative: " + c.init + (c.initRoll ? (" (d20: " + c.initRoll + " + " + ((c.init || 0) - (c.initRoll || 0)) + ")") : "")}
                  style={{
                    fontFamily: "monospace", fontSize: isActive ? 9 : 7, color: isActive ? "#ffd54f" : T.textFaint,
                    letterSpacing: "0.5px", fontWeight: isActive ? 700 : 400,
                    background: isActive ? "rgba(255,213,79,0.1)" : "transparent",
                    padding: isActive ? "1px 4px" : 0, borderRadius: 3,
                  }}>
                  {c.init}
                </div>
                {/* Action economy dots for active combatant */}
                {isActive && !isDead && (
                  <div style={{ display: "flex", gap: 3, marginTop: 1 }}>
                    <div title="Action" style={{ width: 5, height: 5, borderRadius: "50%", background: actionUsed ? "var(--border-mid)" : "var(--crimson)", border: "1px solid " + (actionUsed ? "var(--border)" : "var(--crimson-border)") }} />
                    <div title="Bonus" style={{ width: 5, height: 5, borderRadius: "50%", background: bonusUsed ? "var(--border-mid)" : "#ffd54f", border: "1px solid " + (bonusUsed ? "var(--border)" : "rgba(255,213,79,0.5)") }} />
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   COMBAT ROLL DISPLAY — Separate floating panel so it doesn't push init bar
   Centered horizontally, positioned below initiative portraits
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── BG3-style Turn Announcement Banner ──
   Shows "[Name]'s Turn" / "Round X" at center of screen with cinematic animation */
const TurnBanner = ({ announcement }) => {
  const [visible, setVisible] = React.useState(false);
  const [fading, setFading] = React.useState(false);
  const timeoutRef = React.useRef(null);

  React.useEffect(() => {
    if (!announcement) { setVisible(false); setFading(false); return; }
    setVisible(true);
    setFading(false);
    if (timeoutRef.current) clearTimeout(timeoutRef.current);
    timeoutRef.current = setTimeout(() => setFading(true), 1200);
    const hideTimer = setTimeout(() => setVisible(false), 2000);
    return () => { clearTimeout(timeoutRef.current); clearTimeout(hideTimer); };
  }, [announcement?.key]);

  if (!visible || !announcement) return null;

  const isPC = announcement.isPC;
  const accentColor = isPC ? "#5ee09a" : "#f06858";
  const glowColor = isPC ? "rgba(94,224,154,0.4)" : "rgba(240,104,88,0.4)";

  return (
    <div style={{
      position: "absolute", top: "30%", left: "50%", transform: "translate(-50%, -50%)",
      zIndex: 60, pointerEvents: "none", textAlign: "center",
      opacity: fading ? 0 : 1,
      transition: "opacity 0.6s ease-out",
    }}>
      {announcement.roundStart && (
        <div style={{
          fontSize: 13, fontWeight: 600, letterSpacing: 4, textTransform: "uppercase",
          color: "rgba(255,255,255,0.5)", marginBottom: 6,
        }}>Round {announcement.round}</div>
      )}
      <div style={{
        fontSize: 28, fontWeight: 800, letterSpacing: 2,
        color: "#fff", textShadow: "0 0 40px " + glowColor + ", 0 2px 8px rgba(0,0,0,0.8)",
        padding: "12px 48px",
        background: "linear-gradient(90deg, transparent, rgba(12,8,4,0.85) 20%, rgba(12,8,4,0.85) 80%, transparent)",
        borderTop: "2px solid " + accentColor + "66",
        borderBottom: "2px solid " + accentColor + "66",
      }}>
        {announcement.name + "'s Turn"}
      </div>
      <div style={{
        width: 60, height: 3, margin: "10px auto 0",
        background: accentColor, borderRadius: 2, opacity: 0.7,
      }} />
    </div>
  );
};

const CombatRollDisplay = ({ combatRollLog }) => {
  if (!combatRollLog || combatRollLog.length === 0) return null;
  const now = Date.now();
  const visibleRolls = combatRollLog.slice().reverse().slice(0, 3).filter(r => (now - r.time) / 4000 < 1);
  if (visibleRolls.length === 0) return null;

  // The most recent roll gets the big D20 splash
  const latestRoll = visibleRolls[0];
  const latestAge = (now - latestRoll.time) / 4000;
  const showSplash = latestAge < 0.5; // big splash for first 2 seconds
  const latestD20Match = latestRoll.detail ? latestRoll.detail.match(/= (\d+) vs AC (\d+)/) : null;
  const splashTotal = latestD20Match ? latestD20Match[1] : null;
  const splashAC = latestD20Match ? latestD20Match[2] : null;
  const splashCrit = latestRoll.type === "crit";
  const splashHit = latestRoll.type === "hit";
  const splashMiss = latestRoll.type === "miss";
  const splashColor = splashCrit ? "#ffd700" : splashHit ? "#5ee09a" : splashMiss ? "#f06858" : "#b574ff";
  const splashScale = showSplash ? (latestAge < 0.05 ? 0.3 + latestAge * 14 : (latestAge < 0.15 ? 1 : 1 - (latestAge - 0.15) * 0.15)) : 0.6;
  const splashOpacity = showSplash ? (latestAge < 0.05 ? latestAge * 20 : (latestAge < 0.35 ? 1 : Math.max(0, 1 - (latestAge - 0.35) * 6))) : 0;

  return (
    <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, zIndex:51, pointerEvents:"none", overflow:"hidden" }}>
      {/* ── Big D20 splash in center of screen ── */}
      {splashTotal && splashOpacity > 0.01 && (
        <div style={{
          position:"absolute", top:"38%", left:"50%",
          transform: "translate(-50%, -50%) scale(" + splashScale + ")",
          opacity: splashOpacity,
          display:"flex", flexDirection:"column", alignItems:"center", gap:4,
          transition: "none",
        }}>
          {/* D20 shape */}
          <div style={{
            width: 100, height: 100, borderRadius: 16,
            background: "radial-gradient(circle at 35% 35%, " + splashColor + "33, " + splashColor + "11 70%, transparent)",
            border: "3px solid " + splashColor,
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            boxShadow: "0 0 60px " + splashColor + "44, 0 0 120px " + splashColor + "22, inset 0 0 30px " + splashColor + "11",
            position:"relative",
          }}>
            <div style={{ fontFamily:"'Cinzel', serif", fontSize: 48, fontWeight:900, color: splashColor, lineHeight:1, textShadow: "0 0 20px " + splashColor + "88, 0 2px 4px rgba(0,0,0,0.5)" }}>
              {splashTotal}
            </div>
            <div style={{ fontSize: 10, color: splashColor, letterSpacing:"1.5px", fontFamily:"'Cinzel', serif", fontWeight:700, opacity: 0.8 }}>
              vs AC {splashAC}
            </div>
          </div>
          {/* Result label under D20 */}
          <div style={{
            fontFamily:"'Cinzel', serif", fontSize: 22, fontWeight:900,
            color: splashColor, letterSpacing:"3px", textTransform:"uppercase",
            textShadow: "0 0 20px " + splashColor + "66, 0 2px 8px rgba(0,0,0,0.8)",
          }}>
            {splashCrit ? "CRITICAL HIT!" : splashHit ? "HIT!" : splashMiss ? "MISS" : "EFFECT"}
          </div>
        </div>
      )}

      {/* ── Roll log cards (right side) ── */}
      <div style={{
        position:"absolute", top: 80, right: 16,
        display:"flex", flexDirection:"column", gap:6, width: 340, maxWidth: "35%",
      }}>
        {visibleRolls.map(roll => {
          const age = (now - roll.time) / 4000;
          const opacity = age < 0.4 ? 1 : Math.max(0.05, 1 - (age - 0.4) / 0.6);
          const isCrit = roll.type === "crit";
          const isHit = roll.type === "hit";
          const isMiss = roll.type === "miss";
          const color = isCrit ? "#ffd700" : isHit ? "#5ee09a" : isMiss ? "#f06858" : "#b574ff";
          const bgColor = isCrit ? "rgba(255,215,0,0.15)" : isHit ? "rgba(94,224,154,0.12)" : isMiss ? "rgba(240,104,88,0.12)" : "rgba(181,116,255,0.12)";
          const resultLabel = isCrit ? "CRITICAL HIT!" : isHit ? "HIT!" : isMiss ? "MISS" : "EFFECT";
          const d20Match = roll.detail ? roll.detail.match(/= (\d+) vs AC (\d+)/) : null;
          const rollTotal = d20Match ? d20Match[1] : null;
          const targetAC = d20Match ? d20Match[2] : null;
          const dmgMatch = roll.detail ? roll.detail.match(/Damage:\s*(.+)/) : null;
          const dmgText = dmgMatch ? dmgMatch[1] : null;
          const rollBreakdown = roll.detail ? roll.detail.match(/Attack:\s*(.+?)\s*(?:\||$)/) : null;
          const rollExpr = rollBreakdown ? rollBreakdown[1] : null;
          return (
            <div key={roll.id} style={{
              display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
              background: bgColor,
              backdropFilter:"blur(16px)",
              border:"2px solid " + color + "55",
              borderLeft:"5px solid " + color,
              borderRadius:12, opacity,
              boxShadow: "0 4px 20px rgba(0,0,0,0.45)" + (isCrit ? ", 0 0 30px rgba(255,215,0,0.3)" : ""),
            }}>
              {rollTotal && (
                <div style={{
                  width:48, height:48, borderRadius:10,
                  background: color + "22", border:"2px solid " + color,
                  display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                  flexShrink:0,
                }}>
                  <div style={{ fontFamily:"'Cinzel', serif", fontSize:22, fontWeight:900, color, lineHeight:1 }}>{rollTotal}</div>
                  <div style={{ fontSize:7, color:"var(--text-faint)", letterSpacing:"0.5px" }}>vs AC {targetAC}</div>
                </div>
              )}
              {!rollTotal && <span style={{ fontSize:28, flexShrink:0 }}>{isCrit ? "\u2728" : isHit ? "\u2694\uFE0F" : isMiss ? "\u274C" : "\u2728"}</span>}
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontFamily:"'Cinzel', serif", fontSize:13, fontWeight:800, color, letterSpacing:"1px", textTransform:"uppercase" }}>
                    {resultLabel}
                  </span>
                </div>
                <div style={{ fontFamily:"'Cinzel', serif", fontSize:10, color:"var(--text-dim, #ccc)", fontWeight:600, marginTop:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  {roll.msg.replace(/ HIT!| MISS| CRITICAL!/, "")}
                </div>
                {rollExpr && (
                  <div style={{ fontFamily:"'Spectral', serif", fontSize:10, color:"var(--text-muted)", marginTop:2, opacity:0.8, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {rollExpr}
                  </div>
                )}
                {dmgText && (
                  <div style={{ fontFamily:"'Spectral', serif", fontSize:12, color: isHit || isCrit ? "#5ee09a" : "var(--text-muted)", marginTop:2, fontWeight:700 }}>
                    {dmgText}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════════════════════════════
   TOKEN ACTION RING — BG3-style actions floating around the active token
   Appears on the canvas overlay, positioned relative to the token
   ═══════════════════════════════════════════════════════════════════════════ */
const TokenActionRing = ({ visible, token, actions, screenX, screenY, tokenRadius, onAction, onMove, moveLabel, onEndTurn, onDismiss, resolution }) => {
  /* Disabled: actions now shown in the full-width bottom EnhancedActionPanel */
  return null;

  if (!visible || !token) return null;

  const isCompactMobile = typeof window !== "undefined" && window.innerWidth <= 640;
  const moveDisabled = moveLabel === "0 ft";
  // Arrange actions in a ring around the token
  const maxSlots = isCompactMobile ? 6 : 8;
  const visibleActions = actions.slice(0, maxSlots);
  const ringRadius = Math.max(isCompactMobile ? 58 : 72, tokenRadius + (isCompactMobile ? 38 : 52));
  const actionButtonSize = isCompactMobile ? 48 : 56;

  // Calculate slot positions in a semicircle below the token
  const getSlotPosition = (idx, total) => {
    // Spread actions in an arc from -120° to +120° (bottom half)
    const startAngle = -Math.PI * 0.65;
    const endAngle = Math.PI * 0.65;
    const angle = total === 1 ? Math.PI / 2 : startAngle + (endAngle - startAngle) * (idx / (total - 1));
    return {
      x: Math.cos(angle) * ringRadius,
      y: Math.sin(angle) * ringRadius,
    };
  };

  return (
    <div style={{
      position: "absolute",
      left: screenX, top: screenY,
      pointerEvents: "none",
      zIndex: 45,
      transform: "translate(-50%, -50%)",
    }}>
      {/* Move button — always at top */}
      <div style={{ position: "absolute", left: "50%", top: -(ringRadius - 8), transform: "translateX(-50%)", pointerEvents: "auto" }}>
        <button type="button" onClick={onMove} disabled={moveDisabled}
          style={{
            background: moveDisabled ? "rgba(255,255,255,0.03)" : "rgba(88,170,255,0.12)",
            border: "1px solid " + (moveDisabled ? "rgba(255,255,255,0.06)" : "rgba(88,170,255,0.35)"),
            borderRadius: 10, padding: isCompactMobile ? "8px 12px" : "6px 14px", cursor: moveDisabled ? "default" : "pointer",
            display: "flex", alignItems: "center", gap: 6,
            backdropFilter: "blur(8px)", boxShadow: "0 4px 16px rgba(0,0,0,0.5)",
            opacity: moveDisabled ? 0.4 : 1, transition: "all 0.15s",
          }}
          onMouseEnter={e => { if (!moveDisabled) e.currentTarget.style.background = "rgba(88,170,255,0.2)"; }}
          onMouseLeave={e => { if (!moveDisabled) e.currentTarget.style.background = "rgba(88,170,255,0.12)"; }}>
          <Compass size={12} color={moveDisabled ? T.textFaint : "#58aaff"} />
          <span style={{ fontFamily: T.ui, fontSize: 9, letterSpacing: "1px", color: moveDisabled ? T.textFaint : "#58aaff", fontWeight: 600 }}>{moveLabel}</span>
        </button>
      </div>

      {/* Action slots in ring */}
      {visibleActions.map((action, idx) => {
        const pos = getSlotPosition(idx, visibleActions.length);
        const Icon = action.icon || Swords;
        const isDisabled = !!action.disabled;
        const toneColor = action.tone || "var(--crimson)";

        return (
          <div key={"ring-" + action.key} style={{
            position: "absolute",
            left: pos.x, top: pos.y,
            transform: "translate(-50%, -50%)",
            pointerEvents: "auto",
          }}>
            <button type="button" onClick={() => !isDisabled && onAction(action)}
              disabled={isDisabled}
              title={action.helper || action.label}
              style={{
                width: actionButtonSize, height: actionButtonSize,
                borderRadius: 12,
                background: isDisabled ? "rgba(255,255,255,0.02)" : "rgba(10,10,16,0.88)",
                border: "1px solid " + (isDisabled ? "rgba(255,255,255,0.05)" : toneColor.replace(")", ",0.35)").replace("rgb(", "rgba(")),
                cursor: isDisabled ? "default" : "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2,
                backdropFilter: "blur(10px)", boxShadow: isDisabled ? "none" : "0 4px 16px rgba(0,0,0,0.5)",
                opacity: isDisabled ? 0.3 : 1, transition: "all 0.15s",
                padding: 3,
              }}
              onMouseEnter={e => { if (!isDisabled) { e.currentTarget.style.transform = "scale(1.12)"; e.currentTarget.style.boxShadow = "0 6px 24px rgba(0,0,0,0.6)"; } }}
              onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.boxShadow = isDisabled ? "none" : "0 4px 16px rgba(0,0,0,0.5)"; }}>
              <Icon size={isCompactMobile ? 13 : 14} color={isDisabled ? T.textFaint : toneColor} />
              <span style={{
                 fontFamily: T.ui, fontSize: isCompactMobile ? 6 : 7, color: isDisabled ? T.textFaint : T.text,
                textAlign: "center", lineHeight: 1.1, letterSpacing: "0.3px",
                maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              }}>
                {action.label.length > 9 ? action.label.substring(0, 8) + "…" : action.label}
              </span>
            </button>
            {/* Keyboard hint */}
            <div style={{
              position: "absolute", top: -6, right: -4,
              background: "rgba(6,6,12,0.9)", border: "1px solid rgba(255,255,255,0.12)",
              borderRadius: 4, padding: "1px 4px",
              fontFamily: T.ui, fontSize: 7, color: T.textFaint, letterSpacing: "0.5px",
            }}>
              {idx + 1}
            </div>
          </div>
        );
      })}

      {/* End Turn button — bottom center */}
      <div style={{ position: "absolute", left: "50%", top: ringRadius + 12, transform: "translateX(-50%)", pointerEvents: "auto" }}>
        <button type="button" onClick={onEndTurn}
          style={{
            background: "rgba(212,67,58,0.1)", border: "1px solid rgba(212,67,58,0.3)",
            borderRadius: 8, padding: "5px 16px", cursor: "pointer",
            backdropFilter: "blur(8px)", boxShadow: "0 4px 12px rgba(0,0,0,0.4)",
            display: "flex", alignItems: "center", gap: 6, transition: "all 0.15s",
          }}
          onMouseEnter={e => e.currentTarget.style.background = "rgba(212,67,58,0.2)"}
          onMouseLeave={e => e.currentTarget.style.background = "rgba(212,67,58,0.1)"}>
          <SkipForward size={11} color="var(--crimson)" />
          <span style={{ fontFamily: T.ui, fontSize: 8, letterSpacing: "1px", color: "var(--crimson)", fontWeight: 600, textTransform: "uppercase" }}>End Turn</span>
        </button>
      </div>

      {/* Resolution popup — shows result of last action */}
      {resolution && (
        <div onClick={onDismiss} style={{
          position: "absolute",
          left: isCompactMobile ? "50%" : ringRadius + 20,
          top: isCompactMobile ? ringRadius + 52 : -20,
          transform: isCompactMobile ? "translateX(-50%)" : "none",
          width: isCompactMobile ? 200 : 220,
          pointerEvents: "auto", cursor: "pointer",
          background: "rgba(10,10,16,0.92)", backdropFilter: "blur(12px)",
          border: "1px solid rgba(212,67,58,0.2)", borderRadius: 12,
          padding: "10px 12px", boxShadow: "0 8px 24px rgba(0,0,0,0.6)",
        }}>
          <div style={{ fontFamily: T.ui, fontSize: 10, fontWeight: 600, color: "var(--crimson)", letterSpacing: "0.5px", marginBottom: 4 }}>{resolution.title}</div>
          {resolution.lines.map((line, i) => (
            <div key={i} style={{ fontFamily: T.body, fontSize: 10, color: i === resolution.lines.length - 1 ? T.text : T.textMuted, lineHeight: 1.4, marginTop: 2 }}>{line}</div>
          ))}
        </div>
      )}
    </div>
  );
};

function useCountdown(target) {
  const [s,setS] = useState("");
  useEffect(() => {
    const tick = () => {
      const d = new Date(target) - new Date();
      if (d<=0) { setS("Now"); return; }
      const days=Math.floor(d/864e5), hrs=Math.floor((d%864e5)/36e5), min=Math.floor((d%36e5)/6e4);
      setS(days>0 ? `${days}d ${hrs}h` : `${hrs}h ${min}m`);
    };
    tick(); const id=setInterval(tick,60000); return ()=>clearInterval(id);
  }, [target]);
  return s;
}

let _eid = 100;
const eid = () => `e${_eid++}`;
let _id = 100;
const uid = () => _id++;

const CAMPAIGN_CACHE_KEY = "phmurt_campaign_workspace";
const CAMPAIGN_SAVE_DELAY_MS = 1200;

const cmClone = (value) => JSON.parse(JSON.stringify(value));

const cmSafeInt = (value, fallback) => {
  const parsed = parseInt(value, 10);
  return Number.isFinite(parsed) ? parsed : fallback;
};

const cmAbilityMod = (score) => Math.floor((cmSafeInt(score, 10) - 10) / 2);

const cmHumanizeKey = (value) => {
  return String(value || "")
    .replace(/[_-]+/g, " ")
    .replace(/([a-z])([A-Z])/g, "$1 $2")
    .trim()
    .replace(/\b\w/g, (c) => c.toUpperCase());
};

const cmBuilderType = (meta, snapshot) => {
  if (meta?.builder_type === "35e" || snapshot?.edition === "3.5") return "35e";
  return "5e";
};

const cmCharacterBuilderHref = (characterId, builderType) => {
  if (!characterId) return null;
  const page = builderType === "35e" ? "character-builder-35.html" : "character-builder.html";
  return `${page}?load=${encodeURIComponent(characterId)}`;
};

const cmSessionKey = () => {
  const session = window.PhmurtDB && typeof window.PhmurtDB.getSession === "function"
    ? window.PhmurtDB.getSession()
    : null;
  return session?.userId ? `user_${session.userId}` : "guest";
};

const cmCacheKey = () => `${CAMPAIGN_CACHE_KEY}_${cmSessionKey()}`;

const cmReadRoute = () => {
  const params = new URLSearchParams(window.location.search);
  const routeTab = params.get("tab");
  const validTab = ["dashboard", "timeline", "world", "play", "generator", "notes", "settings"].includes(routeTab)
    ? routeTab
    : "";
  return {
    campaignId: params.get("campaign") || "",
    tab: validTab || (params.get("role") === "player" ? "play" : "dashboard"),
    role: params.get("role") || "",
  };
};

const cmSyncRoute = (campaignId, tab) => {
  const params = new URLSearchParams(window.location.search);
  if (campaignId) params.set("campaign", String(campaignId));
  else params.delete("campaign");
  params.set("tab", tab || "dashboard");
  const query = params.toString();
  const nextUrl = window.location.pathname + (query ? `?${query}` : "");
  window.history.replaceState(null, "", nextUrl);
};

const cmLoadCampaignCache = (scopeKey) => {
  try {
    const key = scopeKey ? `${CAMPAIGN_CACHE_KEY}_${scopeKey}` : cmCacheKey();
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.campaigns)) return null;
    return parsed;
  } catch (err) {
    console.warn("[CampaignManager] Local cache load failed:", err);
    return null;
  }
};

const cmSaveCampaignCache = (campaigns, activeCampaignId) => {
  try {
    localStorage.setItem(cmCacheKey(), JSON.stringify({
      activeCampaignId,
      savedAt: Date.now(),
      campaigns: (campaigns || []).filter(c => c && !c.isExample).map(c => ({
        id: c.id,
        data: cmClone(c.data || NEW_CAMPAIGN()),
        isExample: false,
      })),
    }));
  } catch (err) {
    console.warn("[CampaignManager] Local cache save failed:", err);
  }
};

const cmSnapshotToPartyMember = (meta, snapshot) => {
  const details = snapshot?.details || {};
  const abilities = snapshot?.abilities || {};
  const builderType = cmBuilderType(meta, snapshot);
  const id = uid();
  const level = cmSafeInt((meta && meta.level) || snapshot?.level, 1);
  const dex = cmSafeInt(abilities.dex, 10);
  const str = cmSafeInt(abilities.str, 10);
  const con = cmSafeInt(abilities.con, 10);
  const maxHp = Math.max(
    1,
    cmSafeInt(snapshot?.maxHp, Math.max(1, 8 + Math.max(0, level - 1) * 5 + cmAbilityMod(con) * level))
  );
  const name = details.name || meta?.name || "Unnamed Character";
  const sourceCharacterId = meta?.id || null;
  const sourceBuilderHref = cmCharacterBuilderHref(sourceCharacterId, builderType);

  /* Extract combat-relevant data from the full builder snapshot */
  const weapons = [];
  const spells = [];
  const cantrips = [];
  const subclass = snapshot?.subclasses ? Object.values(snapshot.subclasses)[0] || "" : "";

  /* Weapons from inventory */
  if (Array.isArray(snapshot?.inventoryItems)) {
    snapshot.inventoryItems.forEach(item => {
      if (item && item.equipped !== false && (item.category === "weapon" || item.category === "Weapon" ||
          /sword|axe|bow|dagger|mace|hammer|spear|crossbow|glaive|halberd|pike|lance|rapier|javelin|trident|flail|morningstar|whip|warhammer|maul|scimitar|shortsword|longsword|greatsword|greataxe|handaxe|club|staff|quarterstaff|sling|dart|blowgun/i.test(item.name || ""))) {
        weapons.push(item.name);
      }
    });
  }
  /* Also from weaponChoices */
  if (snapshot?.weaponChoices) {
    Object.values(snapshot.weaponChoices).forEach(wn => {
      if (wn && !weapons.includes(wn)) weapons.push(wn);
    });
  }

  /* Spells and cantrips */
  if (Array.isArray(snapshot?.selectedCantrips)) cantrips.push(...snapshot.selectedCantrips);
  if (Array.isArray(snapshot?.selectedSpells)) spells.push(...snapshot.selectedSpells);

  return {
    id,
    actorId: `pc-${id}`,
    name,
    cls: cmHumanizeKey(meta?.class || meta?.class_ || snapshot?.cls || snapshot?.class_ || ""),
    lv: level,
    hp: Math.max(1, Math.min(maxHp, cmSafeInt(snapshot?.hp, maxHp))),
    maxHp,
    ac: Math.max(1, cmSafeInt(snapshot?.ac, 10 + cmAbilityMod(dex))),
    player: details.player || details.playerName || details.owner || "Player",
    status: "healthy",
    race: cmHumanizeKey(meta?.race || snapshot?.race || ""),
    bio: details.backstory || details.bio || details.notes || "",
    sheetUrl: sourceBuilderHref,
    sheetName: sourceBuilderHref ? (builderType === "35e" ? "3.5e Builder" : "5e Builder") : null,
    str,
    dex,
    con,
    int: cmSafeInt(abilities.int, 10),
    wis: cmSafeInt(abilities.wis, 10),
    cha: cmSafeInt(abilities.cha, 10),
    sourceCharacterId,
    sourceBuilderType: builderType,
    /* Combat-relevant builder data */
    equipment: weapons,
    knownSpells: [...cantrips, ...spells],
    preparedSpells: [...cantrips, ...spells],
    subclass: subclass,
    background: snapshot?.background || "",
    builderSnapshot: snapshot || null,
    _lastSyncAt: Date.now(),
  };
};

// ─── DICE ROLLER ────────────────────────────────────────────────────────────

function DiceRoller() {
  const [results,setResults] = useState([]);
  const [die,setDie] = useState(20);
  const [mod,setMod] = useState(0);
  const [count,setCount] = useState(1);
  const [rolling,setRolling] = useState(false);
  const dice = [4,6,8,10,12,20,100];

  const roll = useCallback(() => {
    setRolling(true);
    setTimeout(() => {
      const rolls = Array.from({length:count}, ()=> Math.floor(Math.random()*die)+1);
      const total = rolls.reduce((a,b)=>a+b,0) + mod;
      const hasCrit = die===20 && rolls.some(r=>r===20);
      const hasFumble = die===20 && rolls.some(r=>r===1);
      setResults(p => [{ die, rolls, count, mod, total, crit:hasCrit, fumble:hasFumble, t:Date.now() }, ...p].slice(0,20));
      setRolling(false);
    }, 250);
  }, [die,mod,count]);

  return (
    <div>
      <div style={{ display:"flex", gap:4, marginBottom:12, flexWrap:"wrap" }}>
        {dice.map(d => (
          <button key={d} onClick={()=>setDie(d)} style={{
            padding:"5px 8px", background: d===die ? T.crimson : "transparent",
            border:`1px solid ${d===die ? T.crimson : T.border}`,

      <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:16, marginBottom:12 }}>

        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ fontFamily:T.ui, fontSize:8, color:T.textMuted, letterSpacing:"1px" }}>MOD</span>

        width:"100%", padding:10, background:rolling?T.crimsonDim:T.crimson, border:"none",
        color:T.text, fontFamily:T.ui, fontSize:"10px", letterSpacing:"2px", textTransform:"uppercase",
        cursor:rolling?"default":"pointer", borderRadius:"2px", fontWeight:500, marginBottom:8, transition:"all 0.2s",
      }}>{rolling ? "Rolling..." : `Roll ${count}d${die}${mod?mod>0?`+${mod}`:mod:""}`}</button>

        <div style={{ borderTop:`1px solid ${T.border}`, marginTop:8, paddingTop:8 }}>

            <span style={{ fontFamily:T.ui, fontSize:8, color:T.textFaint, letterSpacing:"1px" }}>HISTORY</span>
            <button onClick={()=>setResults([])} style={{ background:"none", border:"none", cursor:"pointer", fontFamily:T.ui, fontSize:8, color:T.textFaint, letterSpacing:"1px" }}>CLEAR</button>
          </div>

            <div key={r.t} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", fontSize:12, color:T.textDim, opacity:i===0?1:Math.max(0.35,1-i*0.08) }}>
              <span style={{ fontFamily:T.ui, fontSize:10, color:T.textMuted }}>
                {r.count>1?`${r.count}`:""}{r.die===100?"d%":`d${r.die}`}{r.mod!==0?(r.mod>0?`+${r.mod}`:r.mod):""}
                {r.count>1 && <span style={{ color:T.textFaint, marginLeft:4 }}>[{r.rolls.join(", ")}]</span>}
              </span>
              <span style={{ fontWeight:500, color: r.crit?"#f5d020":r.fumble?"#ef5350":T.text, textShadow: r.crit?"0 0 12px rgba(245,208,32,0.6)":r.fumble?"0 0 12px rgba(239,83,80,0.6)":"none" }}>
                {r.total} {r.crit?"NAT 20!":r.fumble?"NAT 1":""}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── INITIATIVE TRACKER ─────────────────────────────────────────────────────

function InitiativeTracker({ party }) {
  const [combatants,setCombatants] = useState([]);
  const [turn,setTurn] = useState(0);
  const [round,setRound] = useState(1);
  const [live,setLive] = useState(false);
  const [name,setName] = useState("");
  const [init,setInit] = useState("");
  const [hpVal,setHpVal] = useState("");
  const [acVal,setAcVal] = useState("");
  const [conditions,setConditions] = useState({});

  const start = () => {
    const pcs = party.map(p => ({ id:`pc-${p.id}`, name:p.name, init:Math.floor(Math.random()*20)+1, hp:p.hp, maxHp:p.maxHp, ac:p.ac, type:"pc" }));
    setCombatants(pcs.sort((a,b)=>b.init-a.init));
    setTurn(0); setRound(1); setLive(true); setConditions({});
  };
  const next = () => {
    let nextIdx = turn + 1;
    while (nextIdx < combatants.length && combatants[nextIdx].hp <= 0) nextIdx++;
    if (nextIdx >= combatants.length) {
      setRound(r=>r+1);
      let first = 0;
      while (first < combatants.length && combatants[first].hp <= 0) first++;
      setTurn(first);
    } else setTurn(nextIdx);
  };
  const prev = () => {
    if (turn === 0 && round === 1) return;
    let prevIdx = turn - 1;
    if (prevIdx < 0) { setRound(r=>Math.max(1,r-1)); prevIdx = combatants.length - 1; }
    while (prevIdx >= 0 && combatants[prevIdx].hp <= 0) prevIdx--;
    if (prevIdx >= 0) setTurn(prevIdx);
  };
  const adjHp = (id,d) => setCombatants(p=>p.map(c=>c.id===id?{...c,hp:Math.max(0,Math.min(c.maxHp,c.hp+d))}:c));
  const remove = (id) => { setCombatants(p=>p.filter(c=>c.id!==id)); if(turn >= combatants.length-1) setTurn(t=>Math.max(0,t-1)); };
  const addCondition = (id, cond) => { if(!cond) return; setConditions(p=>({...p, [id]: [...(p[id]||[]), cond]})); };
  const removeCondition = (id, idx) => { setConditions(p=>({...p, [id]: (p[id]||[]).filter((_,i)=>i!==idx)})); };
  const add = () => {
    if(!name.trim()||!init) return;
    const newC = {id:`c-${Date.now()}`,name,init:parseInt(init),hp:parseInt(hpVal)||30,maxHp:parseInt(hpVal)||30,ac:parseInt(acVal)||12,type:"enemy"};
    setCombatants(p=>[...p,newC].sort((a,b)=>b.init-a.init));
    setName(""); setInit(""); setHpVal(""); setAcVal("");
  };

  const conditionsList = ["Blinded","Charmed","Deafened","Frightened","Grappled","Incapacitated","Invisible","Paralyzed","Petrified","Poisoned","Prone","Restrained","Stunned","Unconscious","Concentrating"];

  if(!live) return (
    <div style={{ textAlign:"center", padding:"28px 0" }}>
      <Swords size={28} color={T.textFaint} style={{ marginBottom:10 }} />
      <p style={{ fontFamily:T.body, fontSize:14, color:T.textMuted, fontStyle:"italic", fontWeight:300, marginBottom:18 }}>No active encounter</p>
      <CrimsonBtn onClick={start}><Swords size={13}/> Start Encounter</CrimsonBtn>
    </div>
  );

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <Tag variant="danger">Round {round}</Tag>
          <span style={{ fontFamily:T.ui, fontSize:9, color:T.textFaint, letterSpacing:"1px" }}>{turn+1}/{combatants.length}</span>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          <CrimsonBtn onClick={prev} secondary small><ChevronUp size={11}/></CrimsonBtn>
          <CrimsonBtn onClick={next} secondary small><SkipForward size={11}/> Next</CrimsonBtn>
          <CrimsonBtn onClick={()=>{setLive(false);setCombatants([]);}} secondary small>End</CrimsonBtn>
        </div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:2, maxHeight:320, overflowY:"auto" }}>
        {combatants.map((c,i) => (
          <div key={c.id} style={{
            padding:"8px 10px", background: i===turn ? T.crimsonSoft : "transparent",
            borderRadius:"2px", borderLeft: i===turn ? `3px solid ${T.crimson}` : "3px solid transparent",
            opacity: c.hp<=0 ? 0.3 : 1, transition:"all 0.15s",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:12, fontFamily:T.body, fontWeight:500, color:T.textFaint, minWidth:20 }}>{c.init}</span>
              <span style={{ width:5, height:5, borderRadius:"50%", flexShrink:0, background:c.type==="pc"?"#5ee09a":T.crimson }} />
              <span style={{ flex:1, fontSize:13, fontFamily:T.body, fontWeight:400, color:T.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{c.name}</span>
              <span style={{ fontFamily:T.ui, fontSize:8, color:T.textFaint, letterSpacing:"1px" }}>AC {c.ac}</span>
              <div style={{ display:"flex", alignItems:"center", gap:2 }}>
                <button onClick={()=>adjHp(c.id,-5)} style={{ background:"none", border:"none", cursor:"pointer", color:T.crimson, fontSize:14, padding:"2px 4px" }}>−</button>
                <span style={{ fontSize:11, fontFamily:T.body, fontWeight:500, minWidth:42, textAlign:"center", color:c.hp<c.maxHp*0.3?T.crimson:c.hp<c.maxHp*0.6?"#e8940a":T.textDim }}>{c.hp}/{c.maxHp}</span>
                <button onClick={()=>adjHp(c.id,5)} style={{ background:"none", border:"none", cursor:"pointer", color:"#5ee09a", fontSize:14, padding:"2px 4px" }}>+</button>
              </div>
              {c.type==="enemy" && <button onClick={()=>remove(c.id)} style={{ background:"none", border:"none", cursor:"pointer", color:T.textFaint, padding:"2px" }}><X size={10}/></button>}
            </div>
            {(conditions[c.id]||[]).length > 0 && (
              <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:4, paddingLeft:28 }}>
                {(conditions[c.id]||[]).map((cond,ci) => (
                  <span key={ci} onClick={()=>removeCondition(c.id,ci)} style={{
                    display:"inline-flex", alignItems:"center", gap:3, background:T.crimsonSoft, border:`1px solid ${T.crimsonBorder}`,
                    padding:"1px 6px", borderRadius:"2px", fontSize:8, fontFamily:T.ui, letterSpacing:"0.5px", color:T.crimson, cursor:"pointer", textTransform:"uppercase",
                  }}>{cond} <X size={7}/></span>
                ))}
              </div>
            )}
            {i === turn && c.hp > 0 && (
              <div style={{ paddingLeft:28, marginTop:4 }}>
                <select onChange={e=>{addCondition(c.id,e.target.value);e.target.value="";}} value=""
                  style={{ padding:"3px 6px", fontSize:10, fontFamily:T.ui, background:T.bgInput, border:`1px solid ${T.border}`, color:T.textMuted, borderRadius:"2px", cursor:"pointer" }}>
                  <option value="">+ Condition</option>
                  {conditionsList.map(co=><option key={co} value={co}>{co}</option>)}
                </select>
              </div>
            )}
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:6, marginTop:12, paddingTop:12, borderTop:`1px solid ${T.borderMid}` }}>
        <Input value={name} onChange={setName} placeholder="Name" style={{ flex:1 }} />
        <Input value={init} onChange={setInit} placeholder="Init" type="number" style={{ width:48, textAlign:"center" }} />
        <Input value={hpVal} onChange={setHpVal} placeholder="HP" type="number" style={{ width:48, textAlign:"center" }} />
        <Input value={acVal} onChange={setAcVal} placeholder="AC" type="number" style={{ width:48, textAlign:"center" }} />
        <CrimsonBtn onClick={add} secondary small><Plus size={12}/></CrimsonBtn>
      </div>
    </div>
  );
}

// ─── SESSION SCHEDULER (inline, no wrapper) ────────────────────────────────

function SessionSchedulerInline({ data, setData }) {
  const sched = data.sessionSchedule;
  const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const [customDate, setCustomDate] = useState("");
  const [customTime, setCustomTime] = useState("19:00");

  const updateSchedule = (key, val) => {
    setData(d => ({ ...d, sessionSchedule: { ...d.sessionSchedule, [key]: val } }));
  };

  const calculateNextSession = () => {
    const now = new Date();
    let next = new Date(now);
    const targetDay = sched.dayOfWeek;
    const diff = (targetDay - now.getDay() + 7) % 7;
    next.setDate(now.getDate() + (diff === 0 && now.getHours() >= sched.hour ? 7 : diff));
    next.setHours(sched.hour, sched.minute, 0, 0);
    if (sched.frequency === "biweekly") next.setDate(next.getDate() + 7);
    return next.toISOString();
  };

  const applySchedule = () => {
    const nextISO = calculateNextSession();
    setData(d => ({ ...d, nextSession: nextISO,
      activity: [{ time: "Just now", text: `Updated session schedule: ${dayNames[sched.dayOfWeek]}s at ${sched.hour}:${String(sched.minute).padStart(2,"0")}` }, ...d.activity].slice(0,20)
    }));
  };

  const scheduleCustom = () => {
    if (!customDate) return;
    const dt = new Date(`${customDate}T${customTime}:00`);
    setData(d => ({ ...d, nextSession: dt.toISOString(),
      activity: [{ time: "Just now", text: `Scheduled session for ${dt.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})} at ${customTime}` }, ...d.activity].slice(0,20)
    }));
    setCustomDate(""); setCustomTime("19:00");
  };

  const cancelNext = () => {
    const after = calculateNextSession();
    const skip = new Date(new Date(after).getTime() + 7*864e5);
    setData(d => ({ ...d, nextSession: skip.toISOString(),
      activity: [{ time: "Just now", text: "Cancelled next session, pushed to following week" }, ...d.activity].slice(0,20)
    }));
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Day</span>
          <Select value={sched.dayOfWeek} onChange={v=>updateSchedule("dayOfWeek",parseInt(v))} style={{ width:"100%" }}>
            {dayNames.map((d,i) => <option key={i} value={i}>{d}</option>)}
          </Select>
        </div>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Frequency</span>
          <Select value={sched.frequency} onChange={v=>updateSchedule("frequency",v)} style={{ width:"100%" }}>
            <option value="weekly">Weekly</option>
            <option value="biweekly">Biweekly</option>
            <option value="monthly">Monthly</option>
          </Select>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Hour</span>
          <Input type="number" value={sched.hour} onChange={v=>updateSchedule("hour",Math.max(0,Math.min(23,parseInt(v)||0)))} />
        </div>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Minute</span>
          <Input type="number" value={sched.minute} onChange={v=>updateSchedule("minute",Math.max(0,Math.min(59,parseInt(v)||0)))} />
        </div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <CrimsonBtn onClick={applySchedule} small><Check size={12}/> Apply Schedule</CrimsonBtn>
        <CrimsonBtn onClick={cancelNext} secondary small><X size={12}/> Skip Next</CrimsonBtn>
      </div>
      <div style={{ borderTop:`1px solid ${T.border}`, paddingTop:16 }}>
        <span style={{ fontFamily:T.ui, fontSize:9, letterSpacing:"2px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:10 }}>One-Off Session</span>
        <div style={{ display:"flex", gap:8 }}>
          <Input type="date" value={customDate} onChange={setCustomDate} style={{ flex:1 }} />
          <Input type="time" value={customTime} onChange={setCustomTime} style={{ width:100 }} />
          <CrimsonBtn onClick={scheduleCustom} secondary small><Calendar size={12}/> Set</CrimsonBtn>
        </div>
      </div>
    </div>
  );
}

// ─── PLAYER CHARACTER FORM (self-service for players) ───────────────────────

function PlayerCharacterForm({ onSubmit, existing, onCancel }) {
  const [form, setForm] = useState(() => {
    const blank = { name:"", cls:"", lv:1, hp:10, maxHp:10, ac:10, player:"", status:"healthy", race:"", bio:"", sheetUrl:null, sheetName:null, str:10, dex:10 };
    if (!existing) return blank;
    return { ...blank, ...existing, str: existing.str != null ? existing.str : 10, dex: existing.dex != null ? existing.dex : 10 };
  });
  const fileRef = useRef(null);

  const handleSheet = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    setForm(p => ({...p, sheetUrl: url, sheetName: file.name}));
  };

  const submit = () => {
    if (!form.name.trim() || !form.player.trim()) return;
    onSubmit(form);
  };

  const classes = ["Barbarian","Bard","Cleric","Druid","Fighter","Monk","Paladin","Ranger","Rogue","Sorcerer","Warlock","Wizard","Artificer","Blood Hunter"];
  const races = ["Human","Elf","Half-Elf","Dwarf","Halfling","Gnome","Half-Orc","Tiefling","Dragonborn","Aasimar","Goliath","Tabaxi","Kenku","Firbolg","Genasi","Changeling","Warforged"];

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Player Name</span>
          <Input value={form.player} onChange={v=>setForm(p=>({...p,player:v}))} placeholder="Your name" />
        </div>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Character Name</span>
          <Input value={form.name} onChange={v=>setForm(p=>({...p,name:v}))} placeholder="Character name" />
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Race</span>
          <Select value={form.race} onChange={v=>setForm(p=>({...p,race:v}))} style={{ width:"100%" }}>
            <option value="">Select...</option>
            {races.map(r=><option key={r} value={r}>{r}</option>)}
          </Select>
        </div>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Class</span>
          <Select value={form.cls} onChange={v=>setForm(p=>({...p,cls:v}))} style={{ width:"100%" }}>
            <option value="">Select...</option>
            {classes.map(c=><option key={c} value={c}>{c}</option>)}
          </Select>
        </div>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Level</span>
          <Input type="number" value={form.lv} onChange={v=>setForm(p=>({...p,lv:Math.max(1,Math.min(20,parseInt(v)||1))}))} />
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>HP</span>
          <Input type="number" value={form.hp} onChange={v=>setForm(p=>({...p,hp:parseInt(v)||1,maxHp:Math.max(p.maxHp,parseInt(v)||1)}))} />
        </div>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Max HP</span>
          <Input type="number" value={form.maxHp} onChange={v=>setForm(p=>({...p,maxHp:parseInt(v)||1}))} />

          <Input type="number" value={form.ac} onChange={v=>setForm(p=>({...p,ac:parseInt(v)||10}))} />
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>STR (combat engine)</span>
          <Input type="number" value={form.str != null ? form.str : 10} onChange={v=>setForm(p=>({...p,str:Math.max(1,Math.min(30,parseInt(v)||10))}))} />
        </div>
        <div>
          <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>DEX</span>

        <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Backstory / Notes</span>

      <div>
        <span style={{ fontFamily:T.ui, fontSize:8, letterSpacing:"1px", color:T.textMuted, textTransform:"uppercase", display:"block", marginBottom:6 }}>Character Sheet</span>
