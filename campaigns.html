<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://unpkg.com https://cdn.jsdelivr.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" />
  <title>Campaign Manager · Phmurt Studios</title>
  <meta name="description" content="Manage your D&D campaigns with our comprehensive campaign manager. Track parties, encounters, sessions, and initiative." />
  <meta property="og:title" content="Campaign Manager · Phmurt Studios" />
  <meta property="og:description" content="Manage your D&D campaigns with our comprehensive campaign manager." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://phmurtstudios.com/campaigns.html" />
  <meta property="og:image" content="https://phmurtstudios.com/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="dns-prefetch" href="https://unpkg.com" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="preload" href="https://unpkg.com/react@18/umd/react.production.min.js" as="script" crossorigin />
  <link rel="preload" href="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" as="script" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
  <script src="theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
  <script src="supabase-config.js"></script>
  <script src="phmurt-auth.js"></script>
  <script src="phmurt-char-sync.js"></script>
  <script src="phmurt-realtime.js"></script>
  <script src="phmurt-shell.js"></script>
  <script src="campaign-combat-integration.js"></script>
  <!-- Play-tab assets: combat engine, VFX, SRD monsters — deferred for fast initial load -->
  <script src="combat-engine.js" defer></script>
  <script src="visual-effects.js" defer></script>
  <script src="monster-data.js" defer></script>
  <script src="campaign-play-loader.js" defer></script>
  <script src="combat-flow-ui.js" defer></script>
  <style>
    #campaign-root {
      width: 100%;
      min-height: 100vh;
    }
    /* Instant loading shell — shown before React mounts, hidden by React */
    .cm-loading-shell {
      display: flex; height: 100vh; background: var(--bg, #0c0804);
      font-family: 'Spectral', serif; color: rgba(255,255,255,0.35);
    }
    .cm-loading-shell .cm-ls-nav {
      width: 200px; min-width: 200px; background: var(--bg-nav, #100c08);
      border-right: 1px solid rgba(212,67,58,0.12); padding: 16px 18px;
    }
    .cm-loading-shell .cm-ls-title {
      font-family: 'Cinzel', serif; font-size: 16px; color: rgba(255,255,255,0.6);
      letter-spacing: 1.5px;
    }
    .cm-loading-shell .cm-ls-sub {
      font-size: 8px; color: rgba(212,67,58,0.7); letter-spacing: 2px;
      text-transform: uppercase; margin-top: 2px;
    }
    .cm-loading-shell .cm-ls-items { margin-top: 24px; display: flex; flex-direction: column; gap: 4px; }
    .cm-loading-shell .cm-ls-item {
      padding: 10px 12px; border-radius: 0 6px 6px 0;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }
    .cm-loading-shell .cm-ls-item.active {
      background: rgba(212,67,58,0.08); border-left: 3px solid var(--crimson, #d4433a);
      color: rgba(212,67,58,0.9);
    }
    .cm-loading-shell .cm-ls-main {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    .cm-loading-shell .cm-ls-spinner {
      width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.08);
      border-top: 2px solid rgba(212,67,58,0.5); border-radius: 50%;
      animation: cm-spin 0.8s linear infinite;
    }
    @keyframes cm-spin { to { transform: rotate(360deg); } }
    /* Hide the default page hero when React loads */
    .ps-page-hero.cm-hero { display: none; }

    /* ═══ COMBAT SHELL — fullscreen overlay, children opt-in to pointer events ═══ */
    .cm-combat-shell {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 28;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .cm-combat-shell * { box-sizing: border-box; }

    /* ═══ INITIATIVE BAR (BG3-style, top of battlemap) ═══ */
    .cm-initiative-bar-wrapper {
      background: linear-gradient(180deg, rgba(6,6,12,0.94) 0%, rgba(6,6,12,0.85) 80%, rgba(6,6,12,0) 100%);
    }
    html.light-mode .cm-initiative-bar-wrapper {
      background: linear-gradient(180deg, rgba(247,240,222,0.96) 0%, rgba(247,240,222,0.88) 80%, rgba(247,240,222,0) 100%);
    }

    /* ═══ TOP BAR — initiative rail + round counter ═══ */
    .cm-top-strip {
      position: relative;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      margin: 6px 8px 0;
      border: 1px solid var(--top-strip-border, rgba(255,255,255,0.06));
      border-radius: 12px;
      background: var(--top-strip-bg, rgba(7,8,12,0.88));
      backdrop-filter: blur(14px);
      box-shadow: var(--top-strip-shadow, 0 8px 28px rgba(0,0,8,0.45));
    }

    .cm-round-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(255,213,79,0.06);
      border: 1px solid rgba(255,213,79,0.15);
      font: 700 9px/1 'Cinzel', serif;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: #ffd54f;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .cm-initiative-strip {
      display: flex;
      gap: 3px;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 2px 0;
    }
    .cm-initiative-strip::-webkit-scrollbar,
    .cm-hotbar::-webkit-scrollbar,
    .cm-confirm-flyout::-webkit-scrollbar { display: none; }

    .cm-init-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 6px;
      min-width: 0;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      transition: background 100ms ease, border-color 100ms ease;
      flex-shrink: 0;
    }
    .cm-init-chip:hover { background: var(--bg-hover-subtle, rgba(255,255,255,0.04)); }
    .cm-init-chip.is-active {
      background: rgba(255,213,79,0.07);
      border-color: rgba(255,213,79,0.22);
    }
    .cm-init-chip.is-dead { opacity: 0.35; }

    .cm-init-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text, #fff);
      font: 700 8px 'Cinzel', serif;
      overflow: hidden;
      border: 2px solid var(--border-mid, rgba(255,255,255,0.06));
      flex-shrink: 0;
      position: relative;
    }
    .cm-init-chip.is-active .cm-init-avatar {
      border-color: rgba(255,213,79,0.7);
      box-shadow: 0 0 10px rgba(255,213,79,0.18);
    }
    .cm-init-hp-ring {
      position: absolute; inset: -2px;
      border-radius: 50%;
      pointer-events: none;
    }

    .cm-init-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .cm-init-name {
      font: 700 9px/1.1 'Cinzel', serif;
      color: var(--text-dim, rgba(242,232,214,0.8));
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 64px;
    }
    .cm-init-chip.is-active .cm-init-name { color: #ffd54f; }
    .cm-init-meta {
      font: 400 7px/1 'Spectral', serif;
      letter-spacing: 0.3px;
      color: var(--text-faint, rgba(242,232,214,0.38));
      white-space: nowrap;
    }

    .cm-turn-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .cm-turn-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 8px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(242,232,214,0.5);
      font: 700 8px/1 'Cinzel', serif;
      letter-spacing: 0.8px; text-transform: uppercase;
      cursor: pointer;
      transition: background 100ms ease;
    }
    .cm-turn-btn:hover { background: rgba(255,255,255,0.06); }
    .cm-turn-btn.is-primary {
      border-color: rgba(94,224,154,0.2);
      background: rgba(94,224,154,0.06);
      color: #5ee09a;
    }
    .cm-turn-btn.is-danger {
      border-color: rgba(212,67,58,0.15);
      color: rgba(242,232,214,0.35);
    }

    /* ═══ FOCUS STRIP — current actor summary, always visible during combat ═══ */
    .cm-focus-strip {
      position: absolute;
      left: 8px;
      bottom: 52px;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px 5px 5px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(7,8,12,0.88);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 22px rgba(0,0,8,0.4);
      max-width: 480px;
      transition: opacity 160ms ease;
    }
    .cm-focus-avatar {
      width: 32px; height: 32px;
      border-radius: 50%; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font: 700 11px 'Cinzel', serif;
      border: 2px solid rgba(255,213,79,0.5);
      box-shadow: 0 0 12px rgba(255,213,79,0.15);
      flex-shrink: 0;
    }
    .cm-focus-col {
      display: flex; flex-direction: column; gap: 2px; min-width: 0;
    }
    .cm-focus-name {
      font: 700 12px/1.1 'Cinzel', serif;
      color: #f4ead6;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cm-focus-stats {
      display: flex; gap: 6px; align-items: center;
    }
    .cm-focus-stat {
      font: 400 9px/1 'Spectral', serif;
      color: rgba(242,232,214,0.5);
      white-space: nowrap;
    }
    .cm-focus-stat b { font-weight: 700; }
    .cm-focus-stat.is-hp { font-weight: 700; }
    .cm-economy-dots {
      display: flex; gap: 4px; align-items: center;
    }
    .cm-eco-dot {
      width: 8px; height: 8px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      transition: background 120ms ease;
    }
    .cm-eco-dot.is-ready { box-shadow: 0 0 6px currentColor; }
    .cm-focus-conds {
      display: flex; gap: 3px; align-items: center;
    }
    .cm-cond-pip {
      width: 6px; height: 6px; border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.3);
    }

    /* ═══ HOTBAR — bottom action bar, keyboard-driven ═══ */
    .cm-hotbar {
      position: relative;
      pointer-events: auto;
      display: flex;
      gap: 4px;
      padding: 4px 6px;
      margin: 0 8px 6px;
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(7,8,12,0.88);
      backdrop-filter: blur(14px);
      box-shadow: 0 8px 28px rgba(0,0,8,0.45);
      align-items: stretch;
    }
    .cm-hot-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      min-width: 72px;
      max-width: 110px;
      padding: 6px 8px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      color: #f4ead6;
      cursor: pointer;
      transition: background 100ms ease, border-color 100ms ease, transform 80ms ease;
      flex-shrink: 0;
      position: relative;
    }
    .cm-hot-slot:hover:not(:disabled) {
      background: rgba(255,255,255,0.05);
      transform: translateY(-1px);
    }
    .cm-hot-slot:disabled {
      cursor: not-allowed;
      opacity: 0.32;
    }
    .cm-hot-slot.is-selected {
      border-color: rgba(212,67,58,0.35);
      background: rgba(212,67,58,0.06);
    }
    .cm-hot-key {
      position: absolute;
      top: 2px; right: 4px;
      font: 700 7px/1 'Cinzel', serif;
      color: rgba(242,232,214,0.25);
      letter-spacing: 0.5px;
    }
    .cm-hot-icon {
      display: flex; align-items: center; gap: 4px;
      font: 700 10px/1 'Cinzel', serif;
      letter-spacing: 0.5px; text-transform: uppercase;
      white-space: nowrap;
    }
    .cm-hot-sub {
      font: 400 8px/1 'Spectral', serif;
      color: rgba(242,232,214,0.38);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100px;
    }

    /* ═══ CONFIRM FLYOUT — slim right panel for attack/spell/move confirm ═══ */
    .cm-confirm-flyout {
      position: absolute;
      top: 50px;
      right: 8px;
      width: 280px;
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: rgba(9,10,14,0.94);
      backdrop-filter: blur(18px);
      box-shadow: -8px 12px 36px rgba(0,0,8,0.45);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 180ms ease, opacity 140ms ease;
    }
    .cm-confirm-flyout.is-collapsed {
      transform: translateX(calc(100% + 20px));
      opacity: 0;
      pointer-events: none;
    }
    .cm-flyout-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cm-flyout-title {
      font: 700 11px/1 'Cinzel', serif;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .cm-flyout-close {
      display: inline-flex; align-items: center;
      padding: 4px 6px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(242,232,214,0.4);
      cursor: pointer;
    }
    .cm-flyout-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .cm-flyout-cell {
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.02);
    }
    .cm-flyout-cell-label {
      font: 400 7px/1 'Cinzel', serif;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: rgba(242,232,214,0.35);
    }
    .cm-flyout-cell-value {
      margin-top: 2px;
      font: 500 11px/1.2 'Spectral', serif;
      color: #f4ead6;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cm-flyout-confirm {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(212,67,58,0.2);
      background: rgba(212,67,58,0.06);
      color: var(--crimson);
      font: 700 9px/1 'Cinzel', serif;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 100ms ease;
    }
    .cm-flyout-confirm:hover:not(:disabled) { background: rgba(212,67,58,0.12); }
    .cm-flyout-confirm:disabled { opacity: 0.35; cursor: not-allowed; }
    .cm-flyout-confirm.is-purple {
      border-color: rgba(181,116,255,0.2);
      background: rgba(181,116,255,0.06);
      color: #b574ff;
    }
    .cm-flyout-confirm.is-purple:hover:not(:disabled) { background: rgba(181,116,255,0.12); }

    /* ═══ COMBAT LOG — overlays bottom-right, toggleable ═══ */
    .cm-log-overlay {
      position: absolute;
      bottom: 52px;
      right: 8px;
      width: 260px;
      max-height: 240px;
      overflow-y: auto;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(7,8,12,0.92);
      backdrop-filter: blur(14px);
      box-shadow: -6px 8px 24px rgba(0,0,8,0.4);
      padding: 8px 10px;
      scrollbar-width: none;
      transition: transform 160ms ease, opacity 120ms ease;
    }
    .cm-log-overlay.is-hidden {
      transform: translateY(12px);
      opacity: 0;
      pointer-events: none;
    }
    .cm-log-overlay::-webkit-scrollbar { display: none; }
    .cm-log-entry {
      padding: 5px 0;
      border-top: 1px solid rgba(255,255,255,0.04);
      font: 400 11px/1.4 'Spectral', serif;
      color: rgba(242,232,214,0.6);
    }
    .cm-log-entry:first-child { border-top: none; }
    .cm-log-dmg { font: 700 8px/1 'Cinzel', serif; color: #dc143c; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

    /* ═══ HP ADJUST POPOVER — tiny inline widget ═══ */
    .cm-hp-adjust {
      display: flex; gap: 3px; align-items: center;
    }
    .cm-hp-btn {
      width: 22px; height: 20px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(242,232,214,0.5);
      font: 700 9px/1 'Cinzel', serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 80ms ease;
    }
    .cm-hp-btn:hover { background: rgba(255,255,255,0.06); }
    .cm-hp-btn.is-heal { color: #5ee09a; border-color: rgba(94,224,154,0.15); }
    .cm-hp-btn.is-hurt { color: #f06858; border-color: rgba(212,67,58,0.15); }

    /* ═══ CONDITION EDITOR POPOVER ═══ */
    .cm-cond-editor {
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 6px;
      width: 260px;
      max-height: 220px;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(9,10,14,0.96);
      backdrop-filter: blur(16px);
      box-shadow: 0 -6px 20px rgba(0,0,8,0.4);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      pointer-events: auto;
      z-index: 30;
    }
    .cm-cond-toggle {
      padding: 5px 7px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      color: rgba(242,232,214,0.45);
      font: 400 8px/1 'Cinzel', serif;
      cursor: pointer;
      text-align: left;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 80ms ease;
    }
    .cm-cond-toggle:hover { background: rgba(255,255,255,0.05); }
    .cm-cond-toggle.is-on { font-weight: 700; }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 900px) {
      .cm-focus-strip { max-width: calc(100vw - 16px); }
      .cm-confirm-flyout { width: min(280px, calc(100vw - 16px)); }
      .cm-log-overlay { width: min(260px, calc(100vw - 16px)); }
      .cm-cond-editor { width: min(260px, calc(100vw - 16px)); }
    }
    @media (max-width: 640px) {
      .cm-top-strip {
        margin: max(8px, env(safe-area-inset-top)) 6px 0;
        padding: 4px 5px;
        gap: 4px;
      }
      .cm-round-badge {
        padding: 2px 6px;
        font-size: 8px;
        letter-spacing: 1px;
      }
      .cm-init-chip {
        padding: 2px 3px;
        gap: 0;
      }
      .cm-init-info {
        display: none;
      }
      .cm-init-avatar {
        width: 26px;
        height: 26px;
      }
      .cm-turn-controls {
        gap: 3px;
      }
      .cm-turn-btn {
        min-height: 34px;
        padding: 0 9px;
      }
      .cm-focus-strip {
        display: flex;
        left: 6px;
        right: 6px;
        bottom: calc(56px + env(safe-area-inset-bottom));
        max-width: none;
        padding: 6px 8px 6px 6px;
      }
      .cm-focus-name {
        max-width: 42vw;
        font-size: 11px;
      }
      .cm-focus-stats {
        gap: 5px;
      }
      .cm-hp-adjust {
        gap: 2px;
      }
      .cm-hp-btn {
        width: 26px;
        height: 26px;
      }
      .cm-confirm-flyout {
        top: auto;
        left: 6px;
        right: 6px;
        bottom: calc(108px + env(safe-area-inset-bottom));
        width: auto;
        max-height: min(42dvh, 280px);
        border-radius: 14px;
      }
      .cm-log-overlay {
        left: 6px;
        right: 6px;
        bottom: calc(108px + env(safe-area-inset-bottom));
        width: auto;
        max-height: min(36dvh, 240px);
      }
      .cm-hotbar {
        margin: 0 6px calc(6px + env(safe-area-inset-bottom));
        padding: 4px 4px;
      }
      .cm-hot-slot {
        min-width: 68px;
        padding: 6px 8px;
      }
      .cm-cond-editor {
        left: 0;
        width: calc(100vw - 12px);
        max-height: 180px;
      }
    }

    /* ═══ ENHANCED COMBAT ACTION PANEL — categorized action grid ═══ */
    /* ── Action Panel: full-width bottom bar ── */
    .cm-action-panel {
      position: fixed;
      bottom: 10px;
      left: 16px;
      right: 16px;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      border: 2px solid var(--action-panel-accent, rgba(212,67,58,0.25));
      border-radius: 16px;
      background: var(--action-panel-bg, rgba(7,8,12,0.97));
      backdrop-filter: blur(24px);
      box-shadow: 0 -6px 32px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 200ms ease, opacity 160ms ease;
      z-index: 9999;
      overflow: hidden;
    }
    .cm-action-panel.is-hidden {
      transform: translateY(100%);
      opacity: 0;
      pointer-events: none;
    }
    .cm-action-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 18px;
      border-bottom: 1px solid var(--action-panel-divider, rgba(255,255,255,0.04));
    }
    .cm-action-panel-title {
      font: 700 13px/1 'Cinzel', serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text, rgba(242,232,214,0.85));
    }
    .cm-action-panel-economy {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .cm-economy-pip {
      display: flex;
      align-items: center;
      gap: 4px;
      font: 600 10px/1 'Cinzel', serif;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .cm-economy-pip .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      transition: background 150ms ease;
    }
    .cm-economy-pip .dot.is-available {
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }
    .cm-economy-pip.action { color: var(--action-color-action, #dc143c); }
    .cm-economy-pip.bonus { color: var(--action-color-bonus, #ffa726); }
    .cm-economy-pip.reaction { color: var(--action-color-reaction, #ab47bc); }
    .cm-economy-pip.movement { color: var(--action-color-movement, #29b6f6); }

    /* Tab bar */
    .cm-action-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--action-panel-divider, rgba(255,255,255,0.06));
      padding: 0 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cm-action-tabs::-webkit-scrollbar { display: none; }
    .cm-action-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-faint, #64748b);
      padding: 9px 16px;
      cursor: pointer;
      font: 500 11px/1 'Cinzel', serif;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cm-action-tab:hover { color: var(--text, #e2e8f0); }
    .cm-action-tab.is-active {
      color: var(--text, #e2e8f0);
      border-bottom-color: var(--tab-accent, var(--crimson, #dc143c));
    }
    .cm-action-tab-count {
      font: 600 10px/1 monospace;
      padding: 2px 7px;
      border-radius: 8px;
      min-width: 16px;
      text-align: center;
    }

    /* Spell level subtabs */
    .cm-spell-subtabs {
      display: flex;
      gap: 2px;
      padding: 4px 12px;
      border-bottom: 1px solid var(--action-panel-divider, rgba(255,255,255,0.04));
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cm-spell-subtabs::-webkit-scrollbar { display: none; }
    .cm-spell-subtab {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-faint, #64748b);
      padding: 3px 10px;
      cursor: pointer;
      font: 500 9px/1 'Cinzel', serif;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.12s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cm-spell-subtab:hover { color: var(--text-muted, #94a3b8); background: var(--action-card-hover-bg, rgba(255,255,255,0.03)); }
    .cm-spell-subtab.is-active {
      color: var(--action-color-spell, #a78bfa);
      border-color: color-mix(in srgb, var(--action-color-spell, #a78bfa) 30%, transparent);
      background: color-mix(in srgb, var(--action-color-spell, #a78bfa) 6%, transparent);
    }

    .cm-action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px;
      padding: 8px 16px 12px;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--action-panel-divider, rgba(255,255,255,0.08)) transparent;
    }
    .cm-action-card {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 5px;
      min-width: 0;
      padding: 8px 12px;
      border: 1px solid var(--action-card-border, rgba(255,255,255,0.06));
      border-radius: 6px;
      background: var(--action-card-bg, rgba(255,255,255,0.02));
      color: var(--text, #f4ead6);
      cursor: pointer;
      transition: all 120ms ease;
      position: relative;
      text-align: left;
      font-family: 'Spectral', serif;
    }
    .cm-action-card:hover:not(.is-disabled) {
      background: var(--action-card-hover-bg, rgba(255,255,255,0.06));
      border-color: var(--action-card-hover-border, rgba(255,255,255,0.12));
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .cm-action-card.is-selected {
      border-color: var(--action-color, rgba(220,20,60,0.4));
      background: color-mix(in srgb, var(--action-color, #dc143c) 8%, transparent);
      box-shadow: 0 0 12px color-mix(in srgb, var(--action-color, #dc143c) 15%, transparent);
    }
    .cm-action-card.is-disabled {
      opacity: 0.28;
      cursor: not-allowed;
    }
    .cm-action-card-hotkey {
      position: absolute;
      top: 2px;
      right: 4px;
      font: 700 7px/1 'Cinzel', serif;
      color: var(--text-faint, rgba(242,232,214,0.2));
    }
    .cm-action-card-icon {
      font-size: 16px;
      line-height: 1;
    }
    .cm-action-card-label {
      font: 700 11px/1.2 'Cinzel', serif;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cm-action-card-cost {
      font: 400 8px/1 'Spectral', serif;
      color: var(--text-faint, rgba(242,232,214,0.35));
      text-transform: capitalize;
    }

    /* ═══ RIGHT SIDEBAR — map setup + character sheet ═══ */
    .cm-right-sidebar {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 300px;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      background: var(--action-panel-bg, rgba(7,8,12,0.96));
      backdrop-filter: blur(18px);
      border-left: 1px solid var(--border, rgba(255,255,255,0.08));
      box-shadow: var(--sidebar-shadow, -4px 0 24px rgba(0,0,0,0.4));
      z-index: 28;
      overflow-y: auto;
      transition: transform 200ms ease, opacity 160ms ease;
    }
    .cm-right-sidebar-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--action-panel-divider, rgba(255,255,255,0.04));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .cm-right-sidebar-title {
      font: 700 10px/1 'Cinzel', serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted, rgba(242,232,214,0.5));
    }
    .cm-right-sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
    }
    .cm-char-sheet-portrait {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--action-panel-divider, rgba(255,255,255,0.04));
      margin-bottom: 10px;
    }
    .cm-char-sheet-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font: 700 16px/1 'Cinzel', serif;
      color: var(--text, #fff);
      border: 2px solid var(--border, rgba(255,255,255,0.12));
      overflow: hidden;
      flex-shrink: 0;
    }
    .cm-char-sheet-name {
      font: 700 14px/1.2 'Cinzel', serif;
      color: var(--text, #f2e8d6);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cm-char-sheet-subtitle {
      font: 400 10px/1.3 'Spectral', serif;
      color: var(--text-faint, rgba(242,232,214,0.35));
      margin-top: 3px;
    }
    .cm-char-sheet-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .cm-char-sheet-stat {
      padding: 6px 4px;
      border-radius: 8px;
      text-align: center;
      background: var(--action-card-bg, rgba(255,255,255,0.03));
      border: 1px solid var(--action-card-border, rgba(255,255,255,0.06));
    }
    .cm-char-sheet-stat-label {
      font: 700 7px/1 'Cinzel', serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-faint, rgba(242,232,214,0.35));
    }
    .cm-char-sheet-stat-value {
      font: 700 16px/1.2 'Spectral', serif;
      color: var(--text, #f2e8d6);
      margin-top: 2px;
    }
    .cm-char-sheet-stat-mod {
      font: 400 9px/1 'Spectral', serif;
      color: var(--text-muted, rgba(242,232,214,0.5));
      margin-top: 1px;
    }
    .cm-char-sheet-section {
      margin-bottom: 10px;
    }
    .cm-char-sheet-section-title {
      font: 700 8px/1 'Cinzel', serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-faint, rgba(242,232,214,0.35));
      padding-bottom: 5px;
      border-bottom: 1px solid var(--action-panel-divider, rgba(255,255,255,0.04));
      margin-bottom: 6px;
    }
    .cm-char-sheet-hp-bar {
      height: 8px;
      background: var(--hp-bar-track, rgba(255,255,255,0.05));
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }
    .cm-char-sheet-hp-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.3s ease;
    }
    .cm-char-sheet-item {
      font: 400 11px/1.4 'Spectral', serif;
      color: var(--text-muted, rgba(242,232,214,0.5));
      padding: 3px 0;
    }
    .cm-char-sheet-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      font: 400 9px/1 'Spectral', serif;
      background: var(--action-card-bg, rgba(255,255,255,0.03));
      border: 1px solid var(--action-card-border, rgba(255,255,255,0.06));
      color: var(--text-muted, rgba(242,232,214,0.5));
      margin: 2px 2px;
    }
    @media (max-width: 900px) {
      .cm-right-sidebar { width: 260px; }
    }
    @media (max-width: 640px) {
      .cm-right-sidebar {
        position: absolute;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: auto;
        max-height: 60vh;
        border-left: none;
        border-top: 1px solid var(--border, rgba(255,255,255,0.08));
        border-radius: 14px 14px 0 0;
      }
    }

    /* ═══ ROLL RESULT CARD — appears in confirm flyout ═══ */
    .cm-roll-result {
      padding: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cm-roll-result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cm-roll-result-action {
      font: 700 11px/1 'Cinzel', serif;
      color: #f4ead6;
      letter-spacing: 0.6px;
    }
    .cm-roll-result-verdict {
      font: 700 9px/1 'Cinzel', serif;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .cm-roll-result-verdict.is-hit {
      color: #5ee09a;
      background: rgba(94,224,154,0.1);
      border: 1px solid rgba(94,224,154,0.2);
    }
    .cm-roll-result-verdict.is-miss {
      color: #ef5350;
      background: rgba(239,83,80,0.1);
      border: 1px solid rgba(239,83,80,0.2);
    }
    .cm-roll-result-verdict.is-crit {
      color: #ffd54f;
      background: rgba(255,213,79,0.12);
      border: 1px solid rgba(255,213,79,0.25);
      animation: cm-crit-pulse 0.6s ease-in-out 2;
    }
    @keyframes cm-crit-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(255,213,79,0); }
      50% { box-shadow: 0 0 12px rgba(255,213,79,0.3); }
    }
    .cm-roll-section {
      padding: 5px 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.015);
    }
    .cm-roll-section-label {
      font: 600 7px/1 'Cinzel', serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(242,232,214,0.35);
      margin-bottom: 3px;
    }
    .cm-roll-section-value {
      font: 500 11px/1.3 'Spectral', serif;
      color: #f4ead6;
    }
    .cm-roll-dice {
      font-family: 'Courier New', monospace;
      font-weight: 700;
      color: #90caf9;
    }
    .cm-roll-verdict-text {
      font: 700 10px/1 'Cinzel', serif;
      letter-spacing: 0.5px;
    }
    .cm-dmg-line {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 0;
    }
    .cm-dmg-type-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cm-dmg-total {
      margin-top: 4px;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font: 700 12px/1 'Cinzel', serif;
      color: #dc143c;
      text-align: right;
    }

    /* ═══ ENHANCED COMBAT LOG SIDEBAR ═══ */
    .cm-log-sidebar {
      position: absolute;
      top: 50px;
      right: 8px;
      bottom: 52px;
      width: 300px;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      background: rgba(7,8,12,0.94);
      backdrop-filter: blur(18px);
      box-shadow: -8px 12px 36px rgba(0,0,8,0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 200ms ease, opacity 160ms ease;
      z-index: 29;
    }
    .cm-log-sidebar.is-hidden {
      transform: translateX(calc(100% + 20px));
      opacity: 0;
      pointer-events: none;
    }
    .cm-log-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .cm-log-sidebar-title {
      font: 700 10px/1 'Cinzel', serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(242,232,214,0.6);
    }
    .cm-log-sidebar-close {
      display: inline-flex;
      align-items: center;
      padding: 4px 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(242,232,214,0.4);
      cursor: pointer;
      font: 700 8px/1 'Cinzel', serif;
    }
    .cm-log-sidebar-close:hover { background: rgba(255,255,255,0.06); }
    .cm-log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .cm-log-entries::-webkit-scrollbar { width: 4px; }
    .cm-log-entries::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .cm-log-entry-card {
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.015);
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 100ms ease;
    }
    .cm-log-entry-card:hover { background: rgba(255,255,255,0.03); }
    .cm-log-entry-card.is-expanded { background: rgba(255,255,255,0.025); }
    .cm-log-entry-headline {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }
    .cm-log-entry-icon {
      font-size: 12px;
      line-height: 1.4;
      flex-shrink: 0;
    }
    .cm-log-entry-text {
      font: 500 11px/1.4 'Spectral', serif;
      color: #f4ead6;
      flex: 1;
      min-width: 0;
    }
    .cm-log-entry-time {
      font: 400 8px/1 'Spectral', serif;
      color: rgba(242,232,214,0.25);
      flex-shrink: 0;
    }
    .cm-log-entry-details {
      margin-top: 6px;
      padding-top: 5px;
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .cm-log-entry-detail-line {
      font: 400 10px/1.4 'Spectral', serif;
      padding-left: 20px;
    }
    .cm-log-entry-detail-line.is-bold {
      font-weight: 700;
    }
    .cm-log-round-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0 4px;
    }
    .cm-log-round-divider::before,
    .cm-log-round-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }
    .cm-log-round-label {
      font: 700 8px/1 'Cinzel', serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,213,79,0.5);
      white-space: nowrap;
    }

    /* ═══ DM / PLAYER VIEW INDICATOR ═══ */
    .cm-view-indicator {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font: 700 9px/1 'Cinzel', serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 200ms ease;
      z-index: 30;
      cursor: pointer;
    }
    .cm-view-indicator.is-dm {
      background: rgba(220,20,60,0.12);
      border: 1px solid rgba(220,20,60,0.25);
      color: #dc143c;
    }
    .cm-view-indicator.is-player {
      background: rgba(94,224,154,0.08);
      border: 1px solid rgba(94,224,154,0.2);
      color: #5ee09a;
    }
    .cm-view-indicator:hover {
      transform: translateX(-50%) scale(1.03);
    }
    .cm-view-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }

    /* ═══ TARGET INDICATOR — BG3-style reticle on focused target ═══ */
    .cm-target-reticle {
      position: absolute;
      pointer-events: none;
      border: 2px solid rgba(220,20,60,0.5);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(220,20,60,0.2), inset 0 0 8px rgba(220,20,60,0.1);
      animation: cm-reticle-spin 4s linear infinite;
      z-index: 27;
    }
    @keyframes cm-reticle-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .cm-target-reticle::before,
    .cm-target-reticle::after {
      content: "";
      position: absolute;
      background: rgba(220,20,60,0.6);
    }
    .cm-target-reticle::before {
      top: 50%; left: -6px; right: -6px;
      height: 1px;
      transform: translateY(-50%);
    }
    .cm-target-reticle::after {
      left: 50%; top: -6px; bottom: -6px;
      width: 1px;
      transform: translateX(-50%);
    }

    /* ═══ WEAPON / SPELL SELECTION SUBPANEL ═══ */
    .cm-sub-panel {
      padding: 6px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    .cm-sub-panel::-webkit-scrollbar { width: 3px; }

const Tag = ({ children, variant = "default" }) => {

function getWorldStateMeta(state) {
  const key = String(state || "stable").toLowerCase();
  return WORLD_STATE_META[key] || { label: state || "Stable", color:"#a4b5cc", icon:"*", glow:"rgba(164,181,204,0.14)" };
}

function getWorldThreatColor(threat) {
  if (threat === "extreme") return "#f06858";
  if (threat === "high") return "#e8940a";
  if (threat === "medium") return "#f5c45c";
  return "#5ee09a";
}

function getWorldTravelCost(region) {
  const typeCost = {
    city:0.9, town:1, hamlet:1.05, kingdom:0.95, castle:1,
    wilderness:1.35, forest:1.45, mountain:1.8, dungeon:1.55, ruins:1.35, route:0.75,
  };
  const threatCost = { low:1, medium:1.12, high:1.3, extreme:1.6 };
  return (typeCost[region?.type] || 1.15) * (threatCost[region?.threat] || 1);
}

function normalizeWorldMapState(worldMap) {
  return {
    pendingLaunch: worldMap?.pendingLaunch || null,
    lastRoute: worldMap?.lastRoute || null,
    lastFocusedRegionId: worldMap?.lastFocusedRegionId || null,
  };
}

/* ═══════════════════════════════════════════════════════════════════════════
   COMBAT HUD V2 — Minimal-footprint, decision-speed-first components
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Initiative Rail (compact horizontal strip) ── */
const InitiativeStrip = ({ combatants, tokens, turn, round, onSelectCombatant }) => (
  <div className="cm-initiative-strip" aria-label="Initiative order">
    {combatants.length === 0 ? (
      <div style={{ fontFamily:T.body, fontSize:10, color:T.textMuted, alignSelf:"center", padding:"0 8px" }}>No combatants</div>
    ) : combatants.map((c, idx) => {
      const tok = tokens.find(t => t.id === c.mapTokenId);
      const isCurrent = idx === turn;
      const isDead = (c.hp || 0) <= 0;
      const hpPct = c.maxHp ? Math.max(0, Math.min(100, Math.round((c.hp || 0) / c.maxHp * 100))) : 0;
      const hpCol = c.maxHp ? getHpColor(c.hp || 0, c.maxHp) : "#555";
      // SVG ring shows HP fraction as an arc around the avatar
      const ringR = 13; const ringC = 2 * Math.PI * ringR;
      const ringOffset = ringC * (1 - hpPct / 100);
      return (
        <button key={"init-" + c.id} type="button"
          className={"cm-init-chip" + (isCurrent ? " is-active" : "") + (isDead ? " is-dead" : "")}
          onClick={() => tok && onSelectCombatant(tok.id)}
          title={c.name + " · Init " + c.init + " · " + (c.hp ?? "?") + "/" + (c.maxHp ?? "?") + " HP · AC " + (tok?.ac || "?")}>
          <div className="cm-init-avatar" style={{ background: tok?.color || c.color || "#555" }}>
            {tok?.imageSrc ? <img src={tok.imageSrc} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt="" /> : (tok?.label || c.name.substring(0,2)).toUpperCase()}
            {c.maxHp > 0 && (
              <svg className="cm-init-hp-ring" viewBox="0 0 30 30" style={{ transform:"rotate(-90deg)" }}>
                <circle cx="15" cy="15" r={ringR} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="2.5" />
                <circle cx="15" cy="15" r={ringR} fill="none" stroke={hpCol} strokeWidth="2.5"
                  strokeDasharray={ringC} strokeDashoffset={ringOffset}
                  strokeLinecap="round" style={{ transition:"stroke-dashoffset 200ms ease" }} />
              </svg>
            )}
          </div>
          <div className="cm-init-info">
            <div className="cm-init-name">{c.name}</div>
            <div className="cm-init-meta">AC {tok?.ac || "?"} · {c.init}</div>
          </div>
        </button>
      );
    })}
  </div>
);

/* ── Turn Controls (compact inline buttons) ── */
const TurnControls = ({ combatLive, canControlTurn, onUndo, onNextTurn, onToggleLog, logOpen, onEndCombat }) => (
  <div className="cm-turn-controls">
    <button type="button" className={"cm-turn-btn" + (logOpen ? " is-primary" : "")} onClick={onToggleLog} title="Toggle combat log (L)">
      <Scroll size={11} /> Log
    </button>
    {combatLive && canControlTurn && (
      <React.Fragment>
        <button type="button" className="cm-turn-btn" onClick={onUndo} title="Previous turn (Ctrl+Z)">
          <RefreshCw size={11} />
        </button>
        <button type="button" className="cm-turn-btn is-primary" onClick={onNextTurn} title="End turn (Space)">
          <SkipForward size={11} /> End Turn
        </button>
        <button type="button" className="cm-turn-btn is-danger" onClick={onEndCombat} title="End combat">
          <X size={11} />
        </button>
      </React.Fragment>
    )}
  </div>
);

/* ── Top Bar (initiative rail + round badge + controls + roll display) ── */
const CombatTopBar = ({ combatLive, round, turn, combatants, tokens, canControlTurn, logOpen, onUndo, onNextTurn, onToggleLog, onSelectCombatant, onEndCombat, combatRollLog }) => {
  const rollTypeColor = (type) => type === "crit" ? "#ffd700" : type === "hit" ? "#5ee09a" : type === "miss" ? "#f06858" : "#b574ff";
  const rollTypeIcon = (type) => type === "crit" ? "\u2728" : type === "hit" ? "\u2694\uFE0F" : type === "miss" ? "\u26A0\uFE0F" : "\u2728";
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
      <div className="cm-top-strip">
        <div className="cm-round-badge">
          {combatLive ? ("R" + round + " · T" + (turn + 1) + "/" + Math.max(1, combatants.length)) : "Setup"}
        </div>
        <InitiativeStrip combatants={combatants} tokens={tokens} turn={turn} round={round} onSelectCombatant={onSelectCombatant} />
        <TurnControls combatLive={combatLive} canControlTurn={canControlTurn} logOpen={logOpen} onUndo={onUndo} onNextTurn={onNextTurn} onToggleLog={onToggleLog} onEndCombat={onEndCombat} />
      </div>
      {combatRollLog && combatRollLog.length > 0 && (
        <div style={{ display:"flex", gap:4, padding:"3px 8px", margin:"0 8px", overflowX:"auto", scrollbarWidth:"none" }}>
          {combatRollLog.map(roll => {
            const age = (Date.now() - roll.time) / 5000;
            if (age > 1) return null;
            const opacity = age < 0.7 ? 1 : Math.max(0, 1 - (age - 0.7) * 3.3);
            const color = rollTypeColor(roll.type);
            return (
              <div key={roll.id} style={{
                display:"flex", alignItems:"center", gap:6, padding:"4px 10px",
                background:"var(--action-card-bg, rgba(255,255,255,0.03))",
                border:"1px solid " + color + "55",
                borderLeft:"3px solid " + color,
                borderRadius:6, opacity: opacity, flexShrink:0,
                transition:"opacity 200ms ease",
              }}>
                <span style={{ fontSize:12 }}>{rollTypeIcon(roll.type)}</span>
                <div style={{ minWidth:0 }}>
                  <div style={{ fontFamily:"'Cinzel', serif", fontSize:10, fontWeight:700, color: color, whiteSpace:"nowrap", letterSpacing:"0.5px" }}>
                    {roll.msg}
                  </div>
                  {roll.detail && (
                    <div style={{ fontFamily:"'Spectral', serif", fontSize:8, color:"var(--text-muted, #9a8870)", whiteSpace:"nowrap", marginTop:1 }}>
                      {roll.detail}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ── Focus Strip (compact active-unit summary, bottom-left) ── */
const FocusStrip = ({ token, combatant, conditions, moveLabel, actionReady, bonusReady, reactionReady, canAdjustHp, onAdjustHp, onToggleCondition }) => {
  const [showCondEditor, setShowCondEditor] = React.useState(false);
  if (!token) return null;
  const hpCol = token.maxHp ? getHpColor(token.hp || 0, token.maxHp) : "#7d8394";
  const condMetas = (conditions || []).slice(0, 6).map(c => DND_CONDITIONS.find(dc => dc.name === c) || { name: c, color: "#aaa" });
  return (
    <div className="cm-focus-strip" style={{ position:"relative" }}>
      <div className="cm-focus-avatar" style={{ background: token.color || "#555" }}>
        {token.imageSrc ? <img src={token.imageSrc} style={{ width:"100%", height:"100%", objectFit:"cover" }} alt="" /> : (token.label || token.name.substring(0,2)).toUpperCase()}
      </div>
      <div className="cm-focus-col">
        <div className="cm-focus-name">{token.name}</div>
        <div className="cm-focus-stats">
          {token.maxHp ? <span className="cm-focus-stat is-hp" style={{ color: hpCol }}>{token.hp || 0}/{token.maxHp}</span> : null}
          <span className="cm-focus-stat">AC <b>{token.ac || "?"}</b></span>
          <span className="cm-focus-stat">{moveLabel}</span>
        </div>
      </div>
      {/* Action economy dots */}
      <div className="cm-economy-dots">
        {[
          { color:"#58aaff", ready: moveLabel !== "0 ft", title:"Move: " + moveLabel },
          { color:"#dc143c", ready: actionReady, title:"Action: " + (actionReady ? "Ready" : "Spent") },
          { color:"#ffd54f", ready: bonusReady, title:"Bonus: " + (bonusReady ? "Ready" : "Spent") },
          { color:"#b574ff", ready: reactionReady, title:"Reaction: " + (reactionReady ? "Ready" : "Spent") },
        ].map((d, i) => (
          <div key={"eco-" + i} className={"cm-eco-dot" + (d.ready ? " is-ready" : "")}
            style={{ background: d.ready ? d.color : "transparent", borderColor: d.ready ? d.color : undefined, color: d.color }}
            title={d.title} />
        ))}
      </div>
      {/* Conditions as tiny pips */}
      {condMetas.length > 0 && (
        <div className="cm-focus-conds" style={{ cursor: canAdjustHp ? "pointer" : "default" }}
          onClick={() => canAdjustHp && setShowCondEditor(prev => !prev)}
          title={conditions?.join(", ") || ""}>
          {condMetas.map((cm, i) => (
            <div key={"cpip-" + i} className="cm-cond-pip" style={{ background: cm.color }} title={cm.name} />
          ))}
        </div>
      )}
      {/* HP adjust buttons (DM only) */}
      {canAdjustHp && (
        <div className="cm-hp-adjust">
          {[-5,-1,1,5].map(d => (
            <button key={"hp" + d} type="button" className={"cm-hp-btn" + (d < 0 ? " is-hurt" : " is-heal")}
              onClick={() => onAdjustHp?.(d)}>{d > 0 ? "+" : ""}{d}</button>
          ))}
        </div>
      )}
      {/* Condition editor popover */}
      {showCondEditor && canAdjustHp && (
        <div className="cm-cond-editor">
          {DND_CONDITIONS.map(dc => {
            const isOn = (conditions || []).includes(dc.name);
            return (
              <button key={"ce-" + dc.name} type="button"
                className={"cm-cond-toggle" + (isOn ? " is-on" : "")}
                style={{ color: isOn ? dc.color : undefined, borderColor: isOn ? dc.color + "55" : undefined, background: isOn ? dc.color + "12" : undefined }}
                onClick={() => { onToggleCondition?.(dc.name); }}>
                {dc.name}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
};

/* ── Hotbar (keyboard-driven action bar, bottom) ── */
const ActionHotbar = ({ visible, token, moveLabel, actions, selectedActionKey, onChooseMove, onChooseAction, onClose }) => {
  if (!visible || !token) return null;
  const moveDisabled = moveLabel === "0 ft";
  return (
    <div className="cm-hotbar" aria-label="Action hotbar">
      {/* Move slot — always first, key M */}
      <button type="button" className={"cm-hot-slot" + (moveDisabled ? "" : "")} disabled={moveDisabled}
        onClick={onChooseMove}
        style={{ borderColor: moveDisabled ? undefined : "rgba(88,170,255,0.18)" }}
        title={moveDisabled ? "No movement remaining" : "Move (" + moveLabel + ") — press M"}>
        <span className="cm-hot-key">M</span>
        <span className="cm-hot-icon" style={{ color: moveDisabled ? T.textFaint : "#58aaff" }}><Compass size={13} /> Move</span>
        <span className="cm-hot-sub">{moveLabel}</span>
      </button>
      {/* Action slots — numbered 1–9 */}
      {actions.slice(0, 9).map((action, idx) => {
        const Icon = action.icon || Swords;
        const isSelected = action.key === selectedActionKey;
        const keyLabel = String(idx + 1);
        return (
          <button key={"hot-" + action.key} type="button"
            className={"cm-hot-slot" + (isSelected ? " is-selected" : "")}
            disabled={!!action.disabled}
            onClick={() => onChooseAction(action)}
            title={(action.disabledReason || action.label) + " — press " + keyLabel}
            style={{ borderColor: isSelected ? (action.tone || "rgba(212,67,58,0.35)") : undefined }}>
            <span className="cm-hot-key">{keyLabel}</span>
            <span className="cm-hot-icon" style={{ color: action.disabled ? T.textFaint : (action.tone || T.text) }}>
              <Icon size={12} /> {action.label.length > 10 ? action.label.substring(0, 9) + "…" : action.label}
            </span>
            <span className="cm-hot-sub">{action.cost || "Free"} · {action.panel}</span>
          </button>
        );
      })}
      {/* Close slot — Esc */}
      <button type="button" className="cm-hot-slot" onClick={onClose} title="Close hotbar (Esc)">
        <span className="cm-hot-key">Esc</span>
        <span className="cm-hot-icon" style={{ color: T.textMuted }}><X size={12} /> Close</span>
      </button>
    </div>
  );
};

/* ── Confirm Flyout (slim right panel for attack/spell/move confirmation) ── */
const ConfirmFlyout = ({ open, uiMode, token, pendingAction, activeSpell, focusTarget, focusDistance, focusLane, moveLabel, movementPath, movementOrigin, onConfirm, onCancel }) => {
  const isAttack = uiMode === "attack";
  const isAbility = uiMode === "ability";
  const isMove = uiMode === "move";
  const action = pendingAction;
  const pathFt = (movementPath?.length || 0) * 5;
  const moveRemaining = parseInt(moveLabel, 10) || 0;

  if (!open || (!isAttack && !isAbility && !isMove)) return null;

  return (
    <div className={"cm-confirm-flyout" + (open ? "" : " is-collapsed")}>
      <div className="cm-flyout-header">
        <span className="cm-flyout-title" style={{ color: isAbility ? "#b574ff" : isMove ? "#58aaff" : "var(--crimson)" }}>
          {isMove ? "Movement" : isAbility ? (activeSpell ? activeSpell.name : (action?.name || "Ability")) : (action?.name || "Attack")}
        </span>
        <button type="button" className="cm-flyout-close" onClick={onCancel}><X size={12} /></button>
      </div>

      {isMove && (
        <div className="cm-flyout-grid">
          <div className="cm-flyout-cell"><div className="cm-flyout-cell-label">Remaining</div><div className="cm-flyout-cell-value" style={{ color:"#58aaff" }}>{moveRemaining} ft</div></div>
          <div className="cm-flyout-cell"><div className="cm-flyout-cell-label">Planned</div><div className="cm-flyout-cell-value">{pathFt} ft</div></div>
        </div>
      )}

      {(isAttack || isAbility) && (
        <React.Fragment>
          <div className="cm-flyout-grid">
            {isAttack && <div className="cm-flyout-cell"><div className="cm-flyout-cell-label">Roll</div><div className="cm-flyout-cell-value">{action?.roll || "—"}</div></div>}
            <div className="cm-flyout-cell"><div className="cm-flyout-cell-label">Range</div><div className="cm-flyout-cell-value">{isAbility && activeSpell ? ((activeSpell.range || 0) + " ft") : (action?.range || "—")}</div></div>
            <div className="cm-flyout-cell"><div className="cm-flyout-cell-label">Cost</div><div className="cm-flyout-cell-value">{isAbility && activeSpell ? (activeSpell.level === 0 ? "Cantrip" : "Slot") : (action?.cost || "Free")}</div></div>
            <div className="cm-flyout-cell"><div className="cm-flyout-cell-label">Target</div><div className="cm-flyout-cell-value">{focusTarget ? focusTarget.name : "Pick on map"}</div></div>
          </div>
          {focusTarget && focusLane && (
            <div style={{ padding:"4px 8px", borderRadius:8, background: focusLane.hasLineOfSight ? "rgba(88,170,255,0.04)" : "rgba(240,104,88,0.06)", border:"1px solid " + (focusLane.hasLineOfSight ? "rgba(88,170,255,0.12)" : "rgba(240,104,88,0.12)"), font:"400 9px/1.3 'Spectral', serif", color: focusLane.hasLineOfSight ? "#58aaff" : "#f06858" }}>
              {focusDistance} ft · {focusLane.hasLineOfSight ? "LoS clear" : "LoS blocked"}{focusLane.coverACBonus ? " · +" + focusLane.coverACBonus + " cover" : ""}
            </div>
          )}
        </React.Fragment>
      )}

      {(isAttack || isAbility) && (
        <button type="button"
          className={"cm-flyout-confirm" + (isAbility ? " is-purple" : "")}
          disabled={!action || !!action.disabled}
          onClick={onConfirm}>
          <Swords size={13} /> {isAbility ? (activeSpell ? "Cast" : "Use") : "Attack"} — Enter
        </button>
      )}

      {isMove && (
        <div style={{ font:"400 10px/1.4 'Spectral', serif", color: T.textMuted }}>
          Drag {token?.name || "token"} on the map. Press Esc to cancel.
        </div>
      )}
    </div>
  );
};
