  <style>
    /* ═══════════════════════════════════════════════════
       GALLERY — REDESIGNED
       ═══════════════════════════════════════════════════ */

    .gallery-hero {
      padding: 52px 56px 40px;
      text-align: center;
    }
    .gallery-hero-title {
      font-family: 'Cinzel', serif;
      font-size: 44px;
      font-weight: 400;
      letter-spacing: 2px;
      color: var(--text, #f2e8d6);
      margin-bottom: 8px;
    }
    .gallery-hero-sub {
      font-size: 15px;
      font-style: italic;
      color: var(--text-muted, #9a8870);
      letter-spacing: .5px;
    }

    /* ─── FILTER BAR ─── */
    .gal-filters {
      padding: 20px 56px;
      border-top: 1px solid var(--border, #2a2a3a);
      border-bottom: 1px solid var(--border, #2a2a3a);
      background: var(--bg-mid, #0e0e18);
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .gf-group { display: flex; gap: 8px; align-items: center; }
    .gf-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted, #9a8870);
      text-transform: uppercase;
    }
    .gf-select, .gf-input {
      font-family: 'Spectral', serif;
      font-size: 13px;
      background: var(--bg-card, #141420);
      border: 1px solid var(--border, #2a2a3a);
      color: var(--text, #f2e8d6);
      padding: 7px 10px;
      border-radius: 2px;
    }
    .gf-input::placeholder { color: var(--text-muted, #9a8870); }
    .gf-select:focus, .gf-input:focus {
      outline: none;
      border-color: var(--crimson, #d4433a);
      box-shadow: 0 0 6px rgba(192,57,43,.15);
    }
    .gf-search { flex: 1; min-width: 160px; }

    /* ─── RESULTS BAR ─── */
    .gal-results-bar {
      padding: 12px 56px;
      font-size: 12px;
      color: var(--text-muted, #9a8870);
      font-style: italic;
      border-bottom: 1px solid var(--border, #2a2a3a);
    }

    /* ─── GRID ─── */
    .gal-section { padding: 48px 56px; }
    .gal-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width:1200px) { .gal-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width:768px)  { .gal-grid { grid-template-columns: 1fr; } }

    /* ─── CHARACTER CARD ─── */
    .gc {
      background: var(--bg-card, #141420);
      border: 1px solid var(--border, #2a2a3a);
      border-left: 4px solid var(--card-accent, var(--crimson, #d4433a));
      border-radius: 4px;
      padding: 22px 22px 18px;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      display: flex;
      flex-direction: column;
    }
    .gc:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
      border-color: var(--card-accent, var(--crimson, #d4433a));
    }

    /* class accent colors */
    .gc--barbarian  { --card-accent: #d24545; }
    .gc--bard       { --card-accent: #b895a8; }
    .gc--cleric     { --card-accent: #f4d03f; }
    .gc--druid      { --card-accent: #52b788; }
    .gc--fighter    { --card-accent: #8b7355; }
    .gc--monk       { --card-accent: #4a90e2; }
    .gc--paladin    { --card-accent: #f0ad4e; }
    .gc--ranger     { --card-accent: #66bb6a; }
    .gc--rogue      { --card-accent: #5a4a7f; }
    .gc--sorcerer   { --card-accent: #e8605a; }
    .gc--warlock    { --card-accent: #b574ff; }
    .gc--wizard     { --card-accent: #58aaff; }

    /* card header */
    .gc-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .gc-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid var(--card-accent, #d4433a);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      background: rgba(0,0,0,.25);
      color: var(--card-accent, #d4433a);
    }
    .gc-name {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: .5px;
      color: var(--text, #f2e8d6);
      line-height: 1.2;
    }
    .gc-subtitle {
      font-size: 11px;
      color: var(--text-muted, #9a8870);
      margin-top: 3px;
    }

    /* meta pills */
    .gc-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .gc-pill {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted, #9a8870);
      background: var(--bg-mid, #0e0e18);
      padding: 3px 8px;
      border-radius: 2px;
    }
    .gc-pill--level {
      color: var(--card-accent, #d4433a);
      border: 1px solid var(--card-accent, #d4433a);
      background: transparent;
    }

    /* ability row */
    .gc-abs {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      margin-bottom: 14px;
      padding: 10px 0;
      border-top: 1px solid var(--border, #2a2a3a);
      border-bottom: 1px solid var(--border, #2a2a3a);
    }
    .gc-ab { text-align: center; }
    .gc-ab-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--text-muted, #9a8870);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .gc-ab-score {
      font-size: 16px;
      font-weight: 500;
      color: var(--text, #f2e8d6);
      line-height: 1;
    }
    .gc-ab-mod {
      font-size: 10px;
      color: var(--text-muted, #9a8870);
    }

    /* flavor */
    .gc-flavor {
      font-size: 12px;
      font-style: italic;
      color: var(--text-muted, #9a8870);
      line-height: 1.5;
      margin-bottom: 14px;
      flex: 1;
    }

    /* combat stats row (for detailed characters) */
    .gc-combat {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
    }
    .gc-stat {
      text-align: center;
      flex: 1;
      padding: 6px 4px;
      background: var(--bg-mid, #0e0e18);
      border-radius: 2px;
    }
    .gc-stat-val {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--text, #f2e8d6);
      font-weight: 500;
    }
    .gc-stat-label {
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted, #9a8870);
    }

    /* buttons */
    .gc-btns { display: flex; gap: 8px; margin-top: auto; }
    .gc-btn {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 9px 8px;
      border: 1px solid var(--border, #2a2a3a);
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }
    .gc-btn--view {
      background: var(--card-accent, #d4433a);
      color: #f5f0e8;
      border-color: var(--card-accent, #d4433a);
    }
    .gc-btn--view:hover { opacity: .85; }
    .gc-btn--add {
      background: transparent;
      color: var(--text-muted, #9a8870);
    }
    .gc-btn--add:hover {
      border-color: var(--card-accent, #d4433a);
      color: var(--text, #f2e8d6);
    }

    /* ─── FULL SHEET MODAL ─── */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0,0,0,.75);
      overflow-y: auto;
      padding: 40px 20px;
    }
    .sheet-overlay.open { display: flex; justify-content: center; align-items: flex-start; }

    .sheet-panel {
      background: var(--bg-card, #141420);
      border: 1px solid var(--border, #2a2a3a);
      border-radius: 6px;
      max-width: 920px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* sheet header */
    .sh-header {
      padding: 28px 32px 20px;
      border-bottom: 1px solid var(--border, #2a2a3a);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .sh-title {
      font-family: 'Cinzel', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text, #f2e8d6);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .sh-sub {
      font-size: 13px;
      color: var(--text-muted, #9a8870);
      font-style: italic;
    }
    .sh-close {
      width: 36px; height: 36px;
      border: 1px solid var(--border, #2a2a3a);
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted, #9a8870);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
    }
    .sh-close:hover {
      border-color: var(--crimson, #d4433a);
      color: var(--text, #f2e8d6);
    }

    /* sheet combat stats banner */
    .sh-combat {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border, #2a2a3a);
      background: var(--bg-mid, #0e0e18);
    }
    .sh-combat-stat {
      flex: 1;
      text-align: center;
      padding: 14px 12px;
      border-right: 1px solid var(--border, #2a2a3a);
    }
    .sh-combat-stat:last-child { border-right: none; }
    .sh-combat-val {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: var(--text, #f2e8d6);
      font-weight: 500;
    }
    .sh-combat-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted, #9a8870);
      margin-top: 2px;
    }

    /* sheet body */
    .sh-body {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
    }

    /* sheet left column (abilities + saves + skills) */
    .sh-left {
      padding: 24px;
      border-right: 1px solid var(--border, #2a2a3a);
    }

    .sh-section-title {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted, #9a8870);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border, #2a2a3a);
    }

    /* ability score boxes */
    .sh-abilities {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .sh-ab-box {
      text-align: center;
      padding: 10px 6px 8px;
      border: 1px solid var(--border, #2a2a3a);
      border-radius: 4px;
      background: var(--bg, #08080a);
    }
    .sh-ab-score {
      font-size: 22px;
      font-weight: 500;
      color: var(--text, #f2e8d6);
      line-height: 1;
    }
    .sh-ab-mod {
      font-size: 13px;
      color: var(--card-accent, #d4433a);
      margin: 2px 0;
    }
    .sh-ab-name {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted, #9a8870);
    }

    /* saves list */
    .sh-saves { margin-bottom: 24px; }
    .sh-save-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
      color: var(--text-dim, #c0b8a0);
    }
    .sh-save-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1px solid var(--text-muted, #9a8870);
      flex-shrink: 0;
    }
    .sh-save-dot.prof {
      background: var(--card-accent, #d4433a);
      border-color: var(--card-accent, #d4433a);
    }
    .sh-save-bonus {
      margin-left: auto;
      font-weight: 500;
      color: var(--text, #f2e8d6);
    }

    /* skills list */
    .sh-skills { margin-bottom: 24px; }
    .sh-skill-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      font-size: 11px;
      color: var(--text-dim, #c0b8a0);
    }
    .sh-skill-bonus {
      margin-left: auto;
      font-weight: 500;
      color: var(--text, #f2e8d6);
      min-width: 24px;
      text-align: right;
    }

    /* sheet right column */
    .sh-right { padding: 24px; }

    /* attacks table */
    .sh-attacks { margin-bottom: 24px; }
    .sh-atk-table { width: 100%; border-collapse: collapse; }
    .sh-atk-table th {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted, #9a8870);
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border, #2a2a3a);
    }
    .sh-atk-table td {
      font-size: 12px;
      color: var(--text-dim, #c0b8a0);
      padding: 8px;
      border-bottom: 1px solid rgba(42,42,58,.4);
    }
    .sh-atk-name { color: var(--text, #f2e8d6); font-weight: 500; }

    /* features list */
    .sh-features { margin-bottom: 24px; }
    .sh-feat {
      margin-bottom: 10px;
      padding-left: 14px;
      position: relative;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-dim, #c0b8a0);
    }
    .sh-feat::before {
      content: '\25AA';
      position: absolute;
      left: 0;
      color: var(--card-accent, #d4433a);
    }
    .sh-feat-name { color: var(--text, #f2e8d6); font-weight: 500; }

    /* equipment list */
    .sh-equip { margin-bottom: 24px; }
    .sh-equip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .sh-equip-tag {
      font-size: 11px;
      color: var(--text-dim, #c0b8a0);
      background: var(--bg, #08080a);
      padding: 4px 10px;
      border-radius: 2px;
      border: 1px solid rgba(42,42,58,.4);
    }

    /* backstory / personality */
    .sh-footer {
      padding: 20px 32px 28px;
      border-top: 1px solid var(--border, #2a2a3a);
    }
    .sh-footer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .sh-footer-block p {
      font-size: 13px;
      color: var(--text-dim, #c0b8a0);
      line-height: 1.6;
    }

    /* sheet add button */
    .sh-add-bar {
      padding: 16px 32px;
      border-top: 1px solid var(--border, #2a2a3a);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      background: var(--bg-mid, #0e0e18);
    }
    .sh-btn {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 10px 24px;
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
      border: 1px solid var(--border, #2a2a3a);
    }
    .sh-btn--add {
      background: var(--crimson, #d4433a);
      color: #f5f0e8;
      border-color: var(--crimson, #d4433a);
    }
    .sh-btn--add:hover { opacity: .85; }
    .sh-btn--close {
      background: transparent;
      color: var(--text-muted, #9a8870);
    }
    .sh-btn--close:hover {
      border-color: var(--text-muted, #9a8870);
      color: var(--text, #f2e8d6);
    }

    /* ─── TOAST ─── */
    .gal-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card, #141420);
      border: 1px solid var(--crimson, #d4433a);
      color: var(--text, #f2e8d6);
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 13px;
      z-index: 9500;
      transition: transform .3s ease;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
    .gal-toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width:768px) {
      .gallery-hero { padding: 36px 20px 28px; }
      .gallery-hero-title { font-size: 32px; }
      .gal-filters { padding: 16px 20px; flex-direction: column; gap: 10px; }
      .gf-group { width: 100%; }
      .gf-search { width: 100%; min-width: 0; }
      .gal-results-bar { padding: 10px 20px; }
      .gal-section { padding: 32px 20px; }
      .gal-grid { gap: 16px; }
      .sh-body { grid-template-columns: 1fr; }
      .sh-left { border-right: none; border-bottom: 1px solid var(--border, #2a2a3a); }
      .sh-header { padding: 20px; }
      .sh-footer { padding: 16px 20px; }
      .sh-footer-grid { grid-template-columns: 1fr; }
      .sh-add-bar { padding: 14px 20px; }
      .sh-right { padding: 20px; }
      .sheet-overlay { padding: 20px 10px; }
    }
    @media (max-width:480px) {
      .gc-abs { grid-template-columns: repeat(3,1fr); gap: 6px; }
      .sh-abilities { grid-template-columns: repeat(2,1fr); }
      .sh-combat { flex-wrap: wrap; }
      .sh-combat-stat { min-width: 33%; }
    }
    @media (max-width:375px) {
      .gallery-hero { padding: 28px 14px 20px; }
      .gallery-hero-title { font-size: 26px; }
      .gal-filters { padding: 12px 14px; }
      .gal-section { padding: 24px 14px; }
      .gc { padding: 16px 14px 14px; }
      .gc-name { font-size: 16px; }
      .gc-icon { width: 40px; height: 40px; font-size: 18px; }
      .gc-btns { flex-direction: column; }
      .sh-header { flex-direction: column; gap: 12px; }
    }
  </style>
</head>

  <!-- HERO -->
  <div class="gallery-hero">
    <h1 class="gallery-hero-title">Character Gallery</h1>

    /* ═══════════════════════════════════════════════════
       UTILITIES
       ═══════════════════════════════════════════════════ */
    function esc(t) {
      if (t == null) return '';
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function abilityMod(score) { return Math.floor((score - 10) / 2); }
    function fmtMod(score) { var m = abilityMod(score); return m >= 0 ? '+' + m : String(m); }

    var filteredCharacters = CHARACTERS.slice();

    /* ═══════════════════════════════════════════════════
       RENDER CARDS
       ═══════════════════════════════════════════════════ */
    function renderCharacters() {
      var grid = document.getElementById('character-grid');
      if (!grid) return;
      grid.innerHTML = '';

      document.getElementById('results-bar').textContent =
        'Showing ' + filteredCharacters.length + ' of ' + CHARACTERS.length + ' characters';

      filteredCharacters.forEach(function (ch, fi) {
        // Find actual index in CHARACTERS for modal/save
        var idx = CHARACTERS.indexOf(ch);
        var cls = ch.class.toLowerCase().split('/')[0].trim();

        var abHtml = '';
        var abOrder = ['STR','DEX','CON','INT','WIS','CHA'];
        abOrder.forEach(function (ab) {
          var val = ch.abilities[ab] || 10;
          abHtml += '<div class="gc-ab">' +
            '<div class="gc-ab-label">' + ab + '</div>' +
            '<div class="gc-ab-score">' + val + '</div>' +
            '<div class="gc-ab-mod">' + fmtMod(val) + '</div>' +
            '</div>';
        });

        // Combat stats row (only for detailed characters)
        var combatHtml = '';
        if (ch.ac != null) {
          combatHtml = '<div class="gc-combat">' +
            '<div class="gc-stat"><div class="gc-stat-val">' + esc(ch.ac) + '</div><div class="gc-stat-label">AC</div></div>' +
            '<div class="gc-stat"><div class="gc-stat-val">' + esc(ch.hp) + '</div><div class="gc-stat-label">HP</div></div>' +
            '<div class="gc-stat"><div class="gc-stat-val">' + esc(ch.speed) + '</div><div class="gc-stat-label">Speed</div></div>' +
            '</div>';
        }

        // Subtitle line
        var subParts = [ch.class];
        if (ch.multiclass) subParts = [ch.multiclass];
        subParts.push(ch.race);
        if (ch.subclass && ch.subclass !== 'None') subParts.push(ch.subclass);
        var subtitle = subParts.join(' \u00B7 ');

        var card = document.createElement('div');
        card.className = 'gc gc--' + cls;
        card.innerHTML =
          '<div class="gc-head">' +
            '<div class="gc-icon">' + esc(ch.icon) + '</div>' +
            '<div>' +
              '<div class="gc-name">' + esc(ch.name) + '</div>' +
              '<div class="gc-subtitle">' + esc(subtitle) + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="gc-meta">' +
            '<span class="gc-pill gc-pill--level">Lv ' + ch.level + '</span>' +
            (ch.background ? '<span class="gc-pill">' + esc(ch.background) + '</span>' : '') +
            (ch.darkvision ? '<span class="gc-pill">Darkvision ' + esc(ch.darkvision) + '</span>' : '') +
          '</div>' +
          '<div class="gc-abs">' + abHtml + '</div>' +
          combatHtml +
          '<div class="gc-flavor">\u201C' + esc(ch.flavor) + '\u201D</div>' +
          '<div class="gc-btns">' +
            '<button class="gc-btn gc-btn--view" onclick="openSheet(' + idx + ');event.stopPropagation()">View Sheet</button>' +
            '<button class="gc-btn gc-btn--add" onclick="addToChars(' + idx + ');event.stopPropagation()">+ Add to Characters</button>' +
          '</div>';

        grid.appendChild(card);
      });
    }

    /* ═══════════════════════════════════════════════════
       CHARACTER SHEET MODAL
       ═══════════════════════════════════════════════════ */
    function openSheet(idx) {
      var ch = CHARACTERS[idx];
      if (!ch) return;
      var cls = ch.class.toLowerCase().split('/')[0].trim();
      var overlay = document.getElementById('sheet-overlay');
      var panel = document.getElementById('sheet-panel');

      // Subtitle
      var subLine = ch.race + ' ' + ch.class;
      if (ch.multiclass) subLine = ch.race + ' \u2014 ' + ch.multiclass;
      if (ch.subclass && ch.subclass !== 'None') subLine += ' (' + ch.subclass + ')';
      subLine += ' \u2014 Level ' + ch.level;
      if (ch.background) subLine += ' \u2014 ' + ch.background;

      // Ability boxes
      var abOrder = ['STR','DEX','CON','INT','WIS','CHA'];
      var abHtml = '';
      abOrder.forEach(function (ab) {
        var val = ch.abilities[ab] || 10;
        abHtml += '<div class="sh-ab-box">' +
          '<div class="sh-ab-score">' + val + '</div>' +
          '<div class="sh-ab-mod">' + fmtMod(val) + '</div>' +
          '<div class="sh-ab-name">' + ab + '</div>' +
          '</div>';
      });

      // Saves
      var savesHtml = '';
      if (ch.saves) {
        abOrder.forEach(function (ab) {
          var hasProf = ch.saves[ab] != null;
          var bonus = hasProf ? ch.saves[ab] : abilityMod(ch.abilities[ab] || 10);
          var fmtB = bonus >= 0 ? '+' + bonus : String(bonus);
          savesHtml += '<div class="sh-save-row">' +
            '<span class="sh-save-dot' + (hasProf ? ' prof' : '') + '"></span>' +
            '<span>' + ab + '</span>' +
            '<span class="sh-save-bonus">' + fmtB + '</span>' +
            '</div>';
        });
      } else {
        abOrder.forEach(function (ab) {
          var mod = abilityMod(ch.abilities[ab] || 10);
          var fmtB = mod >= 0 ? '+' + mod : String(mod);
          savesHtml += '<div class="sh-save-row">' +
            '<span class="sh-save-dot"></span>' +
            '<span>' + ab + '</span>' +
            '<span class="sh-save-bonus">' + fmtB + '</span>' +
            '</div>';
        });
      }

      // Skills
      var skillsHtml = '';
      if (ch.skills && ch.skills.length) {
        ch.skills.forEach(function (sk) {
          var fmtB = sk.bonus >= 0 ? '+' + sk.bonus : String(sk.bonus);
          skillsHtml += '<div class="sh-skill-row">' +
            '<span class="sh-save-dot prof"></span>' +
            '<span>' + esc(sk.name) + '</span>' +
            '<span class="sh-skill-bonus">' + fmtB + '</span>' +
            '</div>';
        });
      } else {
        skillsHtml = '<div style="font-size:12px;color:var(--text-muted);font-style:italic">No specific skill proficiencies listed</div>';
      }

      // Combat banner
      var combatHtml = '';
      if (ch.ac != null) {
        var combatStats = [
          { val: ch.ac, label: 'Armor Class' },
          { val: ch.hp, label: 'Hit Points' },
          { val: ch.speed + ' ft', label: 'Speed' },
          { val: '+' + ch.profBonus, label: 'Proficiency' }
        ];
        if (ch.darkvision) combatStats.push({ val: ch.darkvision, label: 'Darkvision' });
        combatStats.forEach(function (s) {
          combatHtml += '<div class="sh-combat-stat">' +
            '<div class="sh-combat-val">' + esc(s.val) + '</div>' +
            '<div class="sh-combat-label">' + esc(s.label) + '</div>' +
            '</div>';
        });
      }

      // Attacks
      var atksHtml = '';
      if (ch.attacks && ch.attacks.length) {
        var rows = '';
        ch.attacks.forEach(function (a) {
          var fmtB = a.bonus >= 0 ? '+' + a.bonus : String(a.bonus);
          rows += '<tr><td class="sh-atk-name">' + esc(a.name) + '</td>' +
            '<td>' + fmtB + '</td>' +
            '<td>' + esc(a.damage) + '</td></tr>';
        });
        atksHtml = '<div class="sh-attacks">' +
          '<div class="sh-section-title">Attacks</div>' +
          '<table class="sh-atk-table"><thead><tr><th>Weapon</th><th>Hit</th><th>Damage</th></tr></thead>' +
          '<tbody>' + rows + '</tbody></table></div>';
      }

      // Features
      var featsHtml = '';
      if (ch.features && ch.features.length) {
        var fItems = '';
        ch.features.forEach(function (f) {
          var parts = f.split(' \u2014 ');
          if (parts.length > 1) {
            fItems += '<div class="sh-feat"><span class="sh-feat-name">' + esc(parts[0]) + '</span> \u2014 ' + esc(parts.slice(1).join(' \u2014 ')) + '</div>';
          } else {
            fItems += '<div class="sh-feat">' + esc(f) + '</div>';
          }
        });
        featsHtml = '<div class="sh-features"><div class="sh-section-title">Features &amp; Traits</div>' + fItems + '</div>';
      }

      // Equipment
      var equipHtml = '';
      if (ch.equipment && ch.equipment.length) {
        var tags = '';
        ch.equipment.forEach(function (e) {
          tags += '<span class="sh-equip-tag">' + esc(e) + '</span>';
        });
        equipHtml = '<div class="sh-equip"><div class="sh-section-title">Equipment</div>' +
          '<div class="sh-equip-list">' + tags + '</div></div>';
      }

      // Resistances & Languages
      var extraHtml = '';
      if (ch.resistances && ch.resistances.length) {
        extraHtml += '<div style="margin-bottom:16px"><div class="sh-section-title">Resistances</div>' +
          '<div class="sh-equip-list">';
        ch.resistances.forEach(function (r) {
          extraHtml += '<span class="sh-equip-tag">' + esc(r) + '</span>';
        });
        extraHtml += '</div></div>';
      }
      if (ch.languages) {
        extraHtml += '<div style="margin-bottom:16px"><div class="sh-section-title">Languages</div>' +
          '<div style="font-size:12px;color:var(--text-dim,#c0b8a0)">' + esc(ch.languages) + '</div></div>';
      }

      panel.className = 'sheet-panel gc--' + cls;
      panel.innerHTML =
        '<div class="sh-header">' +
          '<div><div class="sh-title">' + esc(ch.name) + '</div>' +
          '<div class="sh-sub">' + esc(subLine) + '</div></div>' +
          '<button class="sh-close" onclick="closeSheet()" aria-label="Close">\u00D7</button>' +
        '</div>' +
        (combatHtml ? '<div class="sh-combat">' + combatHtml + '</div>' : '') +
        '<div class="sh-body">' +
          '<div class="sh-left">' +
            '<div class="sh-section-title">Ability Scores</div>' +
            '<div class="sh-abilities">' + abHtml + '</div>' +
            '<div class="sh-saves"><div class="sh-section-title">Saving Throws</div>' + savesHtml + '</div>' +
            '<div class="sh-skills"><div class="sh-section-title">Skills</div>' + skillsHtml + '</div>' +
          '</div>' +
          '<div class="sh-right">' +
            atksHtml +
            featsHtml +
            equipHtml +
            extraHtml +
          '</div>' +
        '</div>' +
        '<div class="sh-footer">' +
          '<div class="sh-footer-grid">' +
            '<div class="sh-footer-block"><div class="sh-section-title">Personality</div>' +
              '<p>' + esc(ch.traits) + '</p></div>' +
            '<div class="sh-footer-block"><div class="sh-section-title">Backstory</div>' +
              '<p>' + esc(ch.backstory) + '</p></div>' +
          '</div>' +
        '</div>' +
        '<div class="sh-add-bar">' +
          '<button class="sh-btn sh-btn--close" onclick="closeSheet()">Close</button>' +
          '<button class="sh-btn sh-btn--add" onclick="addToChars(' + idx + ')">+ Add to My Characters</button>' +
        '</div>';

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeSheet() {
      document.getElementById('sheet-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // Close on overlay click
    document.getElementById('sheet-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeSheet();
    });

    // Close on Escape
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeSheet();
    });

    /* ═══════════════════════════════════════════════════
       ADD TO MY CHARACTERS
       ═══════════════════════════════════════════════════ */
    function showToast(msg) {
      var t = document.getElementById('gal-toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 3000);
    }

    function addToChars(idx) {
      var ch = CHARACTERS[idx];
      if (!ch) return;

      if (typeof PhmurtDB === 'undefined' || !PhmurtDB.getSession) {
        showToast('Sign in to add characters');
        return;
      }

      PhmurtDB.getSession().then(function (session) {
        if (!session) {
          if (PhmurtDB.openAuth) PhmurtDB.openAuth();
          else showToast('Please sign in first');
          return;
        }

        var snapshot = {
          name: ch.name,
          race: ch.race,
          class: ch.class,
          level: ch.level,
          edition: '5e',
          abilities: ch.abilities,
          features: ch.features || [],
          equipment: ch.equipment || [],
          traits: ch.traits || '',
          backstory: ch.backstory || '',
          subclass: ch.subclass || '',
          flavor: ch.flavor || '',
          source: 'gallery'
        };
        // Extended data
        if (ch.ac != null) snapshot.ac = ch.ac;
        if (ch.hp != null) snapshot.hp = ch.hp;
        if (ch.speed != null) snapshot.speed = ch.speed;
        if (ch.profBonus != null) snapshot.profBonus = ch.profBonus;
        if (ch.saves) snapshot.saves = ch.saves;
        if (ch.skills) snapshot.skills = ch.skills;
        if (ch.attacks) snapshot.attacks = ch.attacks;
        if (ch.resistances) snapshot.resistances = ch.resistances;
        if (ch.languages) snapshot.languages = ch.languages;
        if (ch.darkvision) snapshot.darkvision = ch.darkvision;
        if (ch.background) snapshot.background = ch.background;
        if (ch.multiclass) snapshot.multiclass = ch.multiclass;

        PhmurtDB.saveCharacter(snapshot).then(function (result) {
          if (result && result.success) {
            showToast(ch.name + ' added to your characters!');
          } else {
            var err = (result && result.error) ? result.error : 'Could not save character';
            showToast(err);
          }
        }).catch(function () {
          showToast('Error saving character');
        });
      });
    }

    /* ═══════════════════════════════════════════════════
       FILTER / SORT
       ═══════════════════════════════════════════════════ */
    function filterCharacters() {
      var classF = document.getElementById('filter-class').value;
      var raceF = document.getElementById('filter-race').value;
      var levelF = document.getElementById('filter-level').value;
      var search = document.getElementById('search-input').value.toLowerCase();
      var sortBy = document.getElementById('sort-by').value;

      filteredCharacters = CHARACTERS.filter(function (ch) {
        if (classF && ch.class !== classF) return false;
        if (raceF && ch.race !== raceF) return false;
        if (levelF && ch.level !== parseInt(levelF, 10)) return false;
        if (search && ch.name.toLowerCase().indexOf(search) === -1 &&
            ch.class.toLowerCase().indexOf(search) === -1 &&
            ch.race.toLowerCase().indexOf(search) === -1) return false;
        return true;
      });

      if (sortBy === 'name') {
        filteredCharacters.sort(function (a, b) { return a.name.localeCompare(b.name); });
      } else if (sortBy === 'class') {
        filteredCharacters.sort(function (a, b) { return a.class.localeCompare(b.class); });
      } else if (sortBy === 'level') {
        filteredCharacters.sort(function (a, b) { return a.level - b.level; });
      }

      renderCharacters();
    }

    // Event listeners
    ['filter-class','filter-race','filter-level','sort-by'].forEach(function (id) {
      document.getElementById(id).addEventListener('change', filterCharacters);
    });
    document.getElementById('search-input').addEventListener('input', filterCharacters);

    // Initial render
    document.addEventListener('DOMContentLoaded', function () {
      renderCharacters();
    });
  </script>

  <script src="phmurt-shell.js?v=186" defer></script>
</body>
